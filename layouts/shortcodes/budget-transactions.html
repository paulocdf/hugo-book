{{/*
  budget-transactions.html — Transaction register (Phase 1)
  - Lists all transactions sorted by date desc
  - Inline edit: payee, memo, category, amount
  - Delete row
  - Filters: month, category, text search
*/}}

<style>
  .dm-tx-wrap { max-width: 1100px; margin: 0 auto; padding: 12px 0 40px; }
  .dm-tx-toolbar {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .dm-tx-toolbar input, .dm-tx-toolbar select {
    padding: 8px 10px; border: 1px solid var(--gray-200); border-radius: 6px;
    background: var(--body-background); color: var(--body-font-color);
    font-size: 0.9rem;
  }
  .dm-tx-toolbar .spacer { flex: 1; }
  .dm-tx-toolbar .stat { font-size: 0.85rem; opacity: 0.8; }
  .dm-tx-toolbar .stat strong { font-variant-numeric: tabular-nums; }

  .dm-tx-table {
    width: 100%; border-collapse: collapse;
    border: 1px solid var(--gray-200); border-radius: 8px; overflow: hidden;
  }
  .dm-tx-table th, .dm-tx-table td {
    padding: 8px 10px; font-size: 0.88rem; text-align: left;
    border-bottom: 1px solid var(--gray-200);
  }
  .dm-tx-table th {
    background: var(--gray-100); font-weight: 600;
    text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.05em;
    opacity: 0.8;
  }
  .dm-tx-table tr:last-child td { border-bottom: 0; }
  .dm-tx-table td.amt, .dm-tx-table th.amt { text-align: right; font-variant-numeric: tabular-nums; }
  .dm-tx-table td input, .dm-tx-table td select {
    width: 100%; padding: 4px 6px;
    border: 1px solid transparent; border-radius: 4px;
    background: transparent; color: var(--body-font-color);
    font-size: inherit; font-family: inherit;
  }
  .dm-tx-table td input:focus, .dm-tx-table td select:focus {
    outline: none; border-color: var(--color-accent); background: var(--body-background);
  }
  .dm-tx-table td.amt input { text-align: right; font-variant-numeric: tabular-nums; }
  .dm-tx-table td.amt .negative { color: #e53935; }
  .dm-tx-table td.amt .positive { color: #43a047; }

  .dm-tx-table .tx-del, .dm-tx-table .tx-split {
    border: 0; background: transparent; color: var(--body-font-color);
    opacity: 0.3; cursor: pointer; padding: 4px;
  }
  .dm-tx-table tr:hover .tx-del,
  .dm-tx-table tr:hover .tx-split { opacity: 0.9; }
  .dm-tx-table .tx-split.active { opacity: 1; color: var(--color-accent); }

  .dm-tx-split-row td { padding: 0; background: color-mix(in srgb, var(--color-accent) 6%, transparent); }
  .dm-tx-split-panel { padding: 12px 16px 14px; border-top: 1px dashed var(--gray-200); }
  .dm-tx-split-panel h5 { margin: 0 0 8px; font-size: 0.85rem; opacity: 0.8; font-weight: 600; }
  .dm-tx-split-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .dm-tx-split-item {
    display: grid; grid-template-columns: 1fr 140px 1fr 28px;
    gap: 8px; align-items: center;
  }
  .dm-tx-split-item select, .dm-tx-split-item input {
    padding: 6px 8px; border: 1px solid var(--gray-200); border-radius: 6px;
    background: var(--body-background); color: var(--body-font-color);
    font-size: 0.85rem; width: 100%;
  }
  .dm-tx-split-item input.amt { text-align: right; font-variant-numeric: tabular-nums; }
  .dm-tx-split-item .split-remove {
    border: 0; background: transparent; cursor: pointer; opacity: 0.5; padding: 4px;
  }
  .dm-tx-split-item .split-remove:hover { opacity: 1; color: #e53935; }
  .dm-tx-split-footer {
    display: flex; gap: 8px; align-items: center; justify-content: space-between;
    font-size: 0.82rem;
  }
  .dm-tx-split-footer .sum-status {
    font-variant-numeric: tabular-nums;
    padding: 3px 8px; border-radius: 4px;
  }
  .dm-tx-split-footer .sum-status.ok {
    color: #43a047;
    background: color-mix(in srgb, #43a047 12%, transparent);
  }
  .dm-tx-split-footer .sum-status.err {
    color: #e53935;
    background: color-mix(in srgb, #e53935 12%, transparent);
  }
  .dm-tx-split-actions { display: flex; gap: 6px; }
  .dm-tx-split-actions button {
    padding: 5px 12px; border-radius: 6px; border: 1px solid var(--gray-200);
    background: var(--body-background); color: var(--body-font-color);
    cursor: pointer; font-size: 0.82rem;
  }
  .dm-tx-split-actions button.primary {
    background: var(--color-accent); color: #fff; border-color: var(--color-accent);
  }
  .dm-tx-split-actions button.primary:disabled {
    opacity: 0.4; cursor: not-allowed;
  }
  .split-badge {
    display: inline-block; padding: 2px 8px;
    font-size: 0.75rem; border-radius: 10px;
    background: color-mix(in srgb, var(--color-accent) 18%, transparent);
    color: var(--color-accent);
  }

  .dm-tx-empty {
    padding: 40px; text-align: center; opacity: 0.6;
    border: 2px dashed var(--gray-200); border-radius: 10px;
  }
</style>

<div class="dm-tx-wrap" id="dm-tx-root">
  <div class="dm-tx-toolbar">
    <select id="dm-tx-month"></select>
    <select id="dm-tx-category"><option value="">All categories</option></select>
    <input type="search" id="dm-tx-search" placeholder="Search payee / memo…">
    <span class="spacer"></span>
    <span class="stat" id="dm-tx-stat"></span>
  </div>
  <div id="dm-tx-body"><div class="dm-tx-empty">Loading transactions…</div></div>
</div>

<script>
(function() {
  'use strict';

  var ALL_MONTHS = 'all';

  function $(s, c) { return (c || document).querySelector(s); }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, function(c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function populateMonthSelect(txs) {
    var months = {};
    txs.forEach(function(t) { if (t.date) months[t.date.substr(0, 7)] = true; });
    var keys = Object.keys(months).sort().reverse();
    var current = window.dmBudget.currentMonth();
    if (!months[current]) keys.unshift(current);
    var sel = $('#dm-tx-month');
    var prev = sel.value || current;
    sel.innerHTML = '<option value="' + ALL_MONTHS + '">All months</option>' +
      keys.map(function(m) {
        var parts = m.split('-');
        var label = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, 1)
          .toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
        return '<option value="' + m + '">' + label + '</option>';
      }).join('');
    sel.value = prev;
  }

  function populateCategorySelect(cats) {
    var sel = $('#dm-tx-category');
    var prev = sel.value;
    sel.innerHTML = '<option value="">All categories</option>' +
      '<option value="__none__">(Uncategorized)</option>' +
      cats.map(function(c) {
        return '<option value="' + escapeHtml(c.id) + '">' + escapeHtml(c.name) + '</option>';
      }).join('');
    if (prev) sel.value = prev;
  }

  function applyFilters(txs) {
    var month = $('#dm-tx-month').value;
    var category = $('#dm-tx-category').value;
    var q = $('#dm-tx-search').value.trim().toLowerCase();
    return txs.filter(function(t) {
      if (month && month !== ALL_MONTHS) {
        if (!t.date || t.date.substr(0, 7) !== month) return false;
      }
      if (category === '__none__') {
        if (t.categoryId) return false;
      } else if (category) {
        if (t.categoryId !== category) return false;
      }
      if (q) {
        var hay = ((t.payee || '') + ' ' + (t.memo || '')).toLowerCase();
        if (hay.indexOf(q) === -1) return false;
      }
      return true;
    });
  }

  function renderTable(txs, cats) {
    _openSplitTx = null; // panel is wiped by innerHTML reset below
    var body = $('#dm-tx-body');
    if (txs.length === 0) {
      body.innerHTML = '<div class="dm-tx-empty">No transactions match these filters.</div>';
      $('#dm-tx-stat').textContent = '';
      return;
    }
    var currency = window.dmBudget.getCurrency();
    var fm = function(x) { return window.dmBudget.formatMoney(x, { currency: currency }); };
    var catMap = {};
    cats.forEach(function(c) { catMap[c.id] = c; });

    var total = 0;
    txs.forEach(function(t) { total += (t.amount || 0); });
    $('#dm-tx-stat').innerHTML = txs.length + ' transactions · net <strong>' + fm(total) + '</strong>';

    var catOptions = cats.map(function(c) {
      return '<option value="' + escapeHtml(c.id) + '">' + escapeHtml(c.name) + '</option>';
    }).join('');

    var rows = txs.map(function(t) {
      var amt = t.amount || 0;
      var amtClass = amt < 0 ? 'negative' : (amt > 0 ? 'positive' : '');
      var hasSplits = Array.isArray(t.splits) && t.splits.length > 0;
      var catCell;
      if (hasSplits) {
        catCell = '<span class="split-badge">Split · ' + t.splits.length + '</span>';
      } else {
        catCell = '<select data-field="categoryId">' +
                    '<option value="">—</option>' +
                    catOptions +
                  '</select>';
      }
      return '' +
        '<tr data-tx="' + escapeHtml(t.id) + '">' +
          '<td><input type="date" data-field="date" value="' + escapeHtml(t.date) + '"></td>' +
          '<td><input type="text" data-field="payee" value="' + escapeHtml(t.payee) + '" placeholder="Payee"></td>' +
          '<td><input type="text" data-field="memo" value="' + escapeHtml(t.memo) + '" placeholder="Memo"></td>' +
          '<td>' + catCell + '</td>' +
          '<td class="amt"><input type="text" data-field="amount" value="' + (amt / 100).toFixed(2) + '" inputmode="decimal" class="' + amtClass + '"></td>' +
          '<td style="width:32px;white-space:nowrap">' +
            '<button class="tx-split' + (hasSplits ? ' active' : '') + '" data-tx-split="' + escapeHtml(t.id) + '" title="Split">' +
              '<svg class="dm-icon" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-git-branch"/></svg>' +
            '</button>' +
            '<button class="tx-del" data-tx-del="' + escapeHtml(t.id) + '" title="Delete">' +
              '<svg class="dm-icon" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-trash"/></svg>' +
            '</button>' +
          '</td>' +
        '</tr>';
    }).join('');

    body.innerHTML = '' +
      '<table class="dm-tx-table">' +
        '<thead><tr>' +
          '<th style="width:130px">Date</th>' +
          '<th>Payee</th>' +
          '<th>Memo</th>' +
          '<th style="width:180px">Category</th>' +
          '<th class="amt" style="width:140px">Amount</th>' +
          '<th></th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>';

    // Pre-select categories
    body.querySelectorAll('tr[data-tx]').forEach(function(tr) {
      var txId = tr.getAttribute('data-tx');
      var tx = txs.filter(function(x) { return x.id === txId; })[0];
      if (!tx) return;
      var catSel = tr.querySelector('[data-field="categoryId"]');
      if (catSel) catSel.value = tx.categoryId || '';
    });

    // Bind events
    body.querySelectorAll('input[data-field], select[data-field]').forEach(function(el) {
      el.addEventListener('change', handleFieldChange);
      if (el.tagName === 'INPUT' && el.type !== 'date') {
        el.addEventListener('blur', handleFieldChange);
        el.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
        });
      }
    });
    body.querySelectorAll('[data-tx-del]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = btn.getAttribute('data-tx-del');
        if (window.dmConfirm) {
          window.dmConfirm({
            title: 'Delete transaction?',
            message: 'This cannot be undone.',
            confirmLabel: 'Delete',
            danger: true
          }).then(function(ok) {
            if (ok) window.dmBudget.deleteTransaction(id).then(refresh);
          });
        } else {
          window.dmBudget.deleteTransaction(id).then(refresh);
        }
      });
    });
    body.querySelectorAll('[data-tx-split]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = btn.getAttribute('data-tx-split');
        toggleSplitPanel(id);
      });
    });
  }

  // ── Split panel ──────────────────────────────────────────────

  var _openSplitTx = null; // id of the tx whose split panel is open

  function toggleSplitPanel(txId) {
    if (_openSplitTx === txId) { closeSplitPanel(); return; }
    closeSplitPanel();
    var tx = _allTx.filter(function(x) { return x.id === txId; })[0];
    if (!tx) return;
    var row = document.querySelector('tr[data-tx="' + cssEscape(txId) + '"]');
    if (!row) return;

    var panelRow = document.createElement('tr');
    panelRow.className = 'dm-tx-split-row';
    panelRow.setAttribute('data-tx-split-row', txId);
    var td = document.createElement('td');
    td.colSpan = 6;
    panelRow.appendChild(td);
    row.parentNode.insertBefore(panelRow, row.nextSibling);
    renderSplitPanel(td, tx);
    _openSplitTx = txId;
  }

  function closeSplitPanel() {
    if (!_openSplitTx) return;
    var existing = document.querySelector('tr[data-tx-split-row="' + cssEscape(_openSplitTx) + '"]');
    if (existing && existing.parentNode) existing.parentNode.removeChild(existing);
    _openSplitTx = null;
  }

  function cssEscape(s) {
    return String(s).replace(/"/g, '\\"');
  }

  function renderSplitPanel(container, tx) {
    var initial = Array.isArray(tx.splits) && tx.splits.length > 0
      ? tx.splits.map(function(s) {
          return { categoryId: s.categoryId || '', amount: s.amount || 0, memo: s.memo || '' };
        })
      : [
          { categoryId: tx.categoryId || '', amount: tx.amount || 0, memo: '' },
          { categoryId: '', amount: 0, memo: '' }
        ];

    var state = { splits: initial };
    var parentAmount = tx.amount || 0;

    var catOptions = _allCats.map(function(c) {
      return '<option value="' + escapeHtml(c.id) + '">' + escapeHtml(c.name) + '</option>';
    }).join('');

    function rowHtml(s, idx) {
      return '' +
        '<div class="dm-tx-split-item" data-split-idx="' + idx + '">' +
          '<select data-split-field="categoryId">' +
            '<option value="">— Category —</option>' + catOptions +
          '</select>' +
          '<input type="text" class="amt" data-split-field="amount" value="' + (s.amount / 100).toFixed(2) + '" placeholder="0.00" inputmode="decimal">' +
          '<input type="text" data-split-field="memo" value="' + escapeHtml(s.memo) + '" placeholder="Memo (optional)">' +
          '<button type="button" class="split-remove" data-split-remove="' + idx + '" title="Remove">' +
            '<svg class="dm-icon" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-x"/></svg>' +
          '</button>' +
        '</div>';
    }

    function render() {
      var currency = window.dmBudget.getCurrency();
      var fm = function(x) { return window.dmBudget.formatMoney(x, { currency: currency }); };
      var sum = 0;
      state.splits.forEach(function(s) { sum += (s.amount || 0); });
      var delta = parentAmount - sum;
      var ok = delta === 0 && state.splits.length >= 2 && state.splits.every(function(s) { return s.categoryId && s.amount !== 0; });
      var statusClass = delta === 0 ? 'ok' : 'err';
      var statusText = delta === 0
        ? 'Splits total ' + fm(sum) + ' · balanced'
        : 'Splits total ' + fm(sum) + ' · need ' + fm(delta);

      container.innerHTML = '' +
        '<div class="dm-tx-split-panel">' +
          '<h5>Split this transaction (' + fm(parentAmount) + ') across categories</h5>' +
          '<div class="dm-tx-split-list">' +
            state.splits.map(rowHtml).join('') +
          '</div>' +
          '<div class="dm-tx-split-footer">' +
            '<span class="sum-status ' + statusClass + '">' + statusText + '</span>' +
            '<div class="dm-tx-split-actions">' +
              '<button type="button" data-split-add>+ Add split</button>' +
              '<button type="button" data-split-clear>Clear (unsplit)</button>' +
              '<button type="button" data-split-cancel>Cancel</button>' +
              '<button type="button" class="primary" data-split-save ' + (ok ? '' : 'disabled') + '>Save</button>' +
            '</div>' +
          '</div>' +
        '</div>';

      // Restore category selects
      container.querySelectorAll('[data-split-idx]').forEach(function(row) {
        var idx = parseInt(row.getAttribute('data-split-idx'), 10);
        var sel = row.querySelector('[data-split-field="categoryId"]');
        if (sel) sel.value = state.splits[idx].categoryId || '';
      });

      // Bind field changes
      container.querySelectorAll('[data-split-idx]').forEach(function(row) {
        var idx = parseInt(row.getAttribute('data-split-idx'), 10);
        row.querySelectorAll('[data-split-field]').forEach(function(el) {
          el.addEventListener('change', function() {
            var field = el.getAttribute('data-split-field');
            if (field === 'amount') {
              state.splits[idx].amount = window.dmBudget.parseMoney(el.value);
            } else {
              state.splits[idx][field] = el.value;
            }
            render();
          });
          if (el.tagName === 'INPUT') {
            el.addEventListener('blur', function() {
              var field = el.getAttribute('data-split-field');
              if (field === 'amount') el.value = ((state.splits[idx].amount || 0) / 100).toFixed(2);
            });
          }
        });
        var rm = row.querySelector('[data-split-remove]');
        if (rm) rm.addEventListener('click', function() {
          state.splits.splice(idx, 1);
          render();
        });
      });
      var addBtn = container.querySelector('[data-split-add]');
      if (addBtn) addBtn.addEventListener('click', function() {
        state.splits.push({ categoryId: '', amount: parentAmount - sum, memo: '' });
        render();
      });
      var clearBtn = container.querySelector('[data-split-clear]');
      if (clearBtn) clearBtn.addEventListener('click', function() {
        window.dmBudget.updateTransaction(tx.id, { splits: [], categoryId: tx.categoryId || null })
          .then(function() { closeSplitPanel(); refresh(); });
      });
      var cancelBtn = container.querySelector('[data-split-cancel]');
      if (cancelBtn) cancelBtn.addEventListener('click', closeSplitPanel);
      var saveBtn = container.querySelector('[data-split-save]');
      if (saveBtn && ok) saveBtn.addEventListener('click', function() {
        window.dmBudget.splitTransaction(tx.id, state.splits.map(function(s) {
          return { categoryId: s.categoryId, amount: s.amount, memo: s.memo || '' };
        })).then(function() {
          closeSplitPanel();
          refresh();
        }).catch(function(err) {
          console.error('[budget] split save failed:', err);
          if (window.dmAlert) window.dmAlert('Could not save split: ' + (err.message || err));
        });
      });
    }
    render();
  }

  var _lastValues = {};
  function handleFieldChange(e) {
    var el = e.target;
    var tr = el.closest('tr[data-tx]');
    if (!tr) return;
    var id = tr.getAttribute('data-tx');
    var field = el.getAttribute('data-field');
    var value = el.value;
    var key = id + ':' + field;
    if (_lastValues[key] === value) return;
    _lastValues[key] = value;

    var updates = {};
    if (field === 'amount') {
      updates.amount = window.dmBudget.parseMoney(value);
    } else if (field === 'categoryId') {
      updates.categoryId = value || null;
    } else {
      updates[field] = value;
    }
    window.dmBudget.updateTransaction(id, updates).catch(function(err) {
      console.error('[budget] update tx failed:', err);
    });
  }

  var _allTx = [];
  var _allCats = [];
  var _refreshPending = false;

  function refresh() {
    if (_refreshPending) return;
    _refreshPending = true;
    Promise.resolve().then(function() {
      _refreshPending = false;
      return Promise.all([
        window.dmBudget.getTransactions({}),
        window.dmBudget.getCategories()
      ]);
    }).then(function(r) {
      _allTx = r[0]; _allCats = r[1];
      populateMonthSelect(_allTx);
      populateCategorySelect(_allCats);
      renderTable(applyFilters(_allTx), _allCats);
    }).catch(function(err) {
      console.error('[budget/tx] refresh failed:', err);
      var localOnly = window.dmBudget && window.dmBudget.isLocalOnly && window.dmBudget.isLocalOnly();
      var signedIn = window.dmAuth && window.dmAuth.currentUser;
      var demo = window.dmDemo && window.dmDemo.isActive();
      if (!signedIn && !localOnly && !demo) {
        $('#dm-tx-body').innerHTML = '<div class="dm-tx-empty">' +
          '<div style="margin-bottom:4px;">Sign in to view transactions</div>' +
          '<div style="opacity:0.7; font-size:0.85rem; margin-bottom:10px;">Or enable local-only mode in Settings &rarr; Budget.</div>' +
          '<button type="button" id="dm-tx-signin" style="padding:8px 16px; border:0; border-radius:6px; background:var(--color-accent); color:#fff; font-weight:600; cursor:pointer;">Sign in with Google</button>' +
          '</div>';
        var btn = document.getElementById('dm-tx-signin');
        if (btn && window.dmSignIn) btn.addEventListener('click', function() { window.dmSignIn(); });
      } else {
        $('#dm-tx-body').innerHTML = '<div class="dm-tx-empty">Could not load transactions.<br><small>' + escapeHtml(err.message || String(err)) + '</small></div>';
      }
    });
  }

  function init() {
    $('#dm-tx-month').value = window.dmBudget.currentMonth();
    $('#dm-tx-month').addEventListener('change', function() { renderTable(applyFilters(_allTx), _allCats); });
    $('#dm-tx-category').addEventListener('change', function() { renderTable(applyFilters(_allTx), _allCats); });
    $('#dm-tx-search').addEventListener('input', function() { renderTable(applyFilters(_allTx), _allCats); });
    refresh();
    document.addEventListener('dm-budget-updated', refresh);
    window.addEventListener('dm-budget-updated', refresh);
    document.addEventListener('dm-sync-complete', refresh);
  }

  function waitForBudget() {
    return (window.dmAuthReady || Promise.resolve()).then(function() {
      // dm-sync.html may still be evaluating when dmAuthReady resolves
      // (especially under fast mock-auth in tests). Poll briefly for
      // window.dmBudget before giving up.
      return new Promise(function(resolve) {
        var tries = 0;
        (function spin() {
          if (window.dmBudget) return resolve(window.dmBudget);
          if (++tries > 100) return resolve(null); // ~5s max
          setTimeout(spin, 50);
        })();
      });
    });
  }

  waitForBudget().then(function(api) {
    if (!api) {
      $('#dm-tx-body').innerHTML = '<div class="dm-tx-empty">Budget data layer not loaded. Please reload.</div>';
      return;
    }
    init();
  });
})();
</script>
