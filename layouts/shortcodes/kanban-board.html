<script>
(function() {
  'use strict';

  var container = document.getElementById('kanban');
  if (!container) return;

  var authEl = document.getElementById('kanban-auth');
  var loadingEl = document.getElementById('kanban-loading');
  var emptyEl = document.getElementById('kanban-empty');
  var contentEl = document.getElementById('kanban-content');
  var signinBtn = document.getElementById('kanban-signin-btn');

  var boardEl = document.getElementById('kanban-board');

  // Dynamic column data — populated from dmSync kanbanColumns store
  var _kanbanColumns = [];  // Array of column objects from dmSync, sorted by order
  var columns = {};         // { statusSlug: DOM element } — built dynamically
  var counts = {};          // { statusSlug: DOM element } — built dynamically
  var _columnOrder = [];    // ['todo', 'in_progress', 'done', ...] — built dynamically

  var allTodos = [];
  var _sortableInstances = [];
  var _isDragging = false;
  var _renderPending = false;
  var _doneFilter = 'today'; // 'today' | '7days' | 'all'
  var _kanbanProjectMap = {}; // { projectId: { name, color } }
  var _kanbanFilterProjectIds = new Set(['__none__']); // Active project filters — default to "No project"
  var kanbanProjectFilterBar = document.getElementById('kanban-project-filter');
  var kanbanFilterChips = document.getElementById('kanban-pf-chips');
  var kanbanFilterTrigger = document.getElementById('kanban-pf-trigger');
  var kanbanFilterBadge = document.getElementById('kanban-pf-badge');

  var KANBAN_PROJECT_DARK_COLORS = {
    '#1976d2': '#64b5f6', '#388e3c': '#81c784', '#e65100': '#ffb74d',
    '#7b1fa2': '#ce93d8', '#00897b': '#4db6ac', '#c62828': '#ef5350',
    '#f9a825': '#fff176', '#ad1457': '#f06292', '#283593': '#7986cb',
    '#546e7a': '#90a4ae'
  };
  function getKanbanProjectDisplayColor(color) {
    if (!color) return 'var(--gray-400)';
    var isDark = document.documentElement.classList.contains('dark') ||
                 (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches &&
                  !document.documentElement.classList.contains('light'));
    return isDark ? (KANBAN_PROJECT_DARK_COLORS[color.toLowerCase()] || color) : color;
  }

  var _kanbanDropdownOpen = false;

  function updateKanbanProjectFilter() {
    if (!kanbanProjectFilterBar) return;
    var projectIds = Object.keys(_kanbanProjectMap);
    if (projectIds.length === 0) {
      kanbanProjectFilterBar.style.display = 'none';
      return;
    }
    kanbanProjectFilterBar.style.display = '';
    // Remove stale selections
    _kanbanFilterProjectIds.forEach(function(id) {
      if (id !== '__none__' && !_kanbanProjectMap[id]) _kanbanFilterProjectIds.delete(id);
    });
    // Update badge
    var count = _kanbanFilterProjectIds.size;
    if (count > 0) {
      kanbanFilterBadge.textContent = count;
      kanbanFilterBadge.style.display = '';
    } else {
      kanbanFilterBadge.style.display = 'none';
    }
    // Render selected chips
    var html = '';
    _kanbanFilterProjectIds.forEach(function(id) {
      var name, color;
      if (id === '__none__') {
        name = 'No project';
        color = 'var(--gray-500)';
      } else {
        var p = _kanbanProjectMap[id];
        if (!p) return;
        name = p.name;
        color = getKanbanProjectDisplayColor(p.color);
      }
      html += '<span class="kanban-pf-chip" style="background:' + color + ';">';
      html += '<span class="kanban-pf-chip-dot"></span>';
      html += '<span class="kanban-pf-chip-name">' + escapeHtml(name) + '</span>';
      html += '<span class="kanban-pf-chip-x" data-pf-remove="' + id + '">&times;</span>';
      html += '</span>';
    });
    kanbanFilterChips.innerHTML = html;
    // Update dropdown checkboxes if open
    if (_kanbanDropdownOpen) {
      var dropdown = kanbanProjectFilterBar.querySelector('.kanban-pf-dropdown');
      if (dropdown) {
        dropdown.querySelectorAll('.kanban-pf-dropdown-row').forEach(function(row) {
          var pid = row.getAttribute('data-pf-id');
          var check = row.querySelector('.kanban-pf-dropdown-check');
          if (check) {
            if (_kanbanFilterProjectIds.has(pid)) {
              check.classList.add('checked');
            } else {
              check.classList.remove('checked');
            }
          }
        });
      }
    }
  }

  function openKanbanProjectDropdown() {
    if (_kanbanDropdownOpen) { closeKanbanProjectDropdown(); return; }
    _kanbanDropdownOpen = true;
    kanbanFilterTrigger.classList.add('active');
    var projectIds = Object.keys(_kanbanProjectMap);
    var html = '<div class="kanban-pf-dropdown">';
    html += '<button type="button" class="kanban-pf-dropdown-clear" data-pf-clear>Clear all</button>';
    // "No project" row
    var noChecked = _kanbanFilterProjectIds.has('__none__');
    html += '<button type="button" class="kanban-pf-dropdown-row" data-pf-id="__none__">';
    html += '<span class="kanban-pf-dropdown-check' + (noChecked ? ' checked' : '') + '"></span>';
    html += '<span class="kanban-pf-dropdown-dot" style="background:var(--gray-400);"></span>';
    html += '<span class="kanban-pf-dropdown-name">No project</span>';
    html += '</button>';
    // Project rows
    projectIds.forEach(function(pid) {
      var p = _kanbanProjectMap[pid];
      var displayColor = getKanbanProjectDisplayColor(p.color);
      var isChecked = _kanbanFilterProjectIds.has(pid);
      html += '<button type="button" class="kanban-pf-dropdown-row" data-pf-id="' + pid + '">';
      html += '<span class="kanban-pf-dropdown-check' + (isChecked ? ' checked' : '') + '"></span>';
      html += '<span class="kanban-pf-dropdown-dot" style="background:' + displayColor + ';"></span>';
      html += '<span class="kanban-pf-dropdown-name">' + escapeHtml(p.name) + '</span>';
      html += '</button>';
    });
    html += '</div>';
    kanbanProjectFilterBar.insertAdjacentHTML('beforeend', html);
    // Close on outside click (next tick)
    setTimeout(function() {
      document.addEventListener('mousedown', _handleKanbanDropdownOutside);
      document.addEventListener('keydown', _handleKanbanDropdownEscape);
    }, 0);
  }

  function closeKanbanProjectDropdown() {
    _kanbanDropdownOpen = false;
    kanbanFilterTrigger.classList.remove('active');
    var dropdown = kanbanProjectFilterBar.querySelector('.kanban-pf-dropdown');
    if (dropdown) dropdown.remove();
    document.removeEventListener('mousedown', _handleKanbanDropdownOutside);
    document.removeEventListener('keydown', _handleKanbanDropdownEscape);
  }

  function _handleKanbanDropdownOutside(e) {
    if (!kanbanProjectFilterBar.contains(e.target)) closeKanbanProjectDropdown();
  }
  function _handleKanbanDropdownEscape(e) {
    if (e.key === 'Escape') { closeKanbanProjectDropdown(); e.stopPropagation(); }
  }

  // Persist current project filter selection to IDB + Firestore
  function _saveKanbanFilter() {
    if (window.dmSync && window.dmSync.setPageFilterProjectIds) {
      window.dmSync.setPageFilterProjectIds('kanban', Array.from(_kanbanFilterProjectIds));
    }
  }

  // Event delegation for trigger, dropdown rows, chip remove, clear all
  if (kanbanProjectFilterBar) {
    kanbanProjectFilterBar.addEventListener('click', function(e) {
      // Trigger button
      if (e.target.closest('.kanban-pf-trigger')) {
        openKanbanProjectDropdown();
        return;
      }
      // Clear all
      if (e.target.closest('[data-pf-clear]')) {
        _kanbanFilterProjectIds.clear();
        updateKanbanProjectFilter();
        _saveKanbanFilter();
        renderBoard();
        return;
      }
      // Dropdown row toggle
      var row = e.target.closest('.kanban-pf-dropdown-row');
      if (row) {
        var pid = row.getAttribute('data-pf-id');
        if (_kanbanFilterProjectIds.has(pid)) {
          _kanbanFilterProjectIds.delete(pid);
        } else {
          _kanbanFilterProjectIds.add(pid);
        }
        updateKanbanProjectFilter();
        _saveKanbanFilter();
        renderBoard();
        return;
      }
      // Chip remove
      var removeBtn = e.target.closest('[data-pf-remove]');
      if (removeBtn) {
        var rid = removeBtn.getAttribute('data-pf-remove');
        _kanbanFilterProjectIds.delete(rid);
        updateKanbanProjectFilter();
        _saveKanbanFilter();
        renderBoard();
        return;
      }
    });
  }

  function getStartOfDay(date) {
    return new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
  }

  // ─── Dynamic column helpers ───
  function isColumnDone(statusSlug) {
    return _kanbanColumns.some(function(c) { return c.status === statusSlug && c.isDoneColumn; });
  }

  function getFirstDoneColumnStatus() {
    var col = _kanbanColumns.find(function(c) { return c.isDoneColumn; });
    return col ? col.status : null;
  }

  function getFirstColumnStatus() {
    return _kanbanColumns.length > 0 ? _kanbanColumns[0].status : 'todo';
  }

  // Available colors for column dots
  var COLUMN_COLORS = [
    '#42a5f5', '#ffa726', '#66bb6a', '#ef5350', '#ab47bc',
    '#26c6da', '#ff7043', '#9ccc65', '#5c6bc0', '#ec407a',
    '#78909c', '#8d6e63'
  ];

  // ─── Render columns from _kanbanColumns data ───
  function renderColumns() {
    if (!boardEl) return;
    // Destroy existing sortable instances before clearing DOM
    _sortableInstances.forEach(function(s) { s.destroy(); });
    _sortableInstances = [];

    boardEl.innerHTML = '';
    columns = {};
    counts = {};
    _columnOrder = [];

    _kanbanColumns.forEach(function(colDef) {
      var slug = colDef.status;
      _columnOrder.push(slug);

      var colDiv = document.createElement('div');
      colDiv.className = 'kanban-column';
      colDiv.setAttribute('data-kanban-status', slug);
      colDiv.setAttribute('data-kanban-col-id', colDef.id);

      var headerHtml = '<div class="kanban-column-header" style="position:relative;">';
      // Drag handle for column reordering
      headerHtml += '<span class="kanban-col-drag-handle" title="Drag to reorder"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="8" cy="4" r="2"/><circle cx="16" cy="4" r="2"/><circle cx="8" cy="12" r="2"/><circle cx="16" cy="12" r="2"/><circle cx="8" cy="20" r="2"/><circle cx="16" cy="20" r="2"/></svg></span>';
      headerHtml += '<div class="kanban-column-header-left">';
      headerHtml += '<span class="kanban-column-dot" style="background:' + escapeHtml(colDef.color) + ';"></span>';
      headerHtml += '<h3 class="kanban-col-name" data-col-id="' + colDef.id + '">' + escapeHtml(colDef.name) + '</h3>';
      headerHtml += '<span class="kanban-column-count" data-col-count="' + slug + '">0</span>';
      // Done filter for done columns
      if (colDef.isDoneColumn) {
        headerHtml += '<select class="kanban-done-filter" data-done-filter="' + slug + '">';
        headerHtml += '<option value="today"' + (_doneFilter === 'today' ? ' selected' : '') + '>Today</option>';
        headerHtml += '<option value="7days"' + (_doneFilter === '7days' ? ' selected' : '') + '>7 days</option>';
        headerHtml += '<option value="all"' + (_doneFilter === 'all' ? ' selected' : '') + '>All</option>';
        headerHtml += '</select>';
      }
      headerHtml += '</div>';
      // Settings button
      headerHtml += '<div class="kanban-column-header-actions">';
      headerHtml += '<button type="button" class="kanban-col-settings-btn" data-col-settings="' + colDef.id + '" title="Column settings">';
      headerHtml += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>';
      headerHtml += '</button>';
      headerHtml += '</div>';
      headerHtml += '</div>';

      colDiv.innerHTML = headerHtml;

      var itemsDiv = document.createElement('div');
      itemsDiv.className = 'kanban-column-items';
      itemsDiv.setAttribute('data-col-items', slug);
      colDiv.appendChild(itemsDiv);

      var addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'kanban-quick-add-btn';
      addBtn.setAttribute('data-kanban-add', slug);
      addBtn.textContent = '+ Add task';
      colDiv.appendChild(addBtn);

      boardEl.appendChild(colDiv);

      columns[slug] = itemsDiv;
      counts[slug] = colDiv.querySelector('[data-col-count="' + slug + '"]');
    });

    // Add the "+ Add Column" button at the end
    var addColBtn = document.createElement('button');
    addColBtn.type = 'button';
    addColBtn.className = 'kanban-add-column';
    addColBtn.title = 'Add column';
    addColBtn.innerHTML = '+';
    addColBtn.addEventListener('click', handleAddColumn);
    boardEl.appendChild(addColBtn);

    // Wire up event listeners
    initColumnEvents();
    initQuickAdd();
  }

  // ─── Column management event listeners ───
  var _openColMenuId = null;

  function initColumnEvents() {
    // Settings buttons
    boardEl.querySelectorAll('.kanban-col-settings-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var colId = btn.getAttribute('data-col-settings');
        if (_openColMenuId === colId) {
          closeColMenu();
        } else {
          openColMenu(colId, btn);
        }
      });
    });

    // Done filter selects
    boardEl.querySelectorAll('.kanban-done-filter').forEach(function(sel) {
      sel.addEventListener('change', function() {
        _doneFilter = sel.value;
        renderBoard();
      });
    });

    // Double-click column name to rename
    boardEl.querySelectorAll('.kanban-col-name').forEach(function(nameEl) {
      nameEl.addEventListener('dblclick', function() {
        var colId = nameEl.getAttribute('data-col-id');
        startRename(colId, nameEl);
      });
    });
  }

  function openColMenu(colId, anchorBtn) {
    closeColMenu();
    _openColMenuId = colId;
    var colDef = _kanbanColumns.find(function(c) { return c.id === colId; });
    if (!colDef) return;

    var menu = document.createElement('div');
    menu.className = 'kanban-col-menu';
    menu.setAttribute('data-col-menu', colId);

    // Rename
    menu.innerHTML = '<button type="button" class="kanban-col-menu-item" data-action="rename">Rename</button>';
    // Color picker
    menu.innerHTML += '<div class="kanban-col-menu-item" style="flex-direction:column;align-items:flex-start;gap:4px;cursor:default;"><span style="font-size:0.72rem;color:var(--text-muted);">Color</span><div class="kanban-col-color-row">' +
      COLUMN_COLORS.map(function(c) {
        return '<button type="button" class="kanban-col-color-swatch' + (c === colDef.color ? ' active' : '') + '" style="background:' + c + ';" data-action="color" data-color="' + c + '"></button>';
      }).join('') +
      '</div></div>';
    // Toggle isDoneColumn
    menu.innerHTML += '<button type="button" class="kanban-col-menu-item" data-action="toggle-done">' +
      (colDef.isDoneColumn ? 'Unmark as Done column' : 'Mark as Done column') + '</button>';
    menu.innerHTML += '<div class="kanban-col-menu-sep"></div>';
    // Delete
    menu.innerHTML += '<button type="button" class="kanban-col-menu-item kanban-col-menu-item--danger" data-action="delete">Delete column</button>';

    // Position relative to anchor button, appended to body to avoid overflow clipping
    document.body.appendChild(menu);
    var rect = anchorBtn.getBoundingClientRect();
    menu.style.top = (rect.bottom + 4) + 'px';
    menu.style.left = Math.max(0, rect.right - menu.offsetWidth) + 'px';
    var header = anchorBtn.closest('.kanban-column-header');

    // Event delegation
    menu.addEventListener('click', function(e) {
      var item = e.target.closest('[data-action]');
      if (!item) return;
      var action = item.getAttribute('data-action');
      if (action === 'rename') {
        closeColMenu();
        var nameEl = header.querySelector('.kanban-col-name');
        startRename(colId, nameEl);
      } else if (action === 'color') {
        var newColor = item.getAttribute('data-color');
        changeColumnColor(colId, newColor);
        // Update active state
        menu.querySelectorAll('.kanban-col-color-swatch').forEach(function(s) {
          s.classList.toggle('active', s.getAttribute('data-color') === newColor);
        });
      } else if (action === 'toggle-done') {
        toggleDoneColumn(colId);
        closeColMenu();
      } else if (action === 'delete') {
        closeColMenu();
        showDeleteColumnDialog(colId);
      }
    });

    // Close on outside click
    setTimeout(function() {
      document.addEventListener('mousedown', _handleColMenuOutside);
      document.addEventListener('keydown', _handleColMenuEscape);
    }, 0);
  }

  function closeColMenu() {
    _openColMenuId = null;
    var existing = document.querySelector('.kanban-col-menu');
    if (existing) existing.remove();
    document.removeEventListener('mousedown', _handleColMenuOutside);
    document.removeEventListener('keydown', _handleColMenuEscape);
  }

  function _handleColMenuOutside(e) {
    var menu = document.querySelector('.kanban-col-menu');
    if (menu && !menu.contains(e.target) && !e.target.closest('.kanban-col-settings-btn')) {
      closeColMenu();
    }
  }
  function _handleColMenuEscape(e) {
    if (e.key === 'Escape') { closeColMenu(); e.stopPropagation(); }
  }

  // ─── Rename column ───
  function startRename(colId, nameEl) {
    var colDef = _kanbanColumns.find(function(c) { return c.id === colId; });
    if (!colDef) return;

    var input = document.createElement('input');
    input.type = 'text';
    input.className = 'kanban-col-rename-input';
    input.value = colDef.name;
    nameEl.replaceWith(input);
    input.focus();
    input.select();

    function commit() {
      var newName = input.value.trim();
      if (!newName) newName = colDef.name; // revert if empty
      if (newName !== colDef.name) {
        window.dmSync.updateKanbanColumn(colId, { name: newName }).then(function() {
          return window.dmSync.getAllKanbanColumns();
        }).then(function(cols) {
          _kanbanColumns = cols;
          renderColumns();
          renderBoard();
        });
      } else {
        // Restore name element
        var span = document.createElement('h3');
        span.className = 'kanban-col-name';
        span.setAttribute('data-col-id', colId);
        span.textContent = colDef.name;
        input.replaceWith(span);
        span.addEventListener('dblclick', function() { startRename(colId, span); });
      }
    }

    input.addEventListener('blur', commit);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.value = colDef.name; input.blur(); }
    });
  }

  // ─── Change column color ───
  function changeColumnColor(colId, newColor) {
    var colDef = _kanbanColumns.find(function(c) { return c.id === colId; });
    if (!colDef || colDef.color === newColor) return;
    window.dmSync.updateKanbanColumn(colId, { color: newColor }).then(function() {
      colDef.color = newColor;
      // Update dot inline
      var colEl = boardEl.querySelector('[data-kanban-col-id="' + colId + '"]');
      if (colEl) {
        var dot = colEl.querySelector('.kanban-column-dot');
        if (dot) dot.style.background = newColor;
      }
    });
  }

  // ─── Toggle isDoneColumn ───
  function toggleDoneColumn(colId) {
    var colDef = _kanbanColumns.find(function(c) { return c.id === colId; });
    if (!colDef) return;
    var newVal = !colDef.isDoneColumn;
    window.dmSync.updateKanbanColumn(colId, { isDoneColumn: newVal }).then(function() {
      return window.dmSync.getAllKanbanColumns();
    }).then(function(cols) {
      _kanbanColumns = cols;
      renderColumns();
      renderBoard();
    });
  }

  // ─── Add column ───
  function handleAddColumn() {
    var order = _kanbanColumns.length;
    // Pick a color not already used
    var usedColors = _kanbanColumns.map(function(c) { return c.color; });
    var color = COLUMN_COLORS.find(function(c) { return usedColors.indexOf(c) === -1; }) || COLUMN_COLORS[order % COLUMN_COLORS.length];

    window.dmSync.createKanbanColumn({
      name: 'New Column',
      color: color,
      order: order,
      isDoneColumn: false
    }).then(function() {
      return window.dmSync.getAllKanbanColumns();
    }).then(function(cols) {
      _kanbanColumns = cols;
      renderColumns();
      renderBoard();
      // Auto-start rename on the new column
      var lastCol = _kanbanColumns[_kanbanColumns.length - 1];
      if (lastCol) {
        var nameEl = boardEl.querySelector('.kanban-col-name[data-col-id="' + lastCol.id + '"]');
        if (nameEl) startRename(lastCol.id, nameEl);
      }
    });
  }

  // ─── Delete column ───
  function showDeleteColumnDialog(colId) {
    var colDef = _kanbanColumns.find(function(c) { return c.id === colId; });
    if (!colDef) return;
    if (_kanbanColumns.length <= 1) {
      alert('Cannot delete the last column.');
      return;
    }

    var otherCols = _kanbanColumns.filter(function(c) { return c.id !== colId; });
    var overlay = document.createElement('div');
    overlay.className = 'kanban-col-delete-overlay';

    var optionsHtml = otherCols.map(function(c) {
      return '<option value="' + c.status + '">' + escapeHtml(c.name) + '</option>';
    }).join('');

    overlay.innerHTML = '<div class="kanban-col-delete-dialog">' +
      '<h4>Delete "' + escapeHtml(colDef.name) + '"?</h4>' +
      '<p>Tasks in this column will be moved to another column.</p>' +
      '<label>Move tasks to:</label>' +
      '<select class="kanban-col-delete-target">' + optionsHtml + '</select>' +
      '<div class="kanban-col-delete-actions">' +
        '<button type="button" class="kanban-col-delete-cancel">Cancel</button>' +
        '<button type="button" class="kanban-col-delete-confirm">Delete</button>' +
      '</div>' +
    '</div>';

    document.body.appendChild(overlay);

    overlay.querySelector('.kanban-col-delete-cancel').addEventListener('click', function() {
      overlay.remove();
    });
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) overlay.remove();
    });
    overlay.querySelector('.kanban-col-delete-confirm').addEventListener('click', function() {
      var targetStatus = overlay.querySelector('.kanban-col-delete-target').value;
      overlay.remove();
      window.dmSync.deleteKanbanColumn(colId, targetStatus).then(function() {
        return window.dmSync.getAllKanbanColumns();
      }).then(function(cols) {
        _kanbanColumns = cols;
        // Refresh todos since tasks were migrated
        return window.dmSync.getAllTodos();
      }).then(function(todos) {
        allTodos = todos || [];
        renderColumns();
        renderBoard();
      });
    });
  }

  function filterDoneTodos(doneTodos) {
    if (_doneFilter === 'all') return doneTodos;
    var now = new Date();
    var cutoff;
    if (_doneFilter === 'today') {
      cutoff = getStartOfDay(now);
    } else if (_doneFilter === '7days') {
      var d = new Date(now);
      d.setDate(d.getDate() - 7);
      cutoff = getStartOfDay(d);
    }
    return doneTodos.filter(function(t) {
      return t.completedAt && t.completedAt >= cutoff;
    });
  }

  // ─── BuJo icons ───
  var BUJO_ICONS = {
    task: '<svg class="kanban-card-bujo" width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="12" cy="12" r="4"/></svg>',
    event: '<svg class="kanban-card-bujo" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="6"/></svg>',
    note: '<svg class="kanban-card-bujo" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>'
  };

  // ─── UI state management ───
  function showState(state) {
    authEl.style.display = state === 'auth' ? '' : 'none';
    loadingEl.style.display = state === 'loading' ? '' : 'none';
    emptyEl.style.display = state === 'empty' ? '' : 'none';
    contentEl.style.display = state === 'content' ? '' : 'none';
  }

  // ─── Render helpers ───
  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function formatMinutes(min) {
    if (!min || min <= 0) return '';
    if (min < 60) return min + 'm';
    var h = Math.floor(min / 60);
    var m = min % 60;
    return m > 0 ? h + 'h ' + m + 'm' : h + 'h';
  }

  function formatRelativeDate(dateStr) {
    if (!dateStr) return null;
    var parts = dateStr.split('-');
    if (parts.length !== 3) return { label: dateStr, cssClass: '' };
    var target = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    var now = new Date();
    var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var diffDays = Math.round((target - today) / 86400000);
    if (diffDays === 0) return { label: 'Today', cssClass: 'kanban-card-date--today' };
    if (diffDays === 1) return { label: 'Tomorrow', cssClass: 'kanban-card-date--tomorrow' };
    if (diffDays === -1) return { label: 'Yesterday', cssClass: 'kanban-card-date--overdue' };
    if (diffDays < -1) return { label: Math.abs(diffDays) + 'd overdue', cssClass: 'kanban-card-date--overdue' };
    if (diffDays <= 7) return { label: 'In ' + diffDays + 'd', cssClass: '' };
    return { label: dateStr, cssClass: '' };
  }

  function formatCardAge(createdAt) {
    if (!createdAt) return null;
    var now = Date.now();
    var diffMs = now - createdAt;
    var diffDays = Math.floor(diffMs / 86400000);
    if (diffDays < 1) return null;
    var label, cssClass = '';
    if (diffDays < 7) {
      label = diffDays + 'd';
    } else if (diffDays < 30) {
      label = Math.floor(diffDays / 7) + 'w';
    } else {
      label = Math.floor(diffDays / 30) + 'mo';
    }
    if (diffDays >= 14) {
      cssClass = 'kanban-card-age--critical';
    } else if (diffDays >= 7) {
      cssClass = 'kanban-card-age--warn';
    }
    return { label: label, cssClass: cssClass };
  }

  // Helper: map light-mode color to dark-mode equivalent
  function getProjectDarkColor(lightColor) {
    var map = {
      '#1976d2': '#64b5f6', '#388e3c': '#81c784', '#e65100': '#ffb74d',
      '#7b1fa2': '#ce93d8', '#00897b': '#4db6ac', '#c62828': '#ef5350',
      '#f9a825': '#fff176', '#ad1457': '#f06292', '#283593': '#7986cb',
      '#546e7a': '#90a4ae'
    };
    return map[lightColor] || null;
  }

  function renderCard(todo) {
    var bujoIcon = BUJO_ICONS[todo.bujoType] || BUJO_ICONS.task;
    var title = escapeHtml(todo.title || 'Untitled');
    var isDone = isColumnDone(todo.kanbanStatus);

    var metaParts = [];
    if (todo.category) {
      metaParts.push('<span class="kanban-card-category">' + escapeHtml(todo.category) + '</span>');
    }
    if (todo.projectId && _kanbanProjectMap[todo.projectId]) {
      var proj = _kanbanProjectMap[todo.projectId];
      var isDarkMode = document.documentElement.classList.contains('dark');
      var dotColor = isDarkMode ? (getProjectDarkColor(proj.color) || proj.color) : proj.color;
      metaParts.push('<span class="kanban-card-project"><span class="kanban-card-project-dot" style="background:' + dotColor + ';"></span>' + escapeHtml(proj.name) + '</span>');
    }
    if (todo.estimatedMin) {
      metaParts.push('<span class="kanban-card-time">' + formatMinutes(todo.estimatedMin) + '</span>');
    }
    if (todo.scheduledDate) {
      var relDate = formatRelativeDate(todo.scheduledDate);
      if (relDate) {
        metaParts.push('<span class="kanban-card-date ' + relDate.cssClass + '">' + escapeHtml(relDate.label) + '</span>');
      }
    }
    // Show subtask progress bar
    var childCount = allTodos.filter(function(t) { return t.parentId === todo.id && !t.deletedAt; }).length;
    if (childCount > 0) {
      var doneChildren = allTodos.filter(function(t) {
        return t.parentId === todo.id && !t.deletedAt && isColumnDone(t.kanbanStatus);
      }).length;
      var pct = Math.round((doneChildren / childCount) * 100);
      metaParts.push('<span class="kanban-subtask-bar">' +
        '<span class="kanban-subtask-bar-track"><span class="kanban-subtask-bar-fill" style="width:' + pct + '%"></span></span>' +
        '<span class="kanban-subtask-bar-label">' + doneChildren + '/' + childCount + '</span>' +
        '</span>');
    }
    // Show notes indicator
    if (todo.notes && todo.notes.trim()) {
      metaParts.push('<span class="kanban-card-notes" title="Has notes"></span>');
    }
    // Show card age (only for To Do and In Progress)
    if (!isDone && todo.createdAt) {
      var age = formatCardAge(todo.createdAt);
      if (age) {
        metaParts.push('<span class="kanban-card-age ' + age.cssClass + '" title="Created ' + age.label + ' ago">' + age.label + '</span>');
      }
    }

    var html = '<div class="kanban-card' + (isDone ? ' kanban-card--done' : '') + '" data-todo-id="' + todo.id + '">';
    html += '<div class="kanban-card-header">';
    html += bujoIcon;
    html += '<span class="kanban-card-title">' + title + '</span>';
    // Inline pomodoro start/pause/stop buttons (only for undone tasks)
    if (!isDone && (todo.bujoType === 'task' || !todo.bujoType)) {
      var isTimerActive = window.dmPomodoro && window.dmPomodoro.isActive(todo.id);
      var isTimerRunning = isTimerActive && window.dmPomodoro.isTimerRunning();
      if (isTimerActive) {
        var pomoBtnTitle = isTimerRunning ? 'Pause timer' : 'Resume timer';
        html += '<button type="button" class="kanban-card-pomo pomodoro-start active" data-pomodoro-id="' + todo.id + '" title="' + pomoBtnTitle + '" aria-label="' + pomoBtnTitle + '">';
        if (isTimerRunning) {
          html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="5" y="3" width="5" height="18" rx="1"></rect><rect x="14" y="3" width="5" height="18" rx="1"></rect></svg>';
        } else {
          html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>';
        }
        html += '</button>';
        html += '<button type="button" class="kanban-card-pomo pomo-stop" data-pomodoro-stop-id="' + todo.id + '" title="Discard &amp; close" aria-label="Discard timer">';
        html += '<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="4" y="4" width="16" height="16" rx="2"></rect></svg>';
        html += '</button>';
      } else {
        html += '<button type="button" class="kanban-card-pomo pomodoro-start" data-pomodoro-id="' + todo.id + '" title="Start Pomodoro" aria-label="Start Pomodoro">';
        html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>';
        html += '</button>';
      }
    }
    html += '</div>';
    if (metaParts.length > 0) {
      html += '<div class="kanban-card-meta">' + metaParts.join('') + '</div>';
    }
    html += '</div>';
    return html;
  }

  function renderBoard() {
    // Defer re-renders while a drag is in progress to prevent SortableJS errors
    if (_isDragging) {
      _renderPending = true;
      return;
    }
    // Only show parent-level tasks (no subtasks as standalone cards)
    var visibleTodos = allTodos.filter(function(t) {
      if (t.deletedAt) return false;
      if (t.parentId) return false;
      var s = t.status || 'active';
      return s === 'active' || s === 'done';
    });

    // Apply project filter (multi-select)
    if (_kanbanFilterProjectIds.size > 0) {
      visibleTodos = visibleTodos.filter(function(t) {
        if (_kanbanFilterProjectIds.has('__none__') && !t.projectId) return true;
        return t.projectId && _kanbanFilterProjectIds.has(t.projectId);
      });
    }

    // Backfill kanbanStatus for legacy tasks
    var firstDone = getFirstDoneColumnStatus();
    var firstCol = getFirstColumnStatus();
    visibleTodos.forEach(function(t) {
      if (!t.kanbanStatus) {
        t.kanbanStatus = t.done ? (firstDone || firstCol) : firstCol;
      }
    });

    // Group by kanbanStatus into dynamic columns
    var groups = {};
    _columnOrder.forEach(function(slug) { groups[slug] = []; });
    visibleTodos.forEach(function(t) {
      var col = t.kanbanStatus || firstCol;
      if (!groups[col]) col = firstCol; // fallback for unknown status
      groups[col].push(t);
    });

    // Filter done columns by time range
    _columnOrder.forEach(function(slug) {
      if (isColumnDone(slug)) {
        groups[slug] = filterDoneTodos(groups[slug]);
      }
    });

    // Sort: within each column, sort by kanbanOrder (ascending)
    _columnOrder.forEach(function(col) {
      groups[col].sort(function(a, b) {
        return (a.kanbanOrder || 0) - (b.kanbanOrder || 0);
      });
    });

    // Render each column
    _columnOrder.forEach(function(col) {
      var items = groups[col] || [];
      var html = '';
      if (items.length === 0) {
        html = '<div class="kanban-column-empty">Drag tasks here</div>';
      } else {
        items.forEach(function(t) {
          html += renderCard(t);
        });
      }
      if (columns[col]) columns[col].innerHTML = html;
      if (counts[col]) counts[col].textContent = items.length;
    });

    // Set up click handlers on cards
    container.querySelectorAll('.kanban-card').forEach(function(card) {
      card.addEventListener('click', function(e) {
        // Don't open edit panel if user is dragging
        if (card.classList.contains('sortable-chosen')) return;
        var todoId = card.getAttribute('data-todo-id');
        var todo = allTodos.find(function(t) { return t.id === todoId; });
        if (todo && window.dmTodoEdit) {
          window.dmTodoEdit.open(todo, function(result) {
            if (!result) return;
            applyEditResult(todo, result);
          }, card);
        }
      });
    });

    // Pomodoro start/pause button
    container.querySelectorAll('.kanban-card-pomo.pomodoro-start[data-pomodoro-id]').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var todoId = btn.getAttribute('data-pomodoro-id');
        var todo = allTodos.find(function(t) { return t.id === todoId; });
        if (!todo || !window.dmPomodoro) return;
        if (window.dmPomodoro.isActive(todoId)) {
          window.dmPomodoro.togglePause();
        } else {
          window.dmPomodoro.start(todoId, todo.title);
        }
        renderBoard();
      });
    });

    // Pomodoro stop button
    container.querySelectorAll('.kanban-card-pomo[data-pomodoro-stop-id]').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (window.dmPomodoro) {
          window.dmPomodoro.reset();
          window.dmPomodoro.stop();
          renderBoard();
        }
      });
    });

    // Initialize SortableJS
    initSortable();
  }

  function applyEditResult(todo, result) {
    var firestoreUpdates = {};
    var localUpdates = {};

    if (result.title !== todo.title) {
      firestoreUpdates.title = result.title;
      localUpdates.title = result.title;
    }
    if (result.scheduledDate !== (todo.scheduledDate || null)) {
      firestoreUpdates.scheduledDate = result.scheduledDate || null;
      localUpdates.scheduledDate = result.scheduledDate || null;
    }
    if (result.estimatedMin !== (todo.estimatedMin || null)) {
      firestoreUpdates.estimatedMin = result.estimatedMin || null;
      localUpdates.estimatedMin = result.estimatedMin || null;
    }
    if (result.pomodoroCount != null && result.pomodoroCount !== (todo.pomodoroCount || 0)) {
      firestoreUpdates.pomodoroCount = result.pomodoroCount;
      localUpdates.pomodoroCount = result.pomodoroCount;
    }
    if (result.pomodoroLength != null && result.pomodoroLength !== (todo.pomodoroLength || 0)) {
      firestoreUpdates.pomodoroLength = result.pomodoroLength;
      localUpdates.pomodoroLength = result.pomodoroLength;
    }
    if (result.breakLength != null && result.breakLength !== (todo.breakLength || 0)) {
      firestoreUpdates.breakLength = result.breakLength;
      localUpdates.breakLength = result.breakLength;
    }
    if (result.category !== (todo.category || null)) {
      firestoreUpdates.category = result.category || null;
      localUpdates.category = result.category || null;
    }
    if (result.bujoType && result.bujoType !== (todo.bujoType || 'task')) {
      firestoreUpdates.bujoType = result.bujoType;
      localUpdates.bujoType = result.bujoType;
    }
    if (result.notes !== (todo.notes || '')) {
      firestoreUpdates.notes = result.notes || '';
      localUpdates.notes = result.notes || '';
    }
    // BuJo state — sync with done/status/kanbanStatus
    if (result.bujoState && result.bujoState !== (todo.bujoState || 'open')) {
      firestoreUpdates.bujoState = result.bujoState;
      localUpdates.bujoState = result.bujoState;
      if (result.bujoState === 'done') {
        var doneStatus = getFirstDoneColumnStatus() || 'done';
        firestoreUpdates.done = true;
        firestoreUpdates.status = 'done';
        firestoreUpdates.kanbanStatus = doneStatus;
        localUpdates.done = true;
        localUpdates.status = 'done';
        localUpdates.kanbanStatus = doneStatus;
      } else if (result.bujoState === 'open') {
        var openStatus = getFirstColumnStatus();
        firestoreUpdates.done = false;
        firestoreUpdates.status = 'active';
        firestoreUpdates.kanbanStatus = openStatus;
        localUpdates.done = false;
        localUpdates.status = 'active';
        localUpdates.kanbanStatus = openStatus;
      } else {
        // migrated / scheduled — keep active, reset kanban to first column
        var fallbackStatus = getFirstColumnStatus();
        firestoreUpdates.done = false;
        firestoreUpdates.status = 'active';
        firestoreUpdates.kanbanStatus = fallbackStatus;
        localUpdates.done = false;
        localUpdates.status = 'active';
        localUpdates.kanbanStatus = fallbackStatus;
      }
    }
    // Kanban status — only apply if BuJo state didn't already handle it
    var bujoChanged = result.bujoState && result.bujoState !== (todo.bujoState || 'open');
    if (!bujoChanged && result.kanbanStatus && result.kanbanStatus !== (todo.kanbanStatus || getFirstColumnStatus())) {
      firestoreUpdates.kanbanStatus = result.kanbanStatus;
      localUpdates.kanbanStatus = result.kanbanStatus;
      if (isColumnDone(result.kanbanStatus)) {
        firestoreUpdates.done = true;
        firestoreUpdates.status = 'done';
        firestoreUpdates.bujoState = 'done';
        firestoreUpdates.completedAt = firebase.firestore.FieldValue.serverTimestamp();
        localUpdates.done = true;
        localUpdates.status = 'done';
        localUpdates.bujoState = 'done';
        localUpdates.completedAt = Date.now();
      } else if (isColumnDone(todo.kanbanStatus || getFirstColumnStatus())) {
        // Moving out of Done — reopen
        firestoreUpdates.done = false;
        firestoreUpdates.status = 'active';
        firestoreUpdates.bujoState = 'open';
        firestoreUpdates.completedAt = null;
        localUpdates.done = false;
        localUpdates.status = 'active';
        localUpdates.bujoState = 'open';
        localUpdates.completedAt = null;
      }
    }

    if (Object.keys(firestoreUpdates).length > 0) {
      firestoreUpdates.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
      localUpdates.updatedAt = Date.now();

      // Apply local updates
      Object.keys(localUpdates).forEach(function(key) {
        todo[key] = localUpdates[key];
      });

      if (window.dmSync) {
        window.dmSync.firestoreWrite({
          collection: 'todos',
          docId: todo.id,
          op: 'update',
          data: firestoreUpdates,
          localOp: function() {
            return window.dmSync.putTodo(todo);
          }
        }).then(function() {
          renderBoard();
        }).catch(function(err) {
          console.error('[kanban] Error updating todo:', err);
        });
      }
    }
  }

  // ─── Drag and drop ───
  function initSortable() {
    // Destroy existing instances
    _sortableInstances.forEach(function(s) { s.destroy(); });
    _sortableInstances = [];

    if (typeof Sortable === 'undefined') return;

    _columnOrder.forEach(function(col) {
      var el = columns[col];
      if (!el) return;
      var sortable = Sortable.create(el, {
        group: 'kanban',
        forceFallback: true,
        animation: 150,
        ghostClass: 'kanban-card--ghost',
        chosenClass: 'kanban-card--chosen',
        dragClass: 'kanban-card--drag',
        fallbackOnBody: true,
        swapThreshold: 0.65,
        emptyInsertThreshold: 80,
        delay: 150,
        delayOnTouchOnly: true,
        touchStartThreshold: 5,
        onStart: function() {
          _isDragging = true;
          if (boardEl) boardEl.classList.add('kanban-board--dragging');
        },
        onMove: function(moveEvt) {
          var allCols = container.querySelectorAll('.kanban-column');
          allCols.forEach(function(c) { c.classList.remove('kanban-column--dragover'); });
          var targetCol = moveEvt.to.closest('.kanban-column');
          if (targetCol) targetCol.classList.add('kanban-column--dragover');
        },
        onEnd: function(evt) {
          _isDragging = false;
          if (boardEl) boardEl.classList.remove('kanban-board--dragging');
          var allCols = container.querySelectorAll('.kanban-column');
          allCols.forEach(function(c) { c.classList.remove('kanban-column--dragover'); });

          var todoId = evt.item.getAttribute('data-todo-id');
          var targetColEl = evt.to.closest('.kanban-column');
          if (!targetColEl) {
            if (_renderPending) { _renderPending = false; setTimeout(renderBoard, 0); }
            return;
          }
          var newColumn = targetColEl.getAttribute('data-kanban-status');
          var todo = allTodos.find(function(t) { return t.id === todoId; });
          if (!todo) {
            if (_renderPending) { _renderPending = false; setTimeout(renderBoard, 0); }
            return;
          }

          var oldKanbanStatus = todo.kanbanStatus || getFirstColumnStatus();
          var oldKanbanOrder = todo.kanbanOrder || 0;
          var movingToDone = isColumnDone(newColumn) && !isColumnDone(oldKanbanStatus);
          var movingFromDone = !isColumnDone(newColumn) && isColumnDone(oldKanbanStatus);

          // Snapshot for undo (before modifying)
          var snapshot = null;
          if (movingToDone) {
            snapshot = {
              kanbanStatus: oldKanbanStatus,
              kanbanOrder: oldKanbanOrder,
              done: todo.done,
              status: todo.status,
              bujoState: todo.bujoState,
              completedAt: todo.completedAt,
              actualMin: todo.actualMin
            };
          }

          // Calculate new order based on position in new column
          var newOrder = calculateOrderForPosition(evt.to, evt.newIndex, todoId);

          var firestoreUpdates = {
            kanbanStatus: newColumn,
            kanbanOrder: newOrder,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          };
          var localUpdates = {
            kanbanStatus: newColumn,
            kanbanOrder: newOrder,
            updatedAt: Date.now()
          };

          // Sync done/status/bujoState when moving between columns
          if (movingToDone) {
            firestoreUpdates.done = true;
            firestoreUpdates.status = 'done';
            firestoreUpdates.bujoState = 'done';
            firestoreUpdates.completedAt = firebase.firestore.FieldValue.serverTimestamp();
            localUpdates.done = true;
            localUpdates.status = 'done';
            localUpdates.bujoState = 'done';
            localUpdates.completedAt = Date.now();
          } else if (movingFromDone) {
            // Moving out of Done -> reopen
            firestoreUpdates.done = false;
            firestoreUpdates.status = 'active';
            firestoreUpdates.bujoState = 'open';
            firestoreUpdates.completedAt = null;
            firestoreUpdates.actualMin = null;
            localUpdates.done = false;
            localUpdates.status = 'active';
            localUpdates.bujoState = 'open';
            localUpdates.completedAt = null;
            localUpdates.actualMin = null;
          }

          // Apply local updates
          Object.keys(localUpdates).forEach(function(key) {
            todo[key] = localUpdates[key];
          });

          if (window.dmSync) {
            window.dmSync.firestoreWrite({
              collection: 'todos',
              docId: todo.id,
              op: 'update',
              data: firestoreUpdates,
              localOp: function() {
                return window.dmSync.putTodo(todo);
              }
            }).then(function() {
              // Update counts without full re-render to keep DOM position
              updateCounts();
              // Show undo toast when moved to Done
              if (snapshot) {
                showUndoToast('Marked "' + (todo.title || 'task') + '" done', function() {
                  // Restore snapshot
                  var undoFirestore = {
                    kanbanStatus: snapshot.kanbanStatus,
                    kanbanOrder: snapshot.kanbanOrder,
                    done: snapshot.done,
                    status: snapshot.status,
                    bujoState: snapshot.bujoState,
                    completedAt: snapshot.completedAt,
                    actualMin: snapshot.actualMin,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                  };
                  var undoLocal = {
                    kanbanStatus: snapshot.kanbanStatus,
                    kanbanOrder: snapshot.kanbanOrder,
                    done: snapshot.done,
                    status: snapshot.status,
                    bujoState: snapshot.bujoState,
                    completedAt: snapshot.completedAt,
                    actualMin: snapshot.actualMin,
                    updatedAt: Date.now()
                  };
                  Object.keys(undoLocal).forEach(function(key) {
                    todo[key] = undoLocal[key];
                  });
                  window.dmSync.firestoreWrite({
                    collection: 'todos',
                    docId: todo.id,
                    op: 'update',
                    data: undoFirestore,
                    localOp: function() {
                      return window.dmSync.putTodo(todo);
                    }
                  }).then(function() {
                    renderBoard();
                  });
                });
              }
            }).catch(function(err) {
              console.error('[kanban] Error updating todo after drag:', err);
              // Re-render to restore correct state
              renderBoard();
            });
          }

          // Flush any deferred renders that were blocked during drag
          if (_renderPending) {
            _renderPending = false;
            setTimeout(renderBoard, 0);
          }
        }
      });
      _sortableInstances.push(sortable);
    });

    // Board-level sortable for column reordering
    if (boardEl) {
      var boardSortable = Sortable.create(boardEl, {
        animation: 200,
        handle: '.kanban-col-drag-handle',
        draggable: '.kanban-column',
        ghostClass: 'kanban-column--col-ghost',
        chosenClass: 'kanban-column--col-chosen',
        filter: '.kanban-add-column',
        onEnd: function(evt) {
          // Collect new column order from DOM
          var colEls = boardEl.querySelectorAll('.kanban-column');
          var orderedIds = [];
          colEls.forEach(function(el) {
            var cid = el.getAttribute('data-kanban-col-id');
            if (cid) orderedIds.push(cid);
          });
          // Update local _kanbanColumns order
          var colMap = {};
          _kanbanColumns.forEach(function(c) { colMap[c.id] = c; });
          _kanbanColumns = orderedIds.map(function(id, idx) {
            var c = colMap[id];
            if (c) c.order = idx;
            return c;
          }).filter(Boolean);
          // Rebuild _columnOrder
          _columnOrder = _kanbanColumns.map(function(c) { return c.status; });
          // Persist to dmSync
          window.dmSync.reorderKanbanColumns(orderedIds).catch(function(err) {
            console.error('[kanban] Error reordering columns:', err);
          });
        }
      });
      _sortableInstances.push(boardSortable);
    }
  }

  function calculateOrderForPosition(columnEl, newIndex, todoId) {
    var cards = columnEl.querySelectorAll('.kanban-card');
    var orders = [];
    for (var i = 0; i < cards.length; i++) {
      if (cards[i].getAttribute('data-todo-id') === todoId) continue;
      var cTodo = allTodos.find(function(t) { return t.id === cards[i].getAttribute('data-todo-id'); });
      if (cTodo) orders.push(cTodo.kanbanOrder || 0);
    }
    orders.sort(function(a, b) { return a - b; });

    if (orders.length === 0) return 1;
    if (newIndex <= 0) return orders[0] - 1;
    if (newIndex >= orders.length) return orders[orders.length - 1] + 1;
    return (orders[newIndex - 1] + orders[newIndex]) / 2;
  }

  function updateCounts() {
    var visible = allTodos.filter(function(t) {
      if (t.deletedAt || t.parentId) return false;
      var s = t.status || 'active';
      return s === 'active' || s === 'done';
    });
    // Apply project filter
    if (_kanbanFilterProjectIds.size > 0) {
      visible = visible.filter(function(t) {
        if (_kanbanFilterProjectIds.has('__none__') && !t.projectId) return true;
        return t.projectId && _kanbanFilterProjectIds.has(t.projectId);
      });
    }
    var doneLists = {}; // slug -> [todos] for done columns
    var c = {};
    _columnOrder.forEach(function(slug) {
      c[slug] = 0;
      if (isColumnDone(slug)) doneLists[slug] = [];
    });
    visible.forEach(function(t) {
      var col = t.kanbanStatus || getFirstColumnStatus();
      if (c[col] === undefined) col = getFirstColumnStatus();
      if (doneLists[col]) {
        doneLists[col].push(t);
      } else {
        c[col]++;
      }
    });
    // Apply done filter to done columns
    Object.keys(doneLists).forEach(function(slug) {
      c[slug] = filterDoneTodos(doneLists[slug]).length;
    });
    _columnOrder.forEach(function(col) {
      if (counts[col]) counts[col].textContent = c[col] || 0;
    });

    // Update card done styling
    container.querySelectorAll('.kanban-card').forEach(function(card) {
      var todoId = card.getAttribute('data-todo-id');
      var todo = allTodos.find(function(t) { return t.id === todoId; });
      if (todo && isColumnDone(todo.kanbanStatus)) {
        card.classList.add('kanban-card--done');
      } else {
        card.classList.remove('kanban-card--done');
      }
    });
  }

  // ─── Undo toast ───
  var _toastTimer = null;
  function showUndoToast(message, onUndo) {
    // Remove existing toast
    var existing = document.querySelector('.kanban-toast');
    if (existing) existing.remove();
    if (_toastTimer) clearTimeout(_toastTimer);

    var toast = document.createElement('div');
    toast.className = 'kanban-toast';
    toast.innerHTML = '<span>' + escapeHtml(message) + '</span>' +
      '<button type="button" class="kanban-toast-undo">Undo</button>';
    document.body.appendChild(toast);

    var undoBtn = toast.querySelector('.kanban-toast-undo');
    undoBtn.addEventListener('click', function() {
      clearTimeout(_toastTimer);
      toast.remove();
      if (onUndo) onUndo();
    });

    _toastTimer = setTimeout(function() {
      toast.remove();
    }, 5000);
  }

  // ─── Quick-add ───
  function initQuickAdd() {
    container.querySelectorAll('.kanban-quick-add-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var targetStatus = btn.getAttribute('data-kanban-add');
        showQuickAddForm(btn, targetStatus);
      });
    });
  }

  function showQuickAddForm(btn, targetStatus) {
    // Hide the button, show inline form
    btn.style.display = 'none';
    var form = document.createElement('div');
    form.className = 'kanban-quick-add-form';
    form.innerHTML = '<input type="text" placeholder="Task title..." class="kanban-quick-add-title" autocomplete="off">' +
      '<input type="number" placeholder="Estimate (min)" class="kanban-quick-add-estimate" min="1" step="1">' +
      '<div class="kanban-quick-add-actions">' +
        '<button type="button" class="kanban-quick-add-submit">Add</button>' +
        '<button type="button" class="kanban-quick-add-cancel">Cancel</button>' +
      '</div>';
    btn.parentNode.insertBefore(form, btn.nextSibling);

    var titleInput = form.querySelector('.kanban-quick-add-title');
    var estimateInput = form.querySelector('.kanban-quick-add-estimate');
    var submitBtn = form.querySelector('.kanban-quick-add-submit');
    var cancelBtn = form.querySelector('.kanban-quick-add-cancel');

    titleInput.focus();

    function closeForm() {
      form.remove();
      btn.style.display = '';
    }

    function submitTask() {
      var title = titleInput.value.trim();
      if (!title) { titleInput.focus(); return; }
      var estimatedMin = parseInt(estimateInput.value) || 25;
      createQuickTask(title, estimatedMin, targetStatus);
      closeForm();
    }

    submitBtn.addEventListener('click', submitTask);
    cancelBtn.addEventListener('click', closeForm);
    titleInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        submitTask();
      }
      if (e.key === 'Escape') closeForm();
    });
    estimateInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        submitTask();
      }
      if (e.key === 'Escape') closeForm();
    });
  }

  function createQuickTask(title, estimatedMin, kanbanStatus) {
    if (!window.dmSync || !window.dmDb) return;

    window.dmSync.getCachedUserId().then(function(userId) {
      if (!userId) return;

      // Calculate order: place at bottom of column
      var columnTodos = allTodos.filter(function(t) {
        return !t.deletedAt && !t.parentId && (t.kanbanStatus === kanbanStatus);
      });
      var maxOrder = 0;
      columnTodos.forEach(function(t) {
        if ((t.kanbanOrder || 0) > maxOrder) maxOrder = t.kanbanOrder || 0;
      });
      var order = maxOrder + 1;

      var isDone = isColumnDone(kanbanStatus);
      var newDocId = window.dmDb.collection('todos').doc().id;

      var todoData = {
        userId: userId,
        title: title,
        estimatedMin: estimatedMin,
        actualMin: null,
        category: null,
        projectId: (function() { var ids = Array.from(_kanbanFilterProjectIds).filter(function(id) { return id !== '__none__'; }); return ids.length === 1 ? ids[0] : null; })(),
        pomodoroCount: 1,
        pomodoroLength: null,
        breakLength: null,
        done: isDone,
        status: isDone ? 'done' : 'active',
        parentId: null,
        order: order,
        kanbanOrder: order,
        scheduledDate: null,
        reminderAt: null,
        reminderFired: false,
        reminderAcked: false,
        source: null,
        bujoType: 'task',
        bujoState: isDone ? 'done' : 'open',
        kanbanStatus: kanbanStatus,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        completedAt: isDone ? firebase.firestore.FieldValue.serverTimestamp() : null
      };

      var localTodo = {
        id: newDocId,
        userId: userId,
        title: title,
        estimatedMin: estimatedMin,
        actualMin: null,
        category: null,
        projectId: (function() { var ids = Array.from(_kanbanFilterProjectIds).filter(function(id) { return id !== '__none__'; }); return ids.length === 1 ? ids[0] : null; })(),
        pomodoroCount: 1,
        pomodoroLength: null,
        breakLength: null,
        done: isDone,
        status: isDone ? 'done' : 'active',
        parentId: null,
        order: order,
        kanbanOrder: order,
        scheduledDate: null,
        reminderAt: null,
        reminderFired: false,
        reminderAcked: false,
        source: null,
        bujoType: 'task',
        bujoState: isDone ? 'done' : 'open',
        kanbanStatus: kanbanStatus,
        notes: '',
        createdAt: Date.now(),
        updatedAt: Date.now(),
        completedAt: isDone ? Date.now() : null,
        deletedAt: null
      };

      // Optimistic local update
      allTodos.push(localTodo);
      renderBoard();

      window.dmSync.firestoreWrite({
        collection: 'todos',
        docId: newDocId,
        op: 'set',
        data: todoData,
        localOp: function() {
          return window.dmSync.putTodo(localTodo);
        }
      }).then(function() {
        window.dispatchEvent(new Event('dm-todos-updated'));
      }).catch(function(err) {
        console.error('[kanban] Error creating task:', err);
        // Remove from local array on error
        allTodos = allTodos.filter(function(t) { return t.id !== newDocId; });
        renderBoard();
      });
    });
  }

  // ─── Load data ───
  function loadBoard() {
    if (!window.dmSync) {
      showState('auth');
      return;
    }

    showState('loading');

    var todosPromise = window.dmSync.getAllTodos();
    var projectsPromise = window.dmSync.getAllProjects().then(function(projects) {
      _kanbanProjectMap = {};
      projects.forEach(function(p) {
        _kanbanProjectMap[p.id] = { name: p.name, color: p.color || '' };
      });
      // Restore saved filter from IDB/Firestore before rendering
      return window.dmSync.getPageFilterProjectIds('kanban').then(function(saved) {
        if (saved) {
          _kanbanFilterProjectIds = new Set(saved);
        }
        updateKanbanProjectFilter();
      });
    }).catch(function() { /* keep existing */ });
    // Seed default columns if none exist, then load them
    var columnsPromise = window.dmSync.seedDefaultKanbanColumns().then(function(cols) {
      _kanbanColumns = cols;
    });

    Promise.all([todosPromise, projectsPromise, columnsPromise]).then(function(results) {
      allTodos = results[0] || [];

      // Filter to active + done (not archived/deleted)
      var visible = allTodos.filter(function(t) {
        if (t.deletedAt) return false;
        if (t.parentId) return false;
        var s = t.status || 'active';
        return s === 'active' || s === 'done';
      });

      // Always render columns first (even if no tasks)
      renderColumns();

      if (visible.length === 0) {
        showState('empty');
      } else {
        showState('content');
        renderBoard();
        // Deep link: focus card from URL hash on initial load
        if (window.location.hash) {
          var hashId = window.location.hash.slice(1);
          if (hashId && container.querySelector('.kanban-card[data-todo-id="' + hashId + '"]')) {
            setFocusedCard(hashId);
          }
        }
      }
    }).catch(function(err) {
      console.error('[kanban] load error:', err);
      showState('empty');
    });
  }

  // ─── Auth ───
  if (signinBtn) {
    signinBtn.addEventListener('click', function() {
      if (window.dmSignIn) window.dmSignIn();
    });
  }

  // ─── Keyboard navigation ───
  var _focusedCardId = null;

  function getVisibleCards() {
    var cards = [];
    _columnOrder.forEach(function(col) {
      if (!columns[col]) return;
      var colCards = columns[col].querySelectorAll('.kanban-card');
      colCards.forEach(function(c) { cards.push({ el: c, col: col }); });
    });
    return cards;
  }

  function setFocusedCard(todoId) {
    // Remove old focus
    var old = container.querySelector('.kanban-card--focused');
    if (old) old.classList.remove('kanban-card--focused');
    _focusedCardId = todoId;
    if (todoId) {
      var card = container.querySelector('.kanban-card[data-todo-id="' + todoId + '"]');
      if (card) {
        card.classList.add('kanban-card--focused');
        card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
      history.replaceState(null, '', '#' + todoId);
    } else {
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }
  }

  function getFocusedColumn() {
    if (!_focusedCardId) return null;
    var card = container.querySelector('.kanban-card[data-todo-id="' + _focusedCardId + '"]');
    if (!card) return null;
    var col = card.closest('.kanban-column');
    return col ? col.getAttribute('data-kanban-status') : null;
  }

  document.addEventListener('keydown', function(e) {
    // Don't handle if board not visible or focus is in an input
    if (contentEl.style.display === 'none') return;
    var tag = (e.target.tagName || '').toLowerCase();
    if (tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.isContentEditable) return;

    var visCards = getVisibleCards();
    if (visCards.length === 0 && e.key !== 'n') return;

    if (e.key === 'ArrowDown' || e.key === 'j') {
      e.preventDefault();
      if (!_focusedCardId) {
        // Focus first card
        if (visCards.length > 0) setFocusedCard(visCards[0].el.getAttribute('data-todo-id'));
        return;
      }
      // Move down within same column
      var curCol = getFocusedColumn();
      var colCards = visCards.filter(function(c) { return c.col === curCol; });
      var idx = -1;
      colCards.forEach(function(c, i) { if (c.el.getAttribute('data-todo-id') === _focusedCardId) idx = i; });
      if (idx < colCards.length - 1) {
        setFocusedCard(colCards[idx + 1].el.getAttribute('data-todo-id'));
      }
    } else if (e.key === 'ArrowUp' || e.key === 'k') {
      e.preventDefault();
      if (!_focusedCardId) {
        if (visCards.length > 0) setFocusedCard(visCards[visCards.length - 1].el.getAttribute('data-todo-id'));
        return;
      }
      var curCol = getFocusedColumn();
      var colCards = visCards.filter(function(c) { return c.col === curCol; });
      var idx = -1;
      colCards.forEach(function(c, i) { if (c.el.getAttribute('data-todo-id') === _focusedCardId) idx = i; });
      if (idx > 0) {
        setFocusedCard(colCards[idx - 1].el.getAttribute('data-todo-id'));
      }
    } else if (e.key === 'ArrowRight' || e.key === 'l') {
      e.preventDefault();
      if (!_focusedCardId) {
        if (visCards.length > 0) setFocusedCard(visCards[0].el.getAttribute('data-todo-id'));
        return;
      }
      var curCol = getFocusedColumn();
      var colIdx = _columnOrder.indexOf(curCol);
      if (colIdx < _columnOrder.length - 1) {
        // Move to next column, try same row index
        var curCards = visCards.filter(function(c) { return c.col === curCol; });
        var curRow = -1;
        curCards.forEach(function(c, i) { if (c.el.getAttribute('data-todo-id') === _focusedCardId) curRow = i; });
        var nextCol = _columnOrder[colIdx + 1];
        var nextCards = visCards.filter(function(c) { return c.col === nextCol; });
        if (nextCards.length > 0) {
          var targetRow = Math.min(curRow, nextCards.length - 1);
          setFocusedCard(nextCards[targetRow].el.getAttribute('data-todo-id'));
        }
      }
    } else if (e.key === 'ArrowLeft' || e.key === 'h') {
      e.preventDefault();
      if (!_focusedCardId) {
        if (visCards.length > 0) setFocusedCard(visCards[0].el.getAttribute('data-todo-id'));
        return;
      }
      var curCol = getFocusedColumn();
      var colIdx = _columnOrder.indexOf(curCol);
      if (colIdx > 0) {
        var curCards = visCards.filter(function(c) { return c.col === curCol; });
        var curRow = -1;
        curCards.forEach(function(c, i) { if (c.el.getAttribute('data-todo-id') === _focusedCardId) curRow = i; });
        var prevCol = _columnOrder[colIdx - 1];
        var prevCards = visCards.filter(function(c) { return c.col === prevCol; });
        if (prevCards.length > 0) {
          var targetRow = Math.min(curRow, prevCards.length - 1);
          setFocusedCard(prevCards[targetRow].el.getAttribute('data-todo-id'));
        }
      }
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (!_focusedCardId) return;
      var todo = allTodos.find(function(t) { return t.id === _focusedCardId; });
      if (todo && window.dmTodoEdit) {
        var focusedCard = container.querySelector('.kanban-card[data-todo-id="' + _focusedCardId + '"]');
        window.dmTodoEdit.open(todo, function(result) {
          if (result) {
            applyEditResult(todo, result);
          }
        }, focusedCard);
      }
    } else if (e.key === 'n') {
      e.preventDefault();
      // Quick-add in the focused column, or default to 'todo'
      var targetCol = getFocusedColumn() || getFirstColumnStatus();
      var btn = container.querySelector('.kanban-quick-add-btn[data-kanban-add="' + targetCol + '"]');
      if (btn && btn.style.display !== 'none') {
        showQuickAddForm(btn, targetCol);
      }
    } else if (e.key === 'Escape') {
      setFocusedCard(null);
    }
  });

  // ─── Events ───
  window.addEventListener('dm-todos-updated', function() {
    // Reload from IDB to pick up changes from other views
    if (!window.dmSync) return;
    window.dmSync.getAllTodos().then(function(todos) {
      allTodos = todos || [];
      var visible = allTodos.filter(function(t) {
        if (t.deletedAt || t.parentId) return false;
        var s = t.status || 'active';
        return s === 'active' || s === 'done';
      });
      if (visible.length === 0) {
        showState('empty');
      } else {
        showState('content');
        renderBoard();
      }
    });
  });

  window.addEventListener('dm-sync-complete', function() {
    if (contentEl.style.display !== 'none' || emptyEl.style.display !== 'none') {
      loadBoard();
    }
  });

  window.addEventListener('dm-projects-updated', function() {
    if (contentEl.style.display !== 'none') {
      loadBoard();
    }
  });

  // Re-render columns when column definitions change (e.g. from another tab)
  window.addEventListener('dm-kanban-columns-updated', function() {
    if (contentEl.style.display !== 'none' && window.dmSync) {
      window.dmSync.getAllKanbanColumns().then(function(cols) {
        _kanbanColumns = cols;
        renderColumns();
        renderBoard();
      });
    }
  });

  // Re-render when Pomodoro timer state changes (pause/resume/reset)
  window.addEventListener('dm-pomodoro-state-changed', function() {
    if (contentEl.style.display !== 'none') renderBoard();
  });

  // Re-render when Pomodoro timer stops
  window.addEventListener('dm-pomodoro-stopped', function() {
    if (contentEl.style.display !== 'none') renderBoard();
  });

  // When Pomodoro "Done" button is pressed — mark the task complete, move to Done column
  window.addEventListener('dm-pomodoro-completed', function(e) {
    var detail = e.detail || {};
    if (!detail.todoId) return;
    var todo = allTodos.find(function(t) { return t.id === detail.todoId; });
    if (!todo) return;

    var doneStatus = getFirstDoneColumnStatus() || 'done';
    var actualMin = detail.trackedMinutes || todo.estimatedMin || null;

    var firestoreUpdates = {
      done: true,
      status: 'done',
      bujoState: 'done',
      kanbanStatus: doneStatus,
      completedAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    if (actualMin) firestoreUpdates.actualMin = actualMin;

    // Apply locally
    todo.done = true;
    todo.status = 'done';
    todo.bujoState = 'done';
    todo.kanbanStatus = doneStatus;
    todo.completedAt = Date.now();
    todo.updatedAt = Date.now();
    if (actualMin) todo.actualMin = actualMin;

    if (window.dmSync) {
      window.dmSync.firestoreWrite({
        collection: 'todos',
        docId: todo.id,
        op: 'update',
        data: firestoreUpdates,
        localOp: function() { return window.dmSync.putTodo(todo); }
      }).then(function() {
        renderBoard();
      }).catch(function(err) {
        console.error('[kanban] Error completing todo from pomodoro:', err);
      });
    }
  });

  // ─── Init ───

  // Pre-show loading state if cached user exists to prevent auth-card flash on full page reload
  try {
    if (JSON.parse(localStorage.getItem('dm-cached-user') || 'null')) {
      showState('loading');
    }
  } catch(e) {}
  if (window.dmAuth) {
    function subscribeKanbanAuth() {
      window.dmAuth.onAuthStateChanged(function(user) {
        if (user) {
          loadBoard();
        } else {
          showState('auth');
        }
      });
    }
    if (window.dmAuthReady) {
      window.dmAuthReady.then(subscribeKanbanAuth);
    } else {
      subscribeKanbanAuth();
    }
  }
})();
</script>
