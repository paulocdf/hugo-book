{{/* Custom Section viewer — reads ?id=<sectionId> from URL, renders notes
     whose destination === 'section:<id>'. Follows the same auth/sync pattern
     as section-notes.html. */}}

<div class="dm-custom-section" id="dm-custom-section-root">
  <div class="dm-cs-header" id="dm-cs-header" style="display:none">
    <h1 class="dm-cs-title" id="dm-cs-title"></h1>
    <button type="button" class="dm-cs-new-btn" id="dm-cs-new-btn">+ New note</button>
  </div>

  <div class="dm-cs-auth" id="dm-cs-auth" style="display:none">
    <p>Sign in to view this section.</p>
  </div>
  <div class="dm-cs-loading" id="dm-cs-loading" style="display:none">
    <div class="dm-cs-spinner"></div><span>Loading…</span>
  </div>
  <div class="dm-cs-empty" id="dm-cs-empty" style="display:none">
    <p>No notes yet. Use <strong>+ New note</strong> above or the Quick Capture button.</p>
  </div>
  <div class="dm-cs-missing" id="dm-cs-missing" style="display:none">
    <p>Section not found.</p>
  </div>
  <ul class="dm-cs-list" id="dm-cs-list"></ul>
</div>

<style>
.dm-custom-section { max-width: 100%; }
.dm-cs-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:8px; }
.dm-cs-title { margin:0; font-size:1.6rem; }
.dm-cs-new-btn {
  padding:6px 14px; border:1px solid var(--color-accent,#1976d2); border-radius:6px;
  background:var(--color-accent,#1976d2); color:#fff; cursor:pointer; font-size:0.88rem;
}
.dm-cs-new-btn:hover { opacity:0.88; }
.dm-cs-auth, .dm-cs-loading, .dm-cs-empty, .dm-cs-missing {
  padding:32px; text-align:center; color:var(--gray-500);
}
.dm-cs-spinner {
  width:20px; height:20px; border:2px solid var(--gray-200);
  border-top-color:var(--color-accent,#1976d2); border-radius:50%;
  animation:dm-cs-spin 0.8s linear infinite; display:inline-block; margin-right:8px;
}
@keyframes dm-cs-spin { to { transform:rotate(360deg); } }
.dm-cs-list { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:10px; }
.dm-cs-note-card {
  padding:14px 16px; border:1px solid var(--gray-200); border-radius:8px;
  background:var(--body-background); cursor:pointer; transition:border-color .15s, box-shadow .15s;
  display:block; text-decoration:none; color:inherit;
}
.dm-cs-note-card:hover { border-color:var(--color-accent,#1976d2); box-shadow:0 2px 8px rgba(0,0,0,.06); }
.dm-cs-note-title { font-weight:600; font-size:1rem; margin:0 0 4px; }
.dm-cs-note-meta  { font-size:0.8rem; color:var(--gray-500); }
.dm-cs-note-preview { font-size:0.88rem; color:var(--gray-500); margin-top:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
</style>

<script>
(function () {
  'use strict';

  var params    = new URLSearchParams(window.location.search);
  var sectionId = params.get('id');

  var root      = document.getElementById('dm-custom-section-root');
  var headerEl  = document.getElementById('dm-cs-header');
  var titleEl   = document.getElementById('dm-cs-title');
  var newBtn    = document.getElementById('dm-cs-new-btn');
  var authEl    = document.getElementById('dm-cs-auth');
  var loadEl    = document.getElementById('dm-cs-loading');
  var emptyEl   = document.getElementById('dm-cs-empty');
  var missingEl = document.getElementById('dm-cs-missing');
  var listEl    = document.getElementById('dm-cs-list');

  function showOnly(el) {
    [authEl, loadEl, emptyEl, missingEl].forEach(function (e) { if (e) e.style.display = 'none'; });
    if (el) el.style.display = '';
  }

  function viewUrl(id) {
    var manifest = document.querySelector('link[rel="manifest"]');
    var base = manifest ? manifest.getAttribute('href').replace('/manifest.json', '') : '';
    return base + '/docs/view/?id=' + encodeURIComponent(id);
  }

  function formatDate(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function renderNotes(notes) {
    if (!notes || !notes.length) { showOnly(emptyEl); listEl.innerHTML = ''; return; }
    showOnly(null);
    var sorted = notes.slice().sort(function (a, b) {
      return (b.updatedAt || b.createdAt || 0) - (a.updatedAt || a.createdAt || 0);
    });
    listEl.innerHTML = sorted.map(function (n) {
      var preview = '';
      if (n.content) {
        preview = n.content.replace(/[#*`>\-_\[\]]/g, '').replace(/\s+/g, ' ').trim().slice(0, 120);
      }
      return '<li>'
        + '<a class="dm-cs-note-card" href="' + viewUrl(n.id) + '">'
        + '<div class="dm-cs-note-title">' + (n.title || 'Untitled') + '</div>'
        + '<div class="dm-cs-note-meta">' + formatDate(n.updatedAt || n.createdAt) + '</div>'
        + (preview ? '<div class="dm-cs-note-preview">' + preview + '</div>' : '')
        + '</a></li>';
    }).join('');
  }

  function loadNotes() {
    if (!window.dmSync) return;
    showOnly(loadEl);
    window.dmSync.getNotesByDestination('section:' + sectionId).then(function (notes) {
      renderNotes(notes);
    }).catch(function () { showOnly(emptyEl); });
  }

  function init() {
    if (!sectionId) { showOnly(missingEl); return; }

    // Show section name
    function updateTitle() {
      var sec = window.dmSections && window.dmSections.getById && window.dmSections.getById(sectionId);
      if (sec) {
        titleEl.textContent = sec.name || 'Section';
        headerEl.style.display = '';
        document.title = (sec.name || 'Section') + ' | Digital Memory';
      }
    }
    updateTitle();
    window.addEventListener('dm-note-sections-updated', updateTitle);

    // New note button
    if (newBtn) {
      newBtn.addEventListener('click', function () {
        if (typeof window.openQuickCapture === 'function') {
          window.openQuickCapture({ destination: 'section:' + sectionId });
        } else {
          window.dispatchEvent(new CustomEvent('dm-quick-capture-open', {
            detail: { destination: 'section:' + sectionId }
          }));
        }
      });
    }

    // Auth + load
    if (window.dmAuthReady) {
      window.dmAuthReady.then(function () {
        var user = window.dmAuth && window.dmAuth.currentUser;
        var demo = window.dmDemo && window.dmDemo.isActive();
        if (!user && !demo) { showOnly(authEl); return; }
        loadNotes();
        window.addEventListener('dm-sync-complete', function (e) {
          if (e.detail && e.detail.source === 'edit-modal') return;
          loadNotes();
        });
      });
    } else {
      showOnly(authEl);
    }

    // Hydrate sections registry so title resolves
    if (window.dmSections && window.dmSections.hydrate) {
      window.dmSections.hydrate().then(updateTitle);
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
