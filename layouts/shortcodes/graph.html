{{- $graphJS := resources.Get "js/graph.js" | resources.ExecuteAsTemplate "js/graph.js" .Page | resources.Minify | resources.Fingerprint -}}
<div class="graph-container">
  <!-- View Toggle Bar -->
  <div class="view-toggle-bar">
    <button class="view-toggle-btn active" data-view="graph" title="Graph View">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="6" cy="6" r="3"/>
        <circle cx="18" cy="8" r="3"/>
        <circle cx="12" cy="18" r="3"/>
        <line x1="8.5" y1="7.5" x2="15.5" y2="7"/>
        <line x1="7.5" y1="8.5" x2="10.5" y2="15.5"/>
        <line x1="14" y1="16" x2="16" y2="10.5"/>
      </svg>
    </button>
    <button class="view-toggle-btn" data-view="grid" title="Card Grid View">
      <svg class="dm-icon dm-icon--grid" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-grid"/></svg>
    </button>
    <button class="view-toggle-btn" data-view="radial" title="Radial Sunburst View">
      <svg class="dm-icon dm-icon--target" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-target"/></svg>
    </button>
    <button class="view-toggle-btn" data-view="time" title="Time Tracking View">
      <svg class="dm-icon dm-icon--clock" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-clock"/></svg>
    </button>
  </div>

  <!-- View Containers -->
  <div id="graph-wrapper" class="view-container active"></div>
  <div id="grid-wrapper" class="view-container"></div>
  <div id="radial-wrapper" class="view-container"></div>
  <div id="time-wrapper" class="view-container"></div>

  <div class="graph-legend" id="notes-legend">
    <div class="legend-item">
      <span class="legend-dot books"></span>
      <span>Books</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot topics"></span>
      <span>Topics</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot inbox"></span>
      <span>Inbox</span>
    </div>
  </div>
  <div class="graph-legend" id="time-legend" style="display:none;"></div>
</div>
<script src="{{ "js/vendor/d3.min.js" | relURL }}"></script>
<script src="{{ $graphJS.RelPermalink }}"></script>
