          tx.splits = newSplits;
          fs.splits = newSplits;
          if (newSplits.length > 0) {
            tx.categoryId = null;
            fs.categoryId = null;
          }
        }
        tx.updatedAt = _budgetNow();
        return firestoreWrite({
          collection: 'transactions', docId: id, op: 'update', data: fs,
          localOp: function() { return idbPut(STORE_TRANSACTIONS, tx); }
        }).then(function() {
          window.dispatchEvent(new CustomEvent('dm-transactions-updated'));
          window.dispatchEvent(new CustomEvent('dm-budget-updated'));
          return tx;
        });
      });
    },
    splitTransaction: function(id, splits) {
      return window.dmBudget.updateTransaction(id, { splits: splits });
    },
    deleteTransaction: function(id) {
      // Hard delete (Phase 1). Phase 2+ can switch to soft-delete with undo.
      return firestoreWrite({
        collection: 'transactions', docId: id, op: 'delete', data: null,
        localOp: function() { return idbDelete(STORE_TRANSACTIONS, id); }
      }).then(function() {
        window.dispatchEvent(new CustomEvent('dm-transactions-updated'));
        window.dispatchEvent(new CustomEvent('dm-budget-updated'));
      });
    },

    // ── Month summary (envelope view) ──
    // Returns: { month, currency, income, allocated, rolledOver, toBeBudgeted,
    //            categories: [{id, name, kind, color, allocated, rolledOverCents,
    //                          effectiveAllocated, spent, remaining, pctUsed, rollover}] }
    //
    // Rollover logic: if a category's budget doc in month M has `rollover: true`,
    // its leftover (max(0, allocated + rolloverIn − spent)) carries into M+1.
    // rolloverIn(M) for a category walks backward through consecutive rollover-true
    // months (up to 24), then accumulates forward. rolloverIn for the currently
    // displayed month is exposed as `rolledOverCents` per row and summed into
    // `effectiveAllocated` (= allocated + rolledOverCents).
    getMonthSummary: function(month) {
      month = month || _currentMonth();
      return Promise.all([
        window.dmBudget.getCategories(),
        idbGetAll(STORE_BUDGETS),
        idbGetAll(STORE_TRANSACTIONS)
      ]).then(function(r) {
        var cats = r[0];
        var allBudgets = r[1] || [];
        var allTxs = (r[2] || []).filter(function(t) { return !t.deletedAt; });

        // Index: budgets by "{categoryId}|{month}"
        var bgtByCatMonth = {};
        allBudgets.forEach(function(b) {
          if (b && b.categoryId && b.month) {
            bgtByCatMonth[b.categoryId + '|' + b.month] = b;
          }
        });

        // Index: per-(cat,month) spent magnitude and raw sum.
        // When a transaction has splits, credit each split's categoryId instead
        // of the parent's categoryId (the parent is set to null in that case).
        var spendByCatMonth = {};
        function creditCat(catId, month, amt) {
          if (!catId || !month) return;
          var key = catId + '|' + month;
          if (!spendByCatMonth[key]) spendByCatMonth[key] = { spent: 0, rawSum: 0 };
          spendByCatMonth[key].rawSum += amt;
          if (amt < 0) spendByCatMonth[key].spent += -amt;
        }
        allTxs.forEach(function(t) {
          if (!t.date) return;
          var m = t.date.substr(0, 7);
          if (Array.isArray(t.splits) && t.splits.length > 0) {
            t.splits.forEach(function(sp) {
              creditCat(sp.categoryId, m, sp.amount || 0);
            });
          } else {
            creditCat(t.categoryId, m, t.amount || 0);
          }
        });

        function prevMonth(ym) {
          var y = parseInt(ym.substr(0, 4), 10);
          var mm = parseInt(ym.substr(5, 2), 10);
          mm--;
          if (mm === 0) { y--; mm = 12; }
          return y + '-' + (mm < 10 ? '0' : '') + mm;
        }

        function computeRolloverIn(catId, curMonth) {
          // Walk backward while budget exists AND rollover is true,
          // collecting the chain; stop at first month with no budget or rollover=false.
          var MAX = 24;
          var chain = []; // oldest first
          var m = prevMonth(curMonth);
          for (var i = 0; i < MAX; i++) {
            var b = bgtByCatMonth[catId + '|' + m];
            if (!b || !b.rollover) break;
            var s = (spendByCatMonth[catId + '|' + m] || { spent: 0 }).spent;
            chain.unshift({ allocated: b.allocated || 0, spent: s });
            m = prevMonth(m);
          }
          // Walk forward accumulating leftover
          var leftover = 0;
          for (var j = 0; j < chain.length; j++) {
            var row = chain[j];
            leftover = Math.max(0, row.allocated + leftover - row.spent);
          }
          return leftover;
        }

        // Current-month income: positive amounts tagged to income-kind categories
        // (or uncategorized positives). Splits are iterated individually.
        var incomeTotal = 0;
        function addIncomePortion(catId, amt) {
          if (amt <= 0) return;
          var c = catId ? (cats.filter(function(x) { return x.id === catId; })[0]) : null;
          if (!c || c.kind === 'income') incomeTotal += amt;
        }
        allTxs.forEach(function(t) {
          if (!t.date || t.date.substr(0, 7) !== month) return;
          if (Array.isArray(t.splits) && t.splits.length > 0) {
            t.splits.forEach(function(sp) { addIncomePortion(sp.categoryId, sp.amount || 0); });
          } else {
            addIncomePortion(t.categoryId, t.amount || 0);
          }
        });

        var allocatedTotal = 0;
        var rolledOverTotal = 0;
        var rows = cats.map(function(c) {
          var b = bgtByCatMonth[c.id + '|' + month];
          var allocated = b ? (b.allocated || 0) : 0;
          var entry = spendByCatMonth[c.id + '|' + month] || { spent: 0, rawSum: 0 };
          // Expense cats: spent = magnitude of outflows. Income cats: spent mirrors rawSum.
          var spent = c.kind === 'income' ? entry.rawSum : entry.spent;
          var rolledOver = computeRolloverIn(c.id, month);
          var effectiveAllocated = allocated + rolledOver;
          var remaining = effectiveAllocated - spent;
          var pct = effectiveAllocated > 0
            ? Math.min(100, Math.round(spent / effectiveAllocated * 100))
            : (spent > 0 ? 100 : 0);
          allocatedTotal += allocated;
          rolledOverTotal += rolledOver;
          return {
            id: c.id, name: c.name, kind: c.kind, color: c.color, parentId: c.parentId,
            allocated: allocated,
            rolledOverCents: rolledOver,
            effectiveAllocated: effectiveAllocated,
            spent: spent, remaining: remaining, pctUsed: pct,
            rollover: b ? !!b.rollover : false, note: b ? b.note : ''
          };
        });
        return {
          month: month,
          currency: window.dmBudget.getCurrency(),
          income: incomeTotal,
          allocated: allocatedTotal,
          rolledOver: rolledOverTotal,
          toBeBudgeted: incomeTotal - allocatedTotal,
          categories: rows
        };
      });
    },

    // ── Formatting helper ──
    formatMoney: function(cents, opts) {
      opts = opts || {};
      var currency = opts.currency || window.dmBudget.getCurrency();
      var amount = (cents || 0) / 100;
      try {
        return new Intl.NumberFormat(undefined, {
          style: 'currency', currency: currency,
          minimumFractionDigits: 2, maximumFractionDigits: 2
        }).format(amount);
      } catch (e) {
        // Fallback for exotic codes
        return (amount < 0 ? '-' : '') + currency + ' ' + Math.abs(amount).toFixed(2);
      }
    },
    parseMoney: function(str) {
      // Accepts '12.34', '$12.34', '12,34', '1,234.56', '-12.50', '(12.50)'
      if (str == null) return 0;
      var s = String(str).trim();
      if (!s) return 0;
      var negative = false;
      if (/^\(.*\)$/.test(s)) { negative = true; s = s.slice(1, -1); }
      s = s.replace(/[^\d,.\-]/g, '');
      // If both . and , present, assume , is thousands sep
      if (s.indexOf(',') !== -1 && s.indexOf('.') !== -1) {
        s = s.replace(/,/g, '');
      } else if (s.indexOf(',') !== -1 && s.indexOf('.') === -1) {
        // If only comma, treat as decimal
        s = s.replace(',', '.');
      }
      var n = parseFloat(s);
      if (isNaN(n)) return 0;
      if (negative) n = -Math.abs(n);
      return Math.round(n * 100);
    },

    // ── Reports / analytics (Phase 3) ──
    // Resolve a preset string or {from,to} object to canonical { from, to, label }.
    // Presets: 'this-month' (default), 'last-month', 'last-3-months',
    //          'last-6-months', 'ytd', 'custom' (requires from+to).
    // Dates are local YYYY-MM-DD strings; range is inclusive on both ends.
    // Memoization-friendly: pure function, no IO.
    resolveReportRange: function(input) {
      var today = new Date();
      function fmt(d) {
        var y = d.getFullYear();
        var m = ('0' + (d.getMonth() + 1)).slice(-2);
        var dd = ('0' + d.getDate()).slice(-2);
        return y + '-' + m + '-' + dd;
      }
      function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
      function endOfMonth(d) { return new Date(d.getFullYear(), d.getMonth() + 1, 0); }

      if (input && typeof input === 'object' && input.from && input.to) {
        return { from: input.from, to: input.to, label: input.label || 'Custom' };
      }
      var preset = (typeof input === 'string') ? input : (input && input.preset) || 'this-month';
      if (preset === 'this-month') {
        return { from: fmt(startOfMonth(today)), to: fmt(today), label: 'This month', preset: preset };
      }
      if (preset === 'last-month') {
        var lm = new Date(today.getFullYear(), today.getMonth() - 1, 1);
        return { from: fmt(startOfMonth(lm)), to: fmt(endOfMonth(lm)), label: 'Last month', preset: preset };
      }
      if (preset === 'last-3-months') {
        var s3 = new Date(today.getFullYear(), today.getMonth() - 2, 1);
        return { from: fmt(s3), to: fmt(today), label: 'Last 3 months', preset: preset };
      }
      if (preset === 'last-6-months') {
        var s6 = new Date(today.getFullYear(), today.getMonth() - 5, 1);
        return { from: fmt(s6), to: fmt(today), label: 'Last 6 months', preset: preset };
      }
      if (preset === 'ytd') {
        var soy = new Date(today.getFullYear(), 0, 1);
        return { from: fmt(soy), to: fmt(today), label: 'Year to date', preset: preset };
      }
      // Fallback to this-month
      return { from: fmt(startOfMonth(today)), to: fmt(today), label: 'This month', preset: 'this-month' };
    },

    // Given a resolved {from,to}, returns the prior period of equal length
    // ending one day before `from`.
    priorReportRange: function(range) {
      if (!range || !range.from || !range.to) return null;
      function parse(s) { var p = s.split('-'); return [parseInt(p[0],10), parseInt(p[1],10)-1, parseInt(p[2],10)]; }
      function fmt(y, m, d) {
        return y + '-' + ('0' + (m + 1)).slice(-2) + '-' + ('0' + d).slice(-2);
      }
      // Compute number of days inclusive: round to nearest because of possible DST
      // hour shifts between from and to.
      var f = parse(range.from);
      var t = parse(range.to);
      var fromDate = new Date(f[0], f[1], f[2]);
      var toDate = new Date(t[0], t[1], t[2]);
      var days = Math.round((toDate - fromDate) / 86400000) + 1;
      // priorTo = day before from; priorFrom = priorTo - (days - 1)
      var pt = new Date(f[0], f[1], f[2] - 1);
      var pf = new Date(pt.getFullYear(), pt.getMonth(), pt.getDate() - (days - 1));
      return {
        from: fmt(pf.getFullYear(), pf.getMonth(), pf.getDate()),
        to: fmt(pt.getFullYear(), pt.getMonth(), pt.getDate()),
        label: 'Prior period'
      };
    },

    // Spending breakdown by category for a date range.
    // Returns an array of { categoryId, name, color, kind, currentCents, priorCents,
    // deltaCents, deltaPct, count, currentTotal, priorTotal } sorted by currentCents desc.
    // - Expenses only (negative-amount transactions); split rows are credited per-split.
    // - Includes an "Uncategorized" pseudo-row for tx with no categoryId.
    // - Soft-deleted tx are filtered out by getTransactions.
    // Range arg: same shape as resolveReportRange input; defaults to 'this-month'.
    getCategorySpend: function(rangeArg) {
      var api = window.dmBudget;
      var range = api.resolveReportRange(rangeArg || 'this-month');
      var prior = api.priorReportRange(range);
      return Promise.all([
        api.getCategories(),
        api.getTransactions({})
      ]).then(function(r) {
        var cats = r[0] || [];
        var allTxs = r[1] || [];
        var catById = {};
        cats.forEach(function(c) { catById[c.id] = c; });

        function inRange(date, lo, hi) {
          return date && date >= lo && date <= hi;
        }
        function bucket(tx, lo, hi, totals, counts, perCat) {
          if (!inRange(tx.date, lo, hi)) return;
          // Splits: credit each split's category. Otherwise credit parent.
          if (Array.isArray(tx.splits) && tx.splits.length > 0) {
            tx.splits.forEach(function(sp) {
              var amt = sp.amount || 0;
              if (amt >= 0) return; // expenses only
              var cid = sp.categoryId || '__uncat__';
              perCat[cid] = (perCat[cid] || 0) + (-amt);
              counts[cid] = (counts[cid] || 0) + 1;
              totals.spent += -amt;
            });
          } else {
            var amt = tx.amount || 0;
            if (amt >= 0) return; // expenses only
            var cid = tx.categoryId || '__uncat__';
            perCat[cid] = (perCat[cid] || 0) + (-amt);
            counts[cid] = (counts[cid] || 0) + 1;
            totals.spent += -amt;
          }
        }

        var curPerCat = {}, curCounts = {}, curTotals = { spent: 0 };
        var prvPerCat = {}, prvCounts = {}, prvTotals = { spent: 0 };
        allTxs.forEach(function(t) {
          bucket(t, range.from, range.to, curTotals, curCounts, curPerCat);
          if (prior) bucket(t, prior.from, prior.to, prvTotals, prvCounts, prvPerCat);
        });

        // Build rows. Include any cat that appears in either period.
        var seen = {};
        Object.keys(curPerCat).forEach(function(k) { seen[k] = true; });
        Object.keys(prvPerCat).forEach(function(k) { seen[k] = true; });
        var rows = Object.keys(seen).map(function(cid) {
          var cat = catById[cid];
          var name = (cid === '__uncat__') ? 'Uncategorized' : (cat ? cat.name : '(deleted category)');
          var color = (cid === '__uncat__') ? '#9e9e9e' : (cat ? cat.color : '#bdbdbd');
          var kind = cat ? cat.kind : 'expense';
          var cur = curPerCat[cid] || 0;
          var prv = prvPerCat[cid] || 0;
          var delta = cur - prv;
          var deltaPct = prv > 0 ? Math.round((delta / prv) * 100) : (cur > 0 ? null : 0);
          return {
            categoryId: (cid === '__uncat__') ? null : cid,
            name: name,
            color: color,
            kind: kind,
            currentCents: cur,
            priorCents: prv,
            deltaCents: delta,
            deltaPct: deltaPct,
            count: curCounts[cid] || 0
          };
        });
        rows.sort(function(a, b) { return b.currentCents - a.currentCents; });
        return {
          range: range,
          prior: prior,
          rows: rows,
          currentTotal: curTotals.spent,
          priorTotal: prvTotals.spent,
          deltaTotal: curTotals.spent - prvTotals.spent
        };
      });
    },

    // Expense trend over a date range, bucketed by day/week/month.
    // Args: { from, to, bucket } where bucket in 'day'|'week'|'month'|'auto'.
    //   - 'auto' picks: <=45 days -> day, <=180 days -> week, else month.
    // Returns { range, bucket, points: [{ key, label, cents, movingAvgCents }],
    //           totalCents, peakCents, avgCents, maWindow }.
    // - Expenses only (negative amounts; split rows credited per-split).
    // - Soft-deleted tx already filtered out by getTransactions.
    // - Missing buckets are filled with cents:0 so the line stays continuous.
    // - Trailing moving average (window 7 day / 4 week / 3 month).
    getExpenseTrend: function(args) {
      var api = window.dmBudget;
      args = args || {};
      var range = api.resolveReportRange(
        (args.from && args.to) ? { from: args.from, to: args.to, label: args.label }
                               : (args.preset || 'this-month')
      );
      function parseYMD(s) { var p = s.split('-'); return [parseInt(p[0],10), parseInt(p[1],10)-1, parseInt(p[2],10)]; }
      function fmtYMD(y, m, d) { return y + '-' + ('0'+(m+1)).slice(-2) + '-' + ('0'+d).slice(-2); }
      var f = parseYMD(range.from), t = parseYMD(range.to);
      var fromDate = new Date(f[0], f[1], f[2]);
      var toDate = new Date(t[0], t[1], t[2]);
      var spanDays = Math.round((toDate - fromDate) / 86400000) + 1;

      var bucket = args.bucket || 'auto';
      if (bucket === 'auto') {
        bucket = spanDays <= 45 ? 'day' : (spanDays <= 180 ? 'week' : 'month');
      }
      var maWindow = bucket === 'day' ? 7 : (bucket === 'week' ? 4 : 3);

      // Monday-anchored ISO week start.
      function mondayOf(y, m, d) {
        var dt = new Date(y, m, d);
        var dow = dt.getDay(); // 0=Sun..6=Sat
        var delta = (dow === 0 ? -6 : (1 - dow)); // shift back to Monday
        return new Date(y, m, d + delta);
      }
      function bucketKeyForDate(dateStr) {
        var p = parseYMD(dateStr);
        if (bucket === 'day') return dateStr;
        if (bucket === 'week') {
          var mo = mondayOf(p[0], p[1], p[2]);
          return fmtYMD(mo.getFullYear(), mo.getMonth(), mo.getDate());
        }
        // month
        return p[0] + '-' + ('0' + (p[1] + 1)).slice(-2);
      }

      // Build the ordered list of bucket keys spanning [from, to].
      function buildKeys() {
        var keys = [];
        if (bucket === 'day') {
          for (var i = 0; i < spanDays; i++) {
            var dt = new Date(f[0], f[1], f[2] + i);
            keys.push(fmtYMD(dt.getFullYear(), dt.getMonth(), dt.getDate()));
          }
        } else if (bucket === 'week') {
          var startMon = mondayOf(f[0], f[1], f[2]);
          var endMon = mondayOf(t[0], t[1], t[2]);
          var cur = new Date(startMon.getFullYear(), startMon.getMonth(), startMon.getDate());
          // Walk by 7 days until past endMon
          while (cur <= endMon) {
            keys.push(fmtYMD(cur.getFullYear(), cur.getMonth(), cur.getDate()));
            cur = new Date(cur.getFullYear(), cur.getMonth(), cur.getDate() + 7);
          }
        } else {
          // month: walk year/month
          var y = f[0], m = f[1];
          var ey = t[0], em = t[1];
          while (y < ey || (y === ey && m <= em)) {
            keys.push(y + '-' + ('0' + (m + 1)).slice(-2));
            m++;
            if (m > 11) { m = 0; y++; }
          }
        }
        return keys;
      }

      function labelForKey(k) {
        if (bucket === 'day') return k.slice(5); // MM-DD
        if (bucket === 'month') {
          var parts = k.split('-');
          var ym = parseInt(parts[0],10), mm = parseInt(parts[1],10) - 1;
          var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          return months[mm] + ' ' + ym;
        }
        // week: "Mon DD"
        var p = parseYMD(k);
        var months2 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return months2[p[1]] + ' ' + p[2];
      }

      function inRange(date, lo, hi) { return date && date >= lo && date <= hi; }

      return api.getTransactions({}).then(function(allTxs) {
        var byKey = {};
        (allTxs || []).forEach(function(tx) {
          if (!inRange(tx.date, range.from, range.to)) return;
          var key = bucketKeyForDate(tx.date);
          if (Array.isArray(tx.splits) && tx.splits.length > 0) {
            tx.splits.forEach(function(sp) {
              var amt = sp.amount || 0;
              if (amt >= 0) return;
              byKey[key] = (byKey[key] || 0) + (-amt);
            });
          } else {
            var a = tx.amount || 0;
            if (a >= 0) return;
            byKey[key] = (byKey[key] || 0) + (-a);
          }
        });

        var keys = buildKeys();
        var points = keys.map(function(k) {
          return { key: k, label: labelForKey(k), cents: byKey[k] || 0, movingAvgCents: 0 };
        });

        // Trailing moving average; only emit MA once we've seen >=window points.
        var sum = 0;
        for (var i = 0; i < points.length; i++) {
          sum += points[i].cents;
          if (i >= maWindow) sum -= points[i - maWindow].cents;
          if (i >= maWindow - 1) {
            points[i].movingAvgCents = Math.round(sum / maWindow);
          } else {
            points[i].movingAvgCents = null;
          }
        }

        var total = 0, peak = 0;
        points.forEach(function(p) {
          total += p.cents;
          if (p.cents > peak) peak = p.cents;
        });
        var avg = points.length > 0 ? Math.round(total / points.length) : 0;

        return {
          range: range,
          bucket: bucket,
          points: points,
          totalCents: total,
          peakCents: peak,
          avgCents: avg,
          maWindow: maWindow
        };
      });
    },

    // Daily spend for a calendar year, suitable for a GitHub-style heatmap.
    // Args: { year } — defaults to current year.
    // Returns { year, days: [{ date, cents, dow, weekIndex }], totalCents,
    //           peakCents, avgCents, percentiles: { p50, p75, p90, p95 },
    //           weekCount, firstDow }.
    // - Expenses only; splits credited per-split; soft-deleted ignored.
    // - `days` has one entry per calendar day (zero-filled).
    // - `weekIndex` is the 0-based column index in a Sunday-anchored grid
    //    (so column 0 contains Jan 1's week, even if Jan 1 is mid-week).
    // - `firstDow` is the dow (0=Sun..6=Sat) of Jan 1 — useful for grid offset.
    // - `percentiles` are computed across NON-ZERO days only (so a sparse year
    //    doesn't collapse all buckets). Falls back to even quartile of peak
    //    when there are <4 non-zero days.
    getDailySpend: function(args) {
      var api = window.dmBudget;
      args = args || {};
      var year = args.year || new Date().getFullYear();
      var jan1 = new Date(year, 0, 1);
      var dec31 = new Date(year, 11, 31);
      var firstDow = jan1.getDay();

      function fmt(d) {
        return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
      }
      function inYear(dateStr) {
        return dateStr && dateStr >= (year + '-01-01') && dateStr <= (year + '-12-31');
      }

      return api.getTransactions({}).then(function(allTxs) {
        var byDate = {};
        (allTxs || []).forEach(function(tx) {
          if (!inYear(tx.date)) return;
          if (Array.isArray(tx.splits) && tx.splits.length > 0) {
            tx.splits.forEach(function(sp) {
              var amt = sp.amount || 0;
              if (amt >= 0) return;
              byDate[tx.date] = (byDate[tx.date] || 0) + (-amt);
            });
          } else {
            var a = tx.amount || 0;
            if (a >= 0) return;
            byDate[tx.date] = (byDate[tx.date] || 0) + (-a);
          }
        });

        var days = [];
        var cur = new Date(year, 0, 1);
        var i = 0;
        while (cur <= dec31) {
          var ds = fmt(cur);
          var dow = cur.getDay();
          var weekIndex = Math.floor((firstDow + i) / 7);
          days.push({ date: ds, cents: byDate[ds] || 0, dow: dow, weekIndex: weekIndex });

    // Net worth time-series. Walks accounts (opening balances) + all transactions

            if (indicator) {
              indicator.style.display = '';
              indicator.querySelector('.dm-offline-text').textContent = 'Sync failed — using cached data';
              indicator.classList.add('dm-offline--show');
              var dismissBtn = document.getElementById('dm-offline-dismiss');
              if (dismissBtn) dismissBtn.style.display = '';
            }
          }
          window.dispatchEvent(new CustomEvent('dm-sync-complete'));
          // Still start background sync so it can retry
          if (user) {
            startBackgroundSync(user.uid);
            startSharedTaskListeners(user.uid);
            startSharedNoteListeners(user.uid);
            startSharedProjectListeners(user.uid);
            scheduleAllReminders();
          }
        });
      } else {
        stopBackgroundSync();
        stopSharedTaskListeners();
        stopSharedNoteListeners();
        stopSharedProjectListeners();
        clearAllReminderTimers();
        // Backup closedDays to localStorage before clearing IDB.
        // If the Firestore write from setClosedDays was still in-flight,
        // this ensures we don't lose the user's closed days on re-login.
        idbGet(STORE_META, 'closedDays').then(function(meta) {
          var days = (meta && meta.value) ? meta.value : [];
          if (days.length > 0) {
            try { localStorage.setItem('dm-closedDays-backup', JSON.stringify(days)); } catch(e) {}
          }
        }).catch(function() {}).then(function() {
          // Clear cache on sign-out so no data leaks to another user
          return Promise.all([idbClear(STORE_NOTES), idbClear(STORE_TODOS), idbClear(STORE_META), idbClear(STORE_VERSIONS), idbClear(STORE_ATTACHMENTS), idbClear(STORE_REVIEW_CARDS), idbClear(STORE_TASK_SHARES), idbClear(STORE_NOTE_SHARES), idbClear(STORE_PROJECT_SHARES), idbClear(STORE_PROJECTS), idbClear(STORE_KANBAN_COLUMNS), clearQueue()]);
        }).then(function() {
            window.dispatchEvent(new CustomEvent('dm-sync-complete'));
            window.dispatchEvent(new CustomEvent('dm-todos-updated'));
          })
          .catch(function(err) {
            console.warn('[dm-sync] Error clearing cache on sign-out:', err);
          });
      }
    }
    // Wait for auth to settle to avoid null→user flash, then subscribe
    if (window.dmAuthReady) {
      window.dmAuthReady.then(function() {
        window.dmAuth.onAuthStateChanged(handleSyncAuth);
      });
    } else {
      window.dmAuth.onAuthStateChanged(handleSyncAuth);
    }
  }

})();
</script>
