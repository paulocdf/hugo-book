          remoteProjects.push(serializeProject(doc));
        });

        return idbGetAll(STORE_PROJECTS).then(function(localProjects) {
          return getAllQueued().then(function(queueEntries) {
          var pendingIds = {};
          queueEntries.forEach(function(q) {
            if (q.op === 'set' && q.collection === 'projects') pendingIds[q.docId] = true;
          });

          var localMap = {};
          localProjects.forEach(function(p) { localMap[p.id] = p; });

          var remoteMap = {};
          remoteProjects.forEach(function(p) { remoteMap[p.id] = p; });

          var toUpsert = [];
          remoteProjects.forEach(function(rp) {
            var lp = localMap[rp.id];
            if (!lp || lp.updatedAt !== rp.updatedAt) {
              toUpsert.push(rp);
            }
          });

          var toDelete = [];
          localProjects.forEach(function(lp) {
            var isCollaborator = lp.collaborators && lp.collaborators.indexOf(userId) !== -1;
            if (!remoteMap[lp.id] && !pendingIds[lp.id] && !isCollaborator) {
              toDelete.push(lp.id);
            }
          });

          var promises = [];
          if (toUpsert.length > 0) {
            promises.push(idbPutBatch(STORE_PROJECTS, toUpsert));
          }
          toDelete.forEach(function(id) {
            promises.push(idbDelete(STORE_PROJECTS, id));
          });

          return Promise.all(promises).then(function() {
            var elapsed = Date.now() - startTime;
            console.log('[dm-sync] Projects sync complete in ' + elapsed + 'ms. Upserted: ' + toUpsert.length + ', Deleted: ' + toDelete.length);
            return { upserted: toUpsert.length, deleted: toDelete.length };
          });
          });
        });
      });
  }

  function syncKanbanColumns(userId) {
    if (!window.dmDb) return Promise.reject(new Error('Firestore not available'));

    console.log('[dm-sync] Syncing kanban columns...');
    var startTime = Date.now();

    return window.dmDb.collection('kanbanColumns')
      .where('userId', '==', userId)
      .get()
      .then(function(snapshot) {
        var remoteCols = [];
        snapshot.forEach(function(doc) {
          remoteCols.push(serializeKanbanColumn(doc));
        });

        return idbGetAll(STORE_KANBAN_COLUMNS).then(function(localCols) {
          return getAllQueued().then(function(queueEntries) {
          var pendingIds = {};
          queueEntries.forEach(function(q) {
            if (q.op === 'set' && q.collection === 'kanbanColumns') pendingIds[q.docId] = true;
          });

          var localMap = {};
          localCols.forEach(function(c) { localMap[c.id] = c; });

          var remoteMap = {};
          remoteCols.forEach(function(c) { remoteMap[c.id] = c; });

          var toUpsert = [];
          remoteCols.forEach(function(rc) {
            var lc = localMap[rc.id];
            if (!lc || lc.updatedAt !== rc.updatedAt) {
              toUpsert.push(rc);
            }
          });

          var toDelete = [];
          localCols.forEach(function(lc) {
            if (!remoteMap[lc.id] && !pendingIds[lc.id]) {
              toDelete.push(lc.id);
            }
          });

          var promises = [];
          if (toUpsert.length > 0) {
            promises.push(idbPutBatch(STORE_KANBAN_COLUMNS, toUpsert));
          }
          toDelete.forEach(function(id) {
            promises.push(idbDelete(STORE_KANBAN_COLUMNS, id));
          });

          return Promise.all(promises).then(function() {
            // ─── Deduplication safety net ───
            // After ID-based merge, check for columns with duplicate `status` slugs.
            // Keep the oldest (earliest createdAt) and delete the rest from both IDB and Firestore.
            return idbGetAll(STORE_KANBAN_COLUMNS).then(function(allCols) {
              var statusGroups = {};
              allCols.forEach(function(c) {
                var key = c.status || '';
                if (!statusGroups[key]) statusGroups[key] = [];
                statusGroups[key].push(c);
              });
              var dupDeletePromises = [];
              Object.keys(statusGroups).forEach(function(status) {
                var group = statusGroups[status];
                if (group.length <= 1) return;
                // Sort by createdAt ascending — keep the first (oldest)
                group.sort(function(a, b) { return (a.createdAt || 0) - (b.createdAt || 0); });
                console.warn('[dm-sync] Found ' + group.length + ' duplicate columns with status "' + status + '". Removing ' + (group.length - 1) + ' duplicates.');
                for (var i = 1; i < group.length; i++) {
                  var dupId = group[i].id;
                  dupDeletePromises.push(idbDelete(STORE_KANBAN_COLUMNS, dupId));
                  // Also remove from Firestore to prevent re-sync of duplicates
                  if (window.dmDb) {
                    dupDeletePromises.push(
                      window.dmDb.collection('kanbanColumns').doc(dupId).delete().catch(function(err) {
                        console.warn('[dm-sync] Failed to delete duplicate column from Firestore:', err);
                      })
                    );
                  }
                }
              });
              if (dupDeletePromises.length > 0) {
                return Promise.all(dupDeletePromises).then(function() {
                  window.dispatchEvent(new CustomEvent('dm-kanban-columns-updated'));
                });
              }
            });
          }).then(function() {
            var elapsed = Date.now() - startTime;
            console.log('[dm-sync] Kanban columns sync complete in ' + elapsed + 'ms. Upserted: ' + toUpsert.length + ', Deleted: ' + toDelete.length);
            return { upserted: toUpsert.length, deleted: toDelete.length };
          });
          });
        });
      });
  }

  // ─── One-time migration: deduplicate kanban columns ───

  function migrateDeduplicateKanbanColumns(userId) {
    var MIGRATION_KEY = 'migration_dedup_kanban_columns';
    return idbGet(STORE_META, MIGRATION_KEY).then(function(meta) {
      if (meta && meta.value === true) return; // Already migrated

      console.log('[dm-sync] Running one-time kanban column deduplication migration...');

      // Read from both Firestore and IDB to get the full picture
      var getColumns;
      if (window.dmDb) {
        getColumns = window.dmDb.collection('kanbanColumns')
          .where('userId', '==', userId)
          .get()
          .then(function(snapshot) {
            var cols = [];
            snapshot.forEach(function(doc) { cols.push(serializeKanbanColumn(doc)); });
            return cols;
          })
          .catch(function() {
            // Firestore unavailable — fall back to IDB
            return idbGetAll(STORE_KANBAN_COLUMNS);
          });
      } else {
        getColumns = idbGetAll(STORE_KANBAN_COLUMNS);
      }

      return getColumns.then(function(allCols) {
        // Group by status slug
        var statusGroups = {};
        allCols.forEach(function(c) {
          var key = c.status || '';
          if (!statusGroups[key]) statusGroups[key] = [];
          statusGroups[key].push(c);
        });

        var deletePromises = [];
        Object.keys(statusGroups).forEach(function(status) {
          var group = statusGroups[status];
          if (group.length <= 1) return;

          // Sort by createdAt ascending — keep the oldest
          group.sort(function(a, b) { return (a.createdAt || 0) - (b.createdAt || 0); });
          var keepId = group[0].id;
          console.log('[dm-sync] Dedup migration: keeping column "' + group[0].name + '" (id=' + keepId + '), removing ' + (group.length - 1) + ' duplicates with status "' + status + '"');

          for (var i = 1; i < group.length; i++) {
            var dupId = group[i].id;
            // Delete from IDB
            deletePromises.push(idbDelete(STORE_KANBAN_COLUMNS, dupId));
            // Delete from Firestore
            if (window.dmDb) {
              deletePromises.push(
                window.dmDb.collection('kanbanColumns').doc(dupId).delete().catch(function(err) {
                  console.warn('[dm-sync] Dedup migration: failed to delete Firestore column:', err);
                })
              );
            }
          }
        });

        if (deletePromises.length > 0) {
          return Promise.all(deletePromises).then(function() {
            console.log('[dm-sync] Dedup migration: removed ' + deletePromises.length + ' duplicate column entries');
            window.dispatchEvent(new CustomEvent('dm-kanban-columns-updated'));
          });
        }
      }).then(function() {
        // Mark migration as complete
        return idbPut(STORE_META, { key: MIGRATION_KEY, value: true });
      }).catch(function(err) {
        console.warn('[dm-sync] Dedup migration failed (will retry next session):', err);
        // Don't mark as complete — retry next time
      });
    });
  }

  // ─── Auto-purge expired trash ───

  function purgeExpiredTrash() {
    var thirtyDaysMs = 30 * 24 * 60 * 60 * 1000;
    var cutoff = Date.now() - thirtyDaysMs;
    // Purge expired notes
    var purgeNotes = idbGetAll(STORE_NOTES).then(function(notes) {
      var expired = notes.filter(function(n) { return n.deletedAt && n.deletedAt < cutoff; });
      if (!expired.length) return Promise.resolve();
      console.log('[dm-sync] Purging ' + expired.length + ' expired trash notes');
      return Promise.all(expired.map(function(n) {
        return firestoreWrite({
          collection: 'notes',
          docId: n.id,
          op: 'delete',
          data: null,
          localOp: function() { return idbDelete(STORE_NOTES, n.id); }
        });
      }));
    });
    // Purge expired todos
    var purgeTodos = idbGetAll(STORE_TODOS).then(function(todos) {
      var expired = todos.filter(function(t) { return t.deletedAt && t.deletedAt < cutoff; });
      if (!expired.length) return Promise.resolve();
      console.log('[dm-sync] Purging ' + expired.length + ' expired trash todos');
      return Promise.all(expired.map(function(t) {
        return firestoreWrite({
          collection: 'todos',
          docId: t.id,
          op: 'delete',
          data: null,
          localOp: function() { return idbDelete(STORE_TODOS, t.id); }
        });
      }));
    });
    return Promise.all([purgeNotes, purgeTodos]);
  }

  // ─── Budget / Finance Sync (v17) ───
  // Syncs accounts, categories, budgets, transactions and recurring rules.
  // Skipped entirely when the user enables "local-only" mode.

  function syncOneBudgetStore(userId, collection, storeName, serializer) {
    return window.dmDb.collection(collection)
      .where('userId', '==', userId)
      .get()
      .then(function(snapshot) {
        var remote = [];
        snapshot.forEach(function(doc) { remote.push(serializer(doc)); });
        return idbGetAll(storeName).then(function(local) {
          return getAllQueued().then(function(queue) {
            var pending = {};
            queue.forEach(function(q) {
              if (q.collection === collection) pending[q.docId] = true;
            });
            var localMap = {};
            local.forEach(function(x) { localMap[x.id] = x; });
            var remoteMap = {};
            remote.forEach(function(x) { remoteMap[x.id] = x; });
            var toUpsert = [];
            remote.forEach(function(r) {
              var l = localMap[r.id];
              if (!l || l.updatedAt !== r.updatedAt) toUpsert.push(r);
            });
            var toDelete = [];
            local.forEach(function(l) {
              if (!remoteMap[l.id] && !pending[l.id]) toDelete.push(l.id);
            });
            var promises = [];
            if (toUpsert.length > 0) promises.push(idbPutBatch(storeName, toUpsert));
            toDelete.forEach(function(id) { promises.push(idbDelete(storeName, id)); });
            return Promise.all(promises).then(function() {
              return { upserted: toUpsert.length, deleted: toDelete.length };
            });
          });
        });
      });
  }

  function syncBudgetData(userId) {
    if (!window.dmDb) return Promise.resolve();
    if (isBudgetLocalOnly()) {
      console.log('[dm-sync] Budget local-only mode — skipping cloud sync for financial data');
      return Promise.resolve();
    }
    console.log('[dm-sync] Syncing budget data...');
    var startTime = Date.now();
    return syncOneBudgetStore(userId, 'accounts', STORE_ACCOUNTS, serializeAccount)
      .then(function() { return syncOneBudgetStore(userId, 'categories', STORE_CATEGORIES, serializeCategory); })
      .then(function() { return syncOneBudgetStore(userId, 'budgets', STORE_BUDGETS, serializeBudget); })
      .then(function() { return syncOneBudgetStore(userId, 'transactions', STORE_TRANSACTIONS, serializeTransaction); })
      .then(function() { return syncOneBudgetStore(userId, 'recurring', STORE_RECURRING, serializeRecurring); })
      .then(function() {
        var elapsed = Date.now() - startTime;
        console.log('[dm-sync] Budget sync complete in ' + elapsed + 'ms');
        window.dispatchEvent(new CustomEvent('dm-budget-updated'));
      });
  }

  // Wipe all budget data (local, and optionally cloud). Fires dm-budget-updated.
  function eraseBudgetData(opts) {
    opts = opts || {};
    var eraseCloud = !!opts.eraseCloud;
    var stores = [STORE_ACCOUNTS, STORE_CATEGORIES, STORE_BUDGETS, STORE_TRANSACTIONS, STORE_RECURRING];
    var collections = ['accounts', 'categories', 'budgets', 'transactions', 'recurring'];
    var idsByCollection = {};
    var collectPromises = stores.map(function(storeName, i) {
      return idbGetAll(storeName).then(function(items) {
        idsByCollection[collections[i]] = items.map(function(x) { return x.id; });
      });
    });
    return Promise.all(collectPromises).then(function() {
      return Promise.all(stores.map(function(s) { return idbClear(s); }));
    }).then(function() {
      if (!eraseCloud) return;
      if (!window.dmDb || !window.dmAuth || !window.dmAuth.currentUser) return;
      var promises = [];
      collections.forEach(function(c) {
        (idsByCollection[c] || []).forEach(function(id) {
          promises.push(window.dmDb.collection(c).doc(id).delete().catch(function(e) {
            console.warn('[dm-sync] Cloud erase failed for ' + c + '/' + id + ':', e.message);
          }));
        });
      });
      return Promise.all(promises);
    }).then(function() {
      window.dispatchEvent(new CustomEvent('dm-budget-updated'));
    });
  }

  function syncAll(userId) {
    if (_syncing) return Promise.resolve();
    if (isInQuotaCooldown()) {
      console.log('[dm-sync] Skipping sync — quota cooldown active');
      window.dispatchEvent(new CustomEvent('dm-sync-complete'));
      return Promise.resolve();
    }
    _syncing = true;

    return syncNotes(userId)
      .then(function() { return syncTodos(userId); })
      .then(function() { return syncProjects(userId); })
      .then(function() { return syncKanbanColumns(userId); })
      .then(function() { return syncVersions(userId); })
      .then(function() { return syncAttachments(userId); })
      .then(function() { return syncReviewCards(userId); })
      .then(function() { return syncClosedDays(userId); })
      .then(function() { return syncPageFilters(userId); })
      .then(function() { return syncBudgetCurrency(userId); })
      .then(function() { return syncTaskShares(userId); })
      .then(function() { return syncSharedTodos(userId); })
      .then(function() { return syncNoteShares(userId); })
      .then(function() { return syncSharedNotes(userId); })
      .then(function() { return syncProjectShares(userId); })
      .then(function() { return syncSharedProjects(userId); })
      .then(function() { return syncBudgetData(userId); })
      .then(function() {
        _syncing = false;
        window.dispatchEvent(new CustomEvent('dm-sync-complete'));
        // Auto-purge expired trash (30+ days old) after sync
        purgeExpiredTrash().catch(function(err) {
          console.warn('[dm-sync] Trash purge error:', err);
        });
      })
      .catch(function(err) {
        _syncing = false;
        if (isQuotaError(err)) {
          enterQuotaCooldown();
          // Still dispatch sync-complete so UI renders from cached IDB data
          window.dispatchEvent(new CustomEvent('dm-sync-complete'));
          return;
        }
        console.error('[dm-sync] Sync error:', err);
        throw err;
      });
  }

  function startBackgroundSync(userId) {
    stopBackgroundSync();
    _syncTimer = setInterval(function() {
      syncAll(userId).catch(function(err) {
        console.warn('[dm-sync] Background sync failed:', err);
      });
    }, SYNC_INTERVAL);
  }

  function stopBackgroundSync() {
    if (_syncTimer) {
      clearInterval(_syncTimer);
      _syncTimer = null;
    }
  }

  // ─── Reminder Timer Engine ───

  var _reminderTimers = {}; // todoId -> timeoutId
  var MAX_TIMEOUT = 2147483647; // 2^31 - 1 ms (~24.8 days)

  // ─── Notification Chime (Web Audio API) ───

  function playReminderChime() {
    // Use shared sound system if available (respects user's sound + volume preferences)
    if (window.dmSounds) {
      var soundId = 'chime';
      try { var v = localStorage.getItem('dm-pomo-sound-work'); if (v) soundId = v; } catch(e) {}
      window.dmSounds.play(soundId);
      return;
    }
    // Fallback: original hardcoded chime
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var notes = [
        { freq: 830, start: 0, dur: 0.12 },
        { freq: 1050, start: 0.13, dur: 0.12 },
        { freq: 1250, start: 0.26, dur: 0.18 }
      ];
      notes.forEach(function(n) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = n.freq;
        gain.gain.setValueAtTime(0.15, ctx.currentTime + n.start);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + n.start + n.dur);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime + n.start);
        osc.stop(ctx.currentTime + n.start + n.dur + 0.05);
      });
      setTimeout(function() { ctx.close(); }, 600);
    } catch(e) {}
  }

  // ─── Persistent Reminder Banner ───

  function showReminderBanner(title, text, todoId) {
    var container = document.getElementById('dm-reminder-banner-container');
    if (!container) return;

    // Prevent duplicate banners for the same todo
    if (todoId && container.querySelector('[data-reminder-todo="' + todoId + '"]')) return;

    var banner = document.createElement('div');
    banner.className = 'dm-reminder-banner';
    if (todoId) banner.setAttribute('data-reminder-todo', todoId);
    banner.innerHTML =
      '<svg class="dm-icon dm-icon--bell dm-reminder-banner-icon" width="2" height="2" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-bell"/></svg>' +
      '<div class="dm-reminder-banner-body">' +
        '<span class="dm-reminder-banner-label"></span>' +
        '<span class="dm-reminder-banner-text"></span>' +
      '</div>' +
      '<button class="dm-reminder-banner-ack">Acknowledge</button>';

    // Set text content safely (no innerHTML for user data)
    banner.querySelector('.dm-reminder-banner-label').textContent = title;
    banner.querySelector('.dm-reminder-banner-text').textContent = text;

    container.appendChild(banner);

    // Slide down
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        banner.classList.add('dm-banner--in');
      });
    });

    // Acknowledge = dismiss + persist acknowledgment
    banner.querySelector('.dm-reminder-banner-ack').addEventListener('click', function() {
      banner.classList.remove('dm-banner--in');
      banner.classList.add('dm-banner--out');
      setTimeout(function() {
        if (banner.parentNode) banner.parentNode.removeChild(banner);
      }, 450);

      // Persist acknowledgment so banner doesn't reappear on refresh
      if (todoId) {
        idbGet(STORE_TODOS, todoId).then(function(todo) {
          if (!todo) return;
          todo.reminderAcked = true;
          todo.updatedAt = Date.now();
          return firestoreWrite({
            collection: 'todos',
            docId: todoId,
            op: 'update',
            data: {
              reminderAcked: true,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            },
            localOp: function() {
              return idbPut(STORE_TODOS, todo);
            }
          }).then(function() {
            window.dispatchEvent(new CustomEvent('dm-todos-updated'));
          });
        });
      }
    });
  }

  function clearReminderTimer(todoId) {
    if (_reminderTimers[todoId]) {
      clearTimeout(_reminderTimers[todoId]);
      delete _reminderTimers[todoId];
    }
  }

  function clearAllReminderTimers() {
    Object.keys(_reminderTimers).forEach(function(id) {
      clearTimeout(_reminderTimers[id]);
    });
    _reminderTimers = {};
  }

  function buildReminderBody(todo) {
    var parts = [todo.title];
    if (todo.estimatedMin) parts.push(todo.estimatedMin + 'min');
    if (todo.scheduledDate) {
      var today = new Date(); today.setHours(0,0,0,0);
      var d = new Date(todo.scheduledDate + 'T00:00:00');
      var diff = Math.round((d - today) / 86400000);
      if (diff === 0) parts.push('Today');
      else if (diff === 1) parts.push('Tomorrow');
      else parts.push(todo.scheduledDate);
    }
    return parts.join(' \u2014 '); // em dash
  }

  function fireReminder(todo) {
    var body = buildReminderBody(todo);

    // Show persistent banner + play chime
    playReminderChime();
    showReminderBanner('Reminder:', body, todo.id);

    // Mark as fired (but NOT acknowledged — banner persists until user clicks Acknowledge)
    todo.reminderFired = true;
    todo.updatedAt = Date.now();
    firestoreWrite({
      collection: 'todos',
      docId: todo.id,
      op: 'update',
      data: {
        reminderFired: true,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      },
      localOp: function() {
        return idbPut(STORE_TODOS, todo);
      }
    }).then(function() {
      window.dispatchEvent(new CustomEvent('dm-todos-updated'));
    });
  }

  function scheduleReminder(todo) {
    clearReminderTimer(todo.id);

    if (!todo.reminderAt || todo.reminderFired || todo.done) return;

    var now = Date.now();
    var delay = todo.reminderAt - now;

    if (delay <= 0) {
      // Overdue — fire immediately
      fireReminder(todo);
      return;
    }

    // Cap at MAX_TIMEOUT; for longer delays, re-schedule instead of firing early
    var actualDelay = Math.min(delay, MAX_TIMEOUT);
    _reminderTimers[todo.id] = setTimeout(function() {
      delete _reminderTimers[todo.id];
      // Re-check in case it was cancelled or fired
      idbGet(STORE_TODOS, todo.id).then(function(latest) {
        if (latest && !latest.reminderFired && !latest.done && latest.reminderAt) {
          // If reminder time is still in the future (delay was capped), re-schedule
          if (latest.reminderAt > Date.now()) {
            scheduleReminder(latest);
          } else {
            fireReminder(latest);
          }
        }
      });
    }, actualDelay);
  }

  function scheduleAllReminders() {
    clearAllReminderTimers();
    idbGetAll(STORE_TODOS).then(function(todos) {
      todos.forEach(function(t) {
        if (t.reminderAt && !t.reminderFired && !t.done) {
          scheduleReminder(t);
        }
      });
    }).catch(function(err) {
      console.warn('[dm-sync] Failed to schedule reminders:', err);
    });
  }

  // Re-evaluate timers when todos change
  window.addEventListener('dm-todos-updated', function() {
    scheduleAllReminders();
  });

  // Restore banners for reminders that fired but were never acknowledged
  // (e.g. page was refreshed before user clicked Acknowledge)
  function showPendingReminders() {
    idbGetAll(STORE_TODOS).then(function(todos) {
      todos.forEach(function(t) {
        if (t.reminderFired && !t.reminderAcked && !t.done) {
          var body = buildReminderBody(t);
          showReminderBanner('Reminder:', body, t.id);
        }
      });
    }).catch(function(err) {
      console.warn('[dm-sync] Failed to show pending reminders:', err);
    });
  }

  // Show pending reminders once after initial sync completes
  var _pendingRemindersShown = false;
  window.addEventListener('dm-todos-updated', function() {
    if (!_pendingRemindersShown) {
      _pendingRemindersShown = true;
      // Small delay to let the page finish rendering
      setTimeout(showPendingReminders, 500);
    }
  });

  // ─── Note Version History ───

  /**
   * Save a snapshot of the current note state as a version.
   * Called BEFORE applying new edits so the "previous" state is preserved.
   * @param {Object} note — the note object (current state before edit)
   * @returns {Promise}
   */
  function saveNoteVersion(note) {
    if (!note || !note.id) return Promise.resolve();

    var user = window.dmAuth && window.dmAuth.currentUser;
    if (!user) return Promise.resolve();

    var versionId = window.dmDb
      ? window.dmDb.collection('noteVersions').doc().id
      : ('local-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9));

    var now = Date.now();
    var versionData = {
      userId: user.uid,
      noteId: note.id,
      title: note.title || '',
      content: note.content || '',
      tags: note.tags ? note.tags.slice() : [],
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    var localVersion = {
      id: versionId,
      userId: user.uid,
      noteId: note.id,
      title: note.title || '',
      content: note.content || '',
      tags: note.tags ? note.tags.slice() : [],
      createdAt: now
    };

    return firestoreWrite({
      collection: 'noteVersions',
      docId: versionId,
      op: 'set',
      data: versionData,
      localOp: function() { return idbPut(STORE_VERSIONS, localVersion); }
    }).then(function() {
      // Prune old versions beyond MAX_VERSIONS_PER_NOTE
      return pruneVersions(note.id);
    }).catch(function(err) {
      console.warn('[dm-sync] Version save failed (non-blocking):', err);
    });
  }

  /**
   * Remove oldest versions beyond MAX_VERSIONS_PER_NOTE for a given note.
   */
  function pruneVersions(noteId) {
    return getVersionsForNote(noteId).then(function(versions) {
      if (versions.length <= MAX_VERSIONS_PER_NOTE) return;

      // versions are sorted newest first — remove excess from the end
      var toDelete = versions.slice(MAX_VERSIONS_PER_NOTE);
      var chain = Promise.resolve();
      toDelete.forEach(function(v) {
        chain = chain.then(function() {
          return firestoreWrite({
            collection: 'noteVersions',
            docId: v.id,
            op: 'delete',
            data: null,
            localOp: function() { return idbDelete(STORE_VERSIONS, v.id); }
          });
        });
      });
      return chain;
    });
  }

  /**
   * Get all versions for a note, sorted newest first.
   */
  function getVersionsForNote(noteId) {
    return idbGetAll(STORE_VERSIONS).then(function(all) {
      return all.filter(function(v) { return v.noteId === noteId; })
        .sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
    });
  }

  /**
   * Sync versions from Firestore for a given user (called during full sync).
   */
  function syncVersions(userId) {
    if (!window.dmDb) return Promise.resolve();

    console.log('[dm-sync] Syncing note versions...');
    return window.dmDb.collection('noteVersions')
      .where('userId', '==', userId)
      .get()
      .then(function(snapshot) {
        var remoteVersions = [];
        snapshot.forEach(function(doc) {
          var data = doc.data();
          remoteVersions.push({
            id: doc.id,
            userId: data.userId || '',
            noteId: data.noteId || '',
            title: data.title || '',
            content: data.content || '',
            tags: data.tags || [],
            createdAt: data.createdAt ? data.createdAt.toMillis() : 0
          });
        });

        return idbGetAll(STORE_VERSIONS).then(function(localVersions) {
          var localMap = {};
          localVersions.forEach(function(v) { localMap[v.id] = v; });

          var remoteMap = {};
          remoteVersions.forEach(function(v) { remoteMap[v.id] = v; });

          // Upsert remote versions
          var toUpsert = [];
          remoteVersions.forEach(function(rv) {
            var lv = localMap[rv.id];
            if (!lv || lv.createdAt !== rv.createdAt) {
              toUpsert.push(rv);
            }
          });

          // Delete local versions that no longer exist remotely
          var toDelete = [];
          localVersions.forEach(function(lv) {
            if (!remoteMap[lv.id]) {
              toDelete.push(lv.id);
            }
          });

          var promises = [];
          if (toUpsert.length > 0) {
            promises.push(idbPutBatch(STORE_VERSIONS, toUpsert));
          }
          toDelete.forEach(function(id) {
            promises.push(idbDelete(STORE_VERSIONS, id));
          });

          return Promise.all(promises).then(function() {
            console.log('[dm-sync] Versions sync complete. Upserted: ' + toUpsert.length + ', Deleted: ' + toDelete.length);
          });
        });
      });
  }

  // ─── Attachments ───

  function serializeAttachment(doc) {
    var data = doc.data();
    return {
      id: doc.id,
      userId: data.userId || '',
      noteId: data.noteId || '',
      fileName: data.fileName || '',
      fileType: data.fileType || '',
      fileSize: data.fileSize || 0,
      storagePath: data.storagePath || '',
      downloadUrl: data.downloadUrl || '',
      createdAt: data.createdAt ? data.createdAt.toMillis() : 0
    };
  }

  /**
   * Upload a file to Firebase Storage and create attachment metadata in Firestore.
   * @param {string} noteId — the note this attachment belongs to
   * @param {File} file — the File object to upload
   * @param {function} onProgress — optional callback(percent) for upload progress
   * @returns {Promise<Object>} — the attachment metadata object
   */
  function uploadAttachment(noteId, file, onProgress) {
    var user = window.dmAuth && window.dmAuth.currentUser;
    if (!user) { console.error('[dm-sync] Not authenticated'); return Promise.reject(new Error('Not authenticated')); }
    if (!window.dmStorage) { console.error('[dm-sync] Storage not available'); return Promise.reject(new Error('Storage not available')); }

    if (file.size > MAX_FILE_SIZE) {
      console.error('[dm-sync] File too large:', file.size);
      return Promise.reject(new Error('File too large (max 10 MB)'));
    }

    // Generate unique filename to avoid collisions
    var timestamp = Date.now();
    var safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    var storagePath = 'users/' + user.uid + '/attachments/' + noteId + '/' + timestamp + '-' + safeName;
    var storageRef = window.dmStorage.ref(storagePath);

    return new Promise(function(resolve, reject) {
      var uploadTask = storageRef.put(file);

      uploadTask.on('state_changed',
        function(snapshot) {
          if (onProgress) {
            var pct = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
            onProgress(pct);
          }
        },
        function(error) {
          console.error('[dm-sync] Upload error:', error);
          reject(error);
        },
        function() {
          // Upload complete — get download URL
          uploadTask.snapshot.ref.getDownloadURL().then(function(downloadUrl) {
            // Create attachment metadata in Firestore
            var attachId = window.dmDb
              ? window.dmDb.collection('attachments').doc().id
              : ('local-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9));

            var now = Date.now();
            var attachData = {
              userId: user.uid,
              noteId: noteId,
              fileName: file.name,
              fileType: file.type || 'application/octet-stream',
              fileSize: file.size,
              storagePath: storagePath,
              downloadUrl: downloadUrl,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            var localAttach = {
              id: attachId,
              userId: user.uid,
              noteId: noteId,
              fileName: file.name,
              fileType: file.type || 'application/octet-stream',
              fileSize: file.size,
              storagePath: storagePath,
              downloadUrl: downloadUrl,
              createdAt: now
            };

            firestoreWrite({
              collection: 'attachments',
              docId: attachId,
              op: 'set',
              data: attachData,
              localOp: function() { return idbPut(STORE_ATTACHMENTS, localAttach); }
            }).then(function() {
              window.dispatchEvent(new CustomEvent('dm-attachments-updated', { detail: { noteId: noteId } }));
              resolve(localAttach);
            }).catch(function(err) {
              reject(err);
            });
          }).catch(function(err) {
            reject(err);
          });
        }
      );
    });
  }

  /**
   * Get all attachments for a note, sorted newest first.
   */
  function getAttachmentsForNote(noteId) {
    return idbGetAll(STORE_ATTACHMENTS).then(function(all) {
      return all.filter(function(a) { return a.noteId === noteId; })
        .sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
    });
  }

  /**
   * Delete an attachment: remove from Storage, Firestore, and IDB.
   */
  function deleteAttachment(attachment) {
    if (!attachment) return Promise.resolve();

    // Delete from Firebase Storage
    var storagePromise = Promise.resolve();
    if (window.dmStorage && attachment.storagePath && _isOnline) {
      var ref = window.dmStorage.ref(attachment.storagePath);
      storagePromise = ref.delete().catch(function(err) {
        // Ignore 'object-not-found' — file may already be deleted
        if (err.code !== 'storage/object-not-found') {
          console.warn('[dm-sync] Storage delete error:', err);
        }
      });
    }

    // Delete metadata from Firestore + IDB
    return storagePromise.then(function() {
      return firestoreWrite({
        collection: 'attachments',
        docId: attachment.id,
        op: 'delete',
        data: null,
        localOp: function() { return idbDelete(STORE_ATTACHMENTS, attachment.id); }
      });
    }).then(function() {
      window.dispatchEvent(new CustomEvent('dm-attachments-updated', { detail: { noteId: attachment.noteId } }));
    });
  }

  /**
   * Delete all attachments for a note.
   */
  function deleteAttachmentsForNote(noteId) {
    return getAttachmentsForNote(noteId).then(function(attachments) {
      var chain = Promise.resolve();
      attachments.forEach(function(a) {
        chain = chain.then(function() { return deleteAttachment(a); });
      });
      return chain;
    });
  }

  /**
   * Sync attachments from Firestore for a given user.
   */
  function syncAttachments(userId) {
    if (!window.dmDb) return Promise.resolve();

    console.log('[dm-sync] Syncing attachments...');
    return window.dmDb.collection('attachments')
      .where('userId', '==', userId)
      .get()
      .then(function(snapshot) {
        var remoteAttachments = [];
        snapshot.forEach(function(doc) {
          remoteAttachments.push(serializeAttachment(doc));
        });

        return idbGetAll(STORE_ATTACHMENTS).then(function(localAttachments) {
          var localMap = {};
          localAttachments.forEach(function(a) { localMap[a.id] = a; });

          var remoteMap = {};
          remoteAttachments.forEach(function(a) { remoteMap[a.id] = a; });

          var toUpsert = [];
          remoteAttachments.forEach(function(ra) {
            var la = localMap[ra.id];
            if (!la || la.createdAt !== ra.createdAt) {
              toUpsert.push(ra);
            }
          });

          var toDelete = [];
          localAttachments.forEach(function(la) {
            if (!remoteMap[la.id]) {
              toDelete.push(la.id);
            }
          });

          var promises = [];
          if (toUpsert.length > 0) {
            promises.push(idbPutBatch(STORE_ATTACHMENTS, toUpsert));
          }
          toDelete.forEach(function(id) {
            promises.push(idbDelete(STORE_ATTACHMENTS, id));
          });

          return Promise.all(promises).then(function() {
            console.log('[dm-sync] Attachments sync complete. Upserted: ' + toUpsert.length + ', Deleted: ' + toDelete.length);
          });
        });
      });
  }

  // ─── Spaced Repetition (SM-2 Algorithm) ───

  /**
   * SM-2 algorithm implementation.
   * @param {number} quality — 0-5 rating (0=blackout, 5=perfect)
   * @param {number} repetitions — current successful-review count
   * @param {number} easeFactor — current ease factor (min 1.3)
   * @param {number} interval — current interval in days
   * @returns {Object} - { repetitions, easeFactor, interval, nextReviewAt }
   */
  function sm2(quality, repetitions, easeFactor, interval) {
    var newEF = easeFactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
    if (newEF < 1.3) newEF = 1.3;

    var newReps, newInterval;
    if (quality >= 3) {
      // Correct response
      newReps = repetitions + 1;
      if (newReps === 1) {
        newInterval = 1;
      } else if (newReps === 2) {
        newInterval = 6;
      } else {
        newInterval = Math.round(interval * newEF);
      }
    } else {
      // Incorrect — reset
      newReps = 0;
      newInterval = 1;
    }

    var now = new Date();
    var nextDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() + newInterval);
    nextDate.setHours(0, 0, 0, 0);

    return {
      repetitions: newReps,
      easeFactor: Math.round(newEF * 100) / 100,
      interval: newInterval,
      nextReviewAt: nextDate.getTime()
    };
  }

  function serializeReviewCard(doc) {
    var data = doc.data();
    return {
      id: doc.id,
      front: data.front || '',
      back: data.back || '',
      tags: data.tags || [],
      userId: data.userId || '',
      easeFactor: data.easeFactor != null ? data.easeFactor : 2.5,
      interval: data.interval || 0,
      repetitions: data.repetitions || 0,
      nextReviewAt: data.nextReviewAt ? data.nextReviewAt.toMillis() : 0,
      lastReviewedAt: data.lastReviewedAt ? data.lastReviewedAt.toMillis() : null,
      createdAt: data.createdAt ? data.createdAt.toMillis() : 0,
      updatedAt: data.updatedAt ? data.updatedAt.toMillis() : 0
    };
  }

  /**
   * Create a standalone flashcard with front/back content.
   * First review is immediately due (nextReviewAt = now).
   * @param {string} front — question/prompt text (required)
   * @param {string} back — answer text (required)
   * @param {string[]} [tags] — optional tags
   */
  function createReviewCard(front, back, tags) {
    var user = window.dmAuth && window.dmAuth.currentUser;
    if (!user) return Promise.reject(new Error('Not authenticated'));
    if (!front || !back) return Promise.reject(new Error('Front and back are required'));

    var cardId = window.dmDb
      ? window.dmDb.collection('reviewCards').doc().id
      : ('local-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9));

    var now = Date.now();
    var cardTags = tags || [];
    var localCard = {
      id: cardId,
      front: front,
      back: back,
      tags: cardTags,
      userId: user.uid,
      easeFactor: 2.5,
      interval: 0,
      repetitions: 0,
      nextReviewAt: now, // due immediately
      lastReviewedAt: null,
      createdAt: now,
      updatedAt: now
    };

    var fsData = {
      front: front,
      back: back,
      tags: cardTags,
      userId: user.uid,
      easeFactor: 2.5,
      interval: 0,
      repetitions: 0,
      nextReviewAt: firebase.firestore.Timestamp.fromMillis(now),
      lastReviewedAt: null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    return firestoreWrite({
      collection: 'reviewCards',
      docId: cardId,
      op: 'set',
      data: fsData,
      localOp: function() { return idbPut(STORE_REVIEW_CARDS, localCard); }
    }).then(function() {
      window.dispatchEvent(new CustomEvent('dm-review-updated'));
      return localCard;
    });
  }

  /**
   * Update a review card's content or tags.
   * @param {string} cardId
   * @param {Object} updates — { front?, back?, tags? }
   */
  function updateReviewCardContent(cardId, updates) {
    return idbGet(STORE_REVIEW_CARDS, cardId).then(function(card) {
      if (!card) return Promise.reject(new Error('Card not found'));

      var now = Date.now();
      var fsUpdates = { updatedAt: firebase.firestore.FieldValue.serverTimestamp() };

      if (updates.front !== undefined) {
        card.front = updates.front;
        fsUpdates.front = updates.front;
      }
      if (updates.back !== undefined) {
        card.back = updates.back;
        fsUpdates.back = updates.back;
      }
      if (updates.tags !== undefined) {
        card.tags = updates.tags;
        fsUpdates.tags = updates.tags;
      }
      card.updatedAt = now;

      return firestoreWrite({
        collection: 'reviewCards',
        docId: card.id,
        op: 'update',
        data: fsUpdates,
        localOp: function() { return idbPut(STORE_REVIEW_CARDS, card); }
      }).then(function() {
        window.dispatchEvent(new CustomEvent('dm-review-updated'));
        return card;
      });
    });
  }

  /**
   * Submit a review rating for a card. Applies SM-2 to compute next interval.
   * @param {string} cardId
   * @param {number} quality — 0-5
   */
  function reviewCard(cardId, quality) {
    return idbGet(STORE_REVIEW_CARDS, cardId).then(function(card) {
      if (!card) return Promise.reject(new Error('Card not found'));

      var result = sm2(quality, card.repetitions, card.easeFactor, card.interval);
      var now = Date.now();

      card.easeFactor = result.easeFactor;
      card.interval = result.interval;
      card.repetitions = result.repetitions;
      card.nextReviewAt = result.nextReviewAt;
      card.lastReviewedAt = now;
      card.updatedAt = now;

      return firestoreWrite({
        collection: 'reviewCards',
        docId: card.id,
        op: 'update',
        data: {
          easeFactor: card.easeFactor,
          interval: card.interval,
          repetitions: card.repetitions,
          nextReviewAt: firebase.firestore.Timestamp.fromMillis(card.nextReviewAt),
          lastReviewedAt: firebase.firestore.Timestamp.fromMillis(now),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        },
        localOp: function() { return idbPut(STORE_REVIEW_CARDS, card); }
      }).then(function() {
        window.dispatchEvent(new CustomEvent('dm-review-updated'));
        return card;
      });
    });
  }

  /**
   * Remove a flashcard from the review system.
   */
  function deleteReviewCard(cardId) {
    return firestoreWrite({
      collection: 'reviewCards',
      docId: cardId,
      op: 'delete',
      data: null,
      localOp: function() { return idbDelete(STORE_REVIEW_CARDS, cardId); }
    }).then(function() {
      window.dispatchEvent(new CustomEvent('dm-review-updated'));
    });
  }

  /**
   * Get all review cards, optionally only those due for review.
   * @param {boolean} dueOnly — if true, only return cards where nextReviewAt <= now
   */
  function getReviewCards(dueOnly) {
    var now = Date.now();
    return idbGetAll(STORE_REVIEW_CARDS).then(function(cards) {
      if (dueOnly) {
        cards = cards.filter(function(c) { return c.nextReviewAt <= now; });
      }
      // Sort: due soonest first
      return cards.sort(function(a, b) { return (a.nextReviewAt || 0) - (b.nextReviewAt || 0); });
    });
  }

  /**
   * Get count of cards due for review right now.
   */
  function getDueCount() {
    var now = Date.now();
    return idbGetAll(STORE_REVIEW_CARDS).then(function(cards) {
      return cards.filter(function(c) { return c.nextReviewAt <= now; }).length;
    });
  }

    return window.dmDb.collection('reviewCards')

      .then(function(snapshot) {

        snapshot.forEach(function(doc) {

        });

        return idbGetAll(STORE_REVIEW_CARDS).then(function(localCards) {
          var localMap = {};
          localCards.forEach(function(c) { localMap[c.id] = c; });

          var remoteMap = {};
          remoteCards.forEach(function(c) { remoteMap[c.id] = c; });

          var toUpsert = [];
          remoteCards.forEach(function(rc) {
            var lc = localMap[rc.id];
            if (!lc || lc.updatedAt !== rc.updatedAt) {
              toUpsert.push(rc);
            }
          });

          var toDelete = [];
          localCards.forEach(function(lc) {
            if (!remoteMap[lc.id]) {
              toDelete.push(lc.id);
            }
          });

          var promises = [];
          if (toUpsert.length > 0) {
            promises.push(idbPutBatch(STORE_REVIEW_CARDS, toUpsert));
          }
          toDelete.forEach(function(id) {
            promises.push(idbDelete(STORE_REVIEW_CARDS, id));
          });

          return Promise.all(promises).then(function() {
            console.log('[dm-sync] Review cards sync complete. Upserted: ' + toUpsert.length + ', Deleted: ' + toDelete.length);
          });
        });
      });
  }

  // ─── Task Sharing ───

  /**
   * Serialize a taskShares Firestore document for IndexedDB storage.

  function serializeTaskShare(doc) {

    return {

      todoTitle: data.todoTitle || '',
      ownerId: data.ownerId || '',

  /**
   * Look up a user by email in the users collection.
   * @param {string} email
   * @returns {Promise<Object|null>} — user profile or null
   */
  function lookupUserByEmail(email) {
    if (!window.dmDb) return Promise.resolve(null);
    return window.dmDb.collection('users')
      .where('email', '==', email)
      .limit(1)
      .get()
      .then(function(snapshot) {
        if (snapshot.empty) return null;
        var doc = snapshot.docs[0];
        var data = doc.data();
        return {
          uid: doc.id,
          email: data.email || '',
          displayName: data.displayName || '',
          photoURL: data.photoURL || null
        };
      });
  }

  /**
   * Share a task with another user by email.
   * Creates a taskShares doc with a deterministic ID (todoId_inviteeUid) so
   * Firestore security rules can verify the share exists when the invitee
   * adds themselves to the todo's collaborators array.
   * @param {string} todoId — the task to share
   * @param {string} email — invitee's email address
   * @returns {Promise<Object>} — the created share doc
   */
  function shareTask(todoId, email) {
    var user = window.dmAuth && window.dmAuth.currentUser;
    if (!user) return Promise.reject(new Error('Not authenticated'));
    if (!window.dmDb) return Promise.reject(new Error('Firestore not available'));
    if (email === user.email) return Promise.reject(new Error('Cannot share with yourself'));

    // Look up invitee first — they must have an account for deterministic ID
    return lookupUserByEmail(email).then(function(invitee) {
      if (!invitee) return Promise.reject(new Error('No account found for ' + email + '. They must sign in at least once before you can share with them.'));

      // Deterministic share ID: todoId_inviteeUid
      var shareId = todoId + '_' + invitee.uid;

      // Check if already shared with this user, and fetch todo title
      return Promise.all([
        idbGetAll(STORE_TASK_SHARES),
        idbGet(STORE_TODOS, todoId)
      ]).then(function(results) {
        var shares = results[0];
        var todo = results[1];
        var existing = shares.find(function(s) {
          return s.id === shareId && s.status !== 'declined';
        });
        if (existing) return Promise.reject(new Error('Already shared with ' + email));

        var now = Date.now();
        var todoTitle = (todo && todo.title) || '';

        // Ensure the todo has a collaborators array in Firestore (backfill for
        // todos created before the collaborators field was added to createTodo).
        // The owner update rule allows this. We use set+merge so it only adds
        // the field if missing, without overwriting existing collaborators.
        var backfillPromise = Promise.resolve();
        if (todo && (!todo.collaborators || !Array.isArray(todo.collaborators))) {
          backfillPromise = window.dmDb.collection('todos').doc(todoId).set({
            collaborators: []
          }, { merge: true }).then(function() {
            // Update local IDB copy too
            todo.collaborators = [];
            return idbPut(STORE_TODOS, todo);
          }).catch(function(err) {

      // Step 1: Update the share document status to 'accepted' — must be a direct
      // Firestore write (not firestoreWrite) because Step 2's security rule checks
      // that the share status is 'accepted' in Firestore. Queuing would leave it 'pending'.
      return window.dmDb.collection('taskShares').doc(shareId).update({
        status: 'accepted',
        inviteeUid: user.uid,

        // Security rules allow this because the deterministic taskShares doc
        // (todoId_inviteeUid) now exists with status 'accepted' in Firestore.
        return window.dmDb.collection('todos').doc(share.todoId).update({
          collaborators: firebase.firestore.FieldValue.arrayUnion(user.uid),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }).then(function() {
        // Step 3: Fetch the shared todo into local IDB so it appears in the list
        return window.dmDb.collection('todos').doc(share.todoId).get().then(function(doc) {
          if (doc.exists) {

  /**
   * Accept a pending project share invitation.
   * Updates status to 'accepted', adds current user to project's collaborators
   * array, cascades collaborator to all tasks in the project, and fetches the
   * shared project and its tasks into local IDB.
   * @param {string} shareId - the projectShares document ID (format: projectId_inviteeUid)
   */
  function acceptProjectShare(shareId) {
    var user = window.dmAuth && window.dmAuth.currentUser;
    if (!user) return Promise.reject(new Error('Not authenticated'));
    if (!window.dmDb) return Promise.reject(new Error('You must be online to accept a share'));

    return idbGet(STORE_PROJECT_SHARES, shareId).then(function(share) {
      if (!share) return Promise.reject(new Error('Share not found'));
      if (share.status !== 'pending') return Promise.reject(new Error('Share is not pending'));

      var projectId = share.projectId;

      // Step 1: Update the share document status to 'accepted'
      return window.dmDb.collection('projectShares').doc(shareId).update({
        status: 'accepted',
        inviteeUid: user.uid,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(function() {
        share.status = 'accepted';
        share.inviteeUid = user.uid;
        share.updatedAt = Date.now();
        return idbPut(STORE_PROJECT_SHARES, share);
      }).then(function() {
        // Step 2: Add current user to project's collaborators array
        return window.dmDb.collection('projects').doc(projectId).update({
          collaborators: firebase.firestore.FieldValue.arrayUnion(user.uid),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }).then(function() {
        // Step 3: Fetch the shared project into local IDB
        return window.dmDb.collection('projects').doc(projectId).get().then(function(doc) {
          if (doc.exists) {
            var project = serializeProject(doc);
            return idbPut(STORE_PROJECTS, project);
          }
        });
      }).then(function() {
        // Step 4: Cascade — add user to all tasks in this project
        return window.dmDb.collection('todos')
          .where('projectId', '==', projectId)
          .get()
          .then(function(snapshot) {
            var batch = window.dmDb.batch();
            snapshot.forEach(function(doc) {
              batch.update(doc.ref, {
                collaborators: firebase.firestore.FieldValue.arrayUnion(user.uid),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
              });
            });
            return batch.commit().then(function() {
              // Also store the tasks locally
              var promises = [];
              snapshot.forEach(function(doc) {
                if (doc.exists) {
                  var todo = serializeTodo(doc);
                  promises.push(idbPut(STORE_TODOS, todo));
                }
              });
              return Promise.all(promises);
            });
          });
      }).then(function() {
        window.dispatchEvent(new CustomEvent('dm-project-shares-updated'));
        window.dispatchEvent(new CustomEvent('dm-projects-updated'));
        window.dispatchEvent(new CustomEvent('dm-todos-updated'));
        window.dispatchEvent(new CustomEvent('dm-sync-complete'));
      });

      share.status = 'declined';

      return firestoreWrite({
        collection: 'projectShares',
        docId: shareId,
        op: 'update',
        data: {
          status: 'declined',
          inviteeUid: user.uid,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        },

  /**
   * Remove sharing for a project with a specific user. Owner-only operation.
   * Removes the share doc, the user from the project's collaborators array,
   * and cascades removal from all tasks in the project.
   * @param {string} shareId - the projectShares document ID
   */
  function unshareProject(shareId) {
    var user = window.dmAuth && window.dmAuth.currentUser;
    if (!user) return Promise.reject(new Error('Not authenticated'));

    return idbGet(STORE_PROJECT_SHARES, shareId).then(function(share) {
      if (!share) return Promise.reject(new Error('Share not found'));
      if (share.ownerId !== user.uid) return Promise.reject(new Error('Only the owner can unshare'));

      var inviteeUid = share.inviteeUid;
      var projectId = share.projectId;

      // Delete the share document
      return firestoreWrite({
        collection: 'projectShares',
        docId: shareId,
        op: 'delete',
        data: null,
        localOp: function() { return idbDelete(STORE_PROJECT_SHARES, shareId); }
      }).then(function() {
        // Remove collaborator from project's collaborators array
        if (inviteeUid && window.dmDb) {
          return window.dmDb.collection('projects').doc(projectId).update({
            collaborators: firebase.firestore.FieldValue.arrayRemove(inviteeUid),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }).then(function() {
            return idbGet(STORE_PROJECTS, projectId).then(function(project) {
              if (project && project.collaborators) {
                project.collaborators = project.collaborators.filter(function(uid) { return uid !== inviteeUid; });
                project.updatedAt = Date.now();
                return idbPut(STORE_PROJECTS, project);
              }
            });
          }).then(function() {
            // Cascade: remove collaborator from all tasks in this project
            return idbGetAll(STORE_TODOS).then(function(todos) {
              var projectTodos = todos.filter(function(t) { return t.projectId === projectId && !t.deletedAt; });
              var promises = projectTodos.map(function(t) {
                if (t.collaborators && t.collaborators.indexOf(inviteeUid) !== -1) {
                  t.collaborators = t.collaborators.filter(function(uid) { return uid !== inviteeUid; });
                  t.updatedAt = Date.now();
                  return firestoreWrite({
                    collection: 'todos',
                    docId: t.id,
                    op: 'update',
                    data: {
                      collaborators: firebase.firestore.FieldValue.arrayRemove(inviteeUid),
                      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    },
                    localOp: function() { return idbPut(STORE_TODOS, t); }
                  });
                }
                return Promise.resolve();
              });
              return Promise.all(promises);
            });
          }).catch(function(err) {
            console.warn('[dm-sync] Failed to remove project collaborator:', err);
          });
        }
      }).then(function() {
        window.dispatchEvent(new CustomEvent('dm-project-shares-updated'));
        window.dispatchEvent(new CustomEvent('dm-projects-updated'));
        window.dispatchEvent(new CustomEvent('dm-todos-updated'));
        window.dispatchEvent(new CustomEvent('dm-sync-complete'));
      });
    });
  }

      .where('inviteeEmail', '==', user.email)
      .get();

      var remoteShares = [];
      var seen = {};

      results.forEach(function(snapshot) {

  // ─── Real-Time Listeners for Shared Tasks ───

  var _sharedTodosUnsubscribe = null;
  var _ownTodosUnsubscribe = null;
  var _shareInvitesUnsubscribe = null;
  var _ownerSharesUnsubscribe = null;
  var _sharedTodosRetryTimer = null;
  var _sharedTodosRetryCount = 0;
  var _ownTodosRetryTimer = null;
  var _ownTodosRetryCount = 0;
  var SHARED_TODOS_MAX_RETRIES = 5;

  function _attachSharedTodosListener(userId) {
    if (!window.dmDb) return;
    _sharedTodosUnsubscribe = window.dmDb.collection('todos')
      .where('collaborators', 'array-contains', userId)
      .onSnapshot(function(snapshot) {
        _sharedTodosRetryCount = 0; // reset on success
        var changes = [];
        snapshot.docChanges().forEach(function(change) {
          if (change.type === 'added' || change.type === 'modified') {
            console.log('[dm-sync] Shared todo ' + change.type + ':', change.doc.id, change.doc.data().title);
            changes.push(serializeTodo(change.doc));
          } else if (change.type === 'removed') {
            console.log('[dm-sync] Shared todo removed:', change.doc.id);
            // Remove from local IDB if we're no longer a collaborator
            idbGet(STORE_TODOS, change.doc.id).then(function(todo) {
              if (todo && todo.userId !== userId) {
                idbDelete(STORE_TODOS, change.doc.id);
              }
            });
          }
        });
        if (changes.length > 0) {
          idbPutBatch(STORE_TODOS, changes).then(function() {
            window.dispatchEvent(new CustomEvent('dm-todos-updated'));
          });
        }
      }, function(err) {
        console.warn('[dm-sync] Shared todos listener error:', err);
        // Retry with exponential backoff
        if (_sharedTodosRetryCount < SHARED_TODOS_MAX_RETRIES) {
          var delay = Math.min(1000 * Math.pow(2, _sharedTodosRetryCount), 30000);
          _sharedTodosRetryCount++;
          console.log('[dm-sync] Retrying shared todos listener in ' + delay + 'ms (attempt ' + _sharedTodosRetryCount + '/' + SHARED_TODOS_MAX_RETRIES + ')');
          _sharedTodosRetryTimer = setTimeout(function() {
            _attachSharedTodosListener(userId);
          }, delay);
        } else {
          console.error('[dm-sync] Shared todos listener failed after ' + SHARED_TODOS_MAX_RETRIES + ' retries — falling back to periodic sync');
        }
      });
  }

  function _attachOwnTodosListener(userId) {
    if (!window.dmDb) return;
    _ownTodosUnsubscribe = window.dmDb.collection('todos')
      .where('userId', '==', userId)
      .onSnapshot(function(snapshot) {
        _ownTodosRetryCount = 0; // reset on success
        var changes = [];
        snapshot.docChanges().forEach(function(change) {
          if (change.type === 'added' || change.type === 'modified') {
            // Skip local writes that haven't committed to server yet
            if (change.doc.metadata.hasPendingWrites) return;
            // Skip docs with in-flight writes — optimistic IDB data is authoritative until confirmed
            if (_inFlightTodoWrites[change.doc.id]) return;
            changes.push(serializeTodo(change.doc));
          }
          // Deletions of own todos are handled by syncTodos / user actions
        });
        if (changes.length > 0) {
          // Filter out stale changes — only write if remote is newer than local IDB
          var filterPromises = changes.map(function(change) {
            return idbGet(STORE_TODOS, change.id).then(function(existing) {
              if (!existing || change.updatedAt > existing.updatedAt) {
                return change; // newer or new — keep
              }
              return null; // stale — skip
            });
          });
          Promise.all(filterPromises).then(function(results) {
            var filtered = results.filter(function(r) { return r !== null; });
            if (filtered.length > 0) {
              idbPutBatch(STORE_TODOS, filtered).then(function() {
                window.dispatchEvent(new CustomEvent('dm-todos-updated'));
              });
            }
          });
        }
      }, function(err) {
        console.warn('[dm-sync] Own todos listener error:', err);
        // Retry with exponential backoff
        if (_ownTodosRetryCount < SHARED_TODOS_MAX_RETRIES) {
          var delay = Math.min(1000 * Math.pow(2, _ownTodosRetryCount), 30000);
          _ownTodosRetryCount++;
          console.log('[dm-sync] Retrying own todos listener in ' + delay + 'ms (attempt ' + _ownTodosRetryCount + '/' + SHARED_TODOS_MAX_RETRIES + ')');
          _ownTodosRetryTimer = setTimeout(function() {
            _attachOwnTodosListener(userId);
          }, delay);
        } else {
          console.error('[dm-sync] Own todos listener failed after ' + SHARED_TODOS_MAX_RETRIES + ' retries — falling back to periodic sync');
        }
      });
  }

  function startSharedTaskListeners(userId) {
    stopSharedTaskListeners();
    if (!window.dmDb) return;
    var user = window.dmAuth && window.dmAuth.currentUser;
    if (!user) return;

    // Listen for changes to todos where current user is a collaborator
    _sharedTodosRetryCount = 0;
    _attachSharedTodosListener(userId);

    // Listen for changes to user's own todos (e.g. collaborator edits)
    _ownTodosRetryCount = 0;
    _attachOwnTodosListener(userId);

    // Listen for incoming share invitations
    _shareInvitesUnsubscribe = window.dmDb.collection('taskShares')
      .where('inviteeEmail', '==', user.email)
      .onSnapshot(function(snapshot) {
        var hasChanges = false;
        var chain = Promise.resolve();
        snapshot.docChanges().forEach(function(change) {
          var shareDoc = serializeTaskShare(change.doc);
          if (change.type === 'added' || change.type === 'modified') {
            hasChanges = true;
            chain = chain.then(function() { return idbPut(STORE_TASK_SHARES, shareDoc); });
          } else if (change.type === 'removed') {
            hasChanges = true;
            chain = chain.then(function() { return idbDelete(STORE_TASK_SHARES, shareDoc.id); });
          }
        });
        if (hasChanges) {
          chain.then(function() {
            window.dispatchEvent(new CustomEvent('dm-task-shares-updated'));
          });
        }
      }, function(err) {
        console.warn('[dm-sync] Share invites listener error:', err);
      });

    // Listen for status changes on shares owned by this user (e.g. invitee accepted/declined)
    _ownerSharesUnsubscribe = window.dmDb.collection('taskShares')
      .where('ownerId', '==', userId)
      .onSnapshot(function(snapshot) {
        var hasChanges = false;
        var chain = Promise.resolve();
        snapshot.docChanges().forEach(function(change) {
          var shareDoc = serializeTaskShare(change.doc);
          if (change.type === 'added' || change.type === 'modified') {
            hasChanges = true;
            chain = chain.then(function() { return idbPut(STORE_TASK_SHARES, shareDoc); });
          } else if (change.type === 'removed') {
            hasChanges = true;
            chain = chain.then(function() { return idbDelete(STORE_TASK_SHARES, shareDoc.id); });
          }
        });
        if (hasChanges) {
          chain.then(function() {
            window.dispatchEvent(new CustomEvent('dm-task-shares-updated'));
          });
        }
      }, function(err) {
        console.warn('[dm-sync] Owner shares listener error:', err);
      });
  }

  function stopSharedTaskListeners() {
    if (_sharedTodosRetryTimer) {
      clearTimeout(_sharedTodosRetryTimer);
      _sharedTodosRetryTimer = null;
    }
    _sharedTodosRetryCount = 0;
    if (_ownTodosRetryTimer) {
      clearTimeout(_ownTodosRetryTimer);
      _ownTodosRetryTimer = null;
    }
    _ownTodosRetryCount = 0;
    if (_sharedTodosUnsubscribe) {
      _sharedTodosUnsubscribe();
      _sharedTodosUnsubscribe = null;
    }
    if (_ownTodosUnsubscribe) {
      _ownTodosUnsubscribe();
      _ownTodosUnsubscribe = null;
    }
    if (_shareInvitesUnsubscribe) {
      _shareInvitesUnsubscribe();
      _shareInvitesUnsubscribe = null;
    }
    if (_ownerSharesUnsubscribe) {
      _ownerSharesUnsubscribe();
      _ownerSharesUnsubscribe = null;
    }
  }

  // ─── Real-Time Listeners for Shared Notes ───

  var _sharedNotesUnsubscribe = null;
  var _ownNotesUnsubscribe = null;

  /**
   * Convert a File to a base64 data URL markdown string.
   * Returns a Promise that resolves to a markdown image/link string.
   * Images become ![name](data:...), other files become [name](data:...).
   * Max size: 500 KB (base64 inflates ~33%, Firestore doc limit is 1 MB).
   */
  var BASE64_MAX_SIZE = 500 * 1024; // 500 KB
  window.dmFileToBase64Markdown = function(file) {
    return new Promise(function(resolve, reject) {
      if (!file) return reject(new Error('No file provided'));
      if (file.size > BASE64_MAX_SIZE) {
        return reject(new Error('File too large (max 500 KB). Try a smaller image or compress it first.'));
      }
      var reader = new FileReader();
      reader.onload = function() {
        var dataUrl = reader.result;
        var isImage = file.type && file.type.startsWith('image/');
        var name = file.name || ('pasted-' + Date.now());
        var md = isImage
          ? '![' + name + '](' + dataUrl + ')'
          : '[' + name + '](' + dataUrl + ')';
        resolve(md);
      };
      reader.onerror = function() {
        reject(new Error('Failed to read file'));
      };
      reader.readAsDataURL(file);
    });
  };

  // ─── Closed Days Sync ───
  function syncClosedDays(userId) {
    if (!window.dmDb) return Promise.resolve([]);
    return window.dmDb.collection('userSettings').doc(userId).get().then(function(doc) {
      var remoteDays = (doc.exists && doc.data().closedDays) ? doc.data().closedDays : [];

      // Merge with localStorage backup (covers in-flight writes lost during sign-out)
      var backupDays = [];
      try {
        var raw = localStorage.getItem('dm-closedDays-backup');
        if (raw) backupDays = JSON.parse(raw);
      } catch(e) {}

      // Union: combine remote + backup, deduplicate
      var merged = remoteDays.slice();
      if (backupDays.length > 0) {
        var set = {};
        merged.forEach(function(d) { set[d] = true; });
        backupDays.forEach(function(d) {
          if (!set[d]) { merged.push(d); set[d] = true; }
        });
        merged.sort();
      }

      // If backup added new days, push merged set back to Firestore
      var needsWrite = merged.length > remoteDays.length;

      // Clear backup now that we've consumed it
      try { localStorage.removeItem('dm-closedDays-backup'); } catch(e) {}

      // Overwrite local cache with merged result
      return idbPut(STORE_META, { key: 'closedDays', value: merged }).then(function() {
        // Write merged set back to Firestore if backup had extra days
        if (needsWrite && window.dmAuth && window.dmAuth.currentUser) {
          return firestoreWrite({
            collection: 'userSettings',
            docId: userId,
            op: 'set',
            data: { closedDays: merged, updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
            merge: true,
            localOp: function() { return Promise.resolve(); }
          }).then(function() {
            return merged;
          });
        }
        return merged;
      });
    }).catch(function(err) {
      console.warn('[dm-sync] Failed to sync closed days:', err);
      // Even on failure, try to restore from localStorage backup
      var backupDays = [];
      try {
        var raw = localStorage.getItem('dm-closedDays-backup');
        if (raw) backupDays = JSON.parse(raw);
        localStorage.removeItem('dm-closedDays-backup');
      } catch(e) {}
      return idbGet(STORE_META, 'closedDays').then(function(meta) {
        var local = (meta && meta.value) ? meta.value : [];
        if (backupDays.length > 0) {
          var set = {};
          local.forEach(function(d) { set[d] = true; });
          backupDays.forEach(function(d) {
            if (!set[d]) { local.push(d); set[d] = true; }
          });
          local.sort();
          return idbPut(STORE_META, { key: 'closedDays', value: local }).then(function() {
            return local;
          });
        }
        return local;
      });
    });
  }

  // Apply a project's visual identity to a DOM root by setting CSS
  // variables and data-* attributes. Used by detail/board views to scope
  // styling to a project. Pass `null` project to clear.
  window.dmApplyProjectTheme = function(rootEl, project) {
    if (!rootEl) return;
    if (!project) {
      rootEl.removeAttribute('data-project-theme');
      rootEl.removeAttribute('data-pj-pattern');
      rootEl.removeAttribute('data-pj-density');
      rootEl.removeAttribute('data-pj-shape');
      rootEl.removeAttribute('data-pj-font');
      rootEl.style.removeProperty('--pj-accent');
      rootEl.style.removeProperty('--pj-accent2');

    rootEl.setAttribute('data-project-theme', project.themeId || 'custom');
    if (project.pattern)    rootEl.setAttribute('data-pj-pattern', project.pattern); else rootEl.removeAttribute('data-pj-pattern');
    if (project.density)    rootEl.setAttribute('data-pj-density', project.density); else rootEl.removeAttribute('data-pj-density');

  window.dmSync = {
    // IndexedDB operations — Notes
    getNote: function(id) {
      return idbGet(STORE_NOTES, id).then(function(note) {
        if (note && note.deletedAt) return null;
        return note;
      });
    },
    getNoteIncludingTrashed: function(id) { return idbGet(STORE_NOTES, id); },
    getAllNotes: function() { return getActiveNotes(); },
    putNote: function(note) {
      return idbPut(STORE_NOTES, note).then(function() {
        window.dispatchEvent(new CustomEvent('dm-sync-complete'));
      });
    },
    deleteNote: function(id) {
      return idbDelete(STORE_NOTES, id).then(function() {
        window.dispatchEvent(new CustomEvent('dm-sync-complete'));
      });
    },
    // Soft-delete: move note to trash
    trashNote: function(id) {
      return idbGet(STORE_NOTES, id).then(function(note) {
        if (!note) return;
        note.deletedAt = Date.now();
        note.updatedAt = Date.now();
        return idbPut(STORE_NOTES, note).then(function() {
          window.dispatchEvent(new CustomEvent('dm-sync-complete'));
        });
      });
    },
    // Restore a trashed note
    restoreNote: function(id) {
      return idbGet(STORE_NOTES, id).then(function(note) {
        if (!note) return;
        delete note.deletedAt;
        note.updatedAt = Date.now();
        return idbPut(STORE_NOTES, note).then(function() {
          window.dispatchEvent(new CustomEvent('dm-sync-complete'));
        });
      });
    },
    // Get all trashed notes
    getTrashedNotes: function() {
      return idbGetAll(STORE_NOTES).then(function(notes) {

    seedDefaultKanbanColumns: function() {
      // Concurrency guard: if already seeding, return the in-flight promise
      if (_seedingPromise) return _seedingPromise;

      var user = window.dmAuth && window.dmAuth.currentUser;
      if (!user) return Promise.resolve([]);

      var sortByOrder = function(arr) {
        return arr.sort(function(a, b) { return (a.order || 0) - (b.order || 0); });
      };

      var doSeed;

      // Firestore is the source of truth — always try it first
      if (window.dmDb) {
        doSeed = window.dmDb.collection('kanbanColumns')
          .where('userId', '==', user.uid)
          .get()
          .then(function(snapshot) {
            if (!snapshot.empty) {
              var remoteCols = [];
              snapshot.forEach(function(doc) { remoteCols.push(serializeKanbanColumn(doc)); });
              // Replace IndexedDB with Firestore data
              return idbClear(STORE_KANBAN_COLUMNS).then(function() {
                return idbPutBatch(STORE_KANBAN_COLUMNS, remoteCols);
              }).then(function() {
                return sortByOrder(remoteCols);
              });
            }
            // Firestore has no columns — check IDB (e.g. columns created offline)
            return idbGetAll(STORE_KANBAN_COLUMNS).then(function(local) {
              if (local.length > 0) return sortByOrder(local);
              return createDefaultColumns();
            });
          })
          .catch(function(err) {
            console.warn('[dm-sync] Firestore check failed during seed, falling back to IDB:', err);
            return idbGetAll(STORE_KANBAN_COLUMNS).then(function(local) {
              if (local.length > 0) return sortByOrder(local);
              return createDefaultColumns();
            });
          });
      } else {
        // Offline / no Firestore — use IDB or create defaults
        doSeed = idbGetAll(STORE_KANBAN_COLUMNS).then(function(local) {
          if (local.length > 0) return sortByOrder(local);
          return createDefaultColumns();
        });
      }

      _seedingPromise = doSeed.then(function(result) {
        _seedingPromise = null;
        return result;
      }).catch(function(err) {
        _seedingPromise = null;
        throw err;
      });

      return _seedingPromise;

      function createDefaultColumns() {
        var defaults = [
          { id: user.uid + '_col_todo', name: 'To Do', status: 'todo', color: '#42a5f5', order: 0, isDoneColumn: false },
          { id: user.uid + '_col_in_progress', name: 'In Progress', status: 'in_progress', color: '#ffa726', order: 1, isDoneColumn: false },
          { id: user.uid + '_col_done', name: 'Done', status: 'done', color: '#66bb6a', order: 2, isDoneColumn: true }
        ];
        return Promise.all(defaults.map(function(d) {
          return window.dmSync.createKanbanColumn(d);
        }));
      }
    },

      return getActiveNotes().then(function(notes) {
        var targetNote = null;
        notes.forEach(function(n) { if (n.id === noteId) targetNote = n; });
        if (!targetNote || !targetNote.title) return [];

        var results = [];
        var titleLower = targetNote.title.toLowerCase();
        var escapedTitle = targetNote.title.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        var wikilinkPattern = new RegExp('\\[\\[' + escapedTitle + '\\]\\]', 'i');

        notes.forEach(function(n) {
          if (n.id === noteId) return;
          if (!n.content) return;

          var isExplicit = wikilinkPattern.test(n.content);
          var isTitleMatch = !isExplicit && titleLower.length > 3 && n.content.toLowerCase().indexOf(titleLower) !== -1;

          if (isExplicit || isTitleMatch) {
            results.push({
              note: n,
              type: isExplicit ? 'wikilink' : 'mention',
              confidence: isExplicit ? 'high' : 'medium'

          }

        return results.sort(function(a, b) {

    // Replace millis numbers with Firestore Timestamps for createdAt / updatedAt etc.
    var out = {};
    Object.keys(obj).forEach(function(k) { out[k] = obj[k]; });
    fields.forEach(function(f) {

  // Validate and normalize a splits array. Throws if sum !== expectedAmount.
  // An empty/undefined input returns []. Splits with amount === 0 are dropped.
  function _normalizeSplits(splits, expectedAmount) {
    if (!splits || !Array.isArray(splits) || splits.length === 0) return [];
    var normalized = [];
    var sum = 0;
    for (var i = 0; i < splits.length; i++) {
      var s = splits[i];
      if (!s || typeof s !== 'object') continue;
      var amt = typeof s.amount === 'number' ? s.amount : 0;
      if (amt === 0) continue;
      normalized.push({
        categoryId: s.categoryId || null,
        amount: amt,
        memo: s.memo || ''
      });
      sum += amt;
    }
    if (normalized.length === 0) return [];
    if (sum !== expectedAmount) {
      throw new Error('Split sum (' + sum + ') must equal transaction amount (' + expectedAmount + ')');
    }
    return normalized;
