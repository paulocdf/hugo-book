  // ── Push Notification Scheduling (PWA / Service Worker) ──
  var notifPermission = typeof Notification !== 'undefined' ? Notification.permission : 'denied';
  var notifIconUrl = '';
  (function() {
    var m = document.querySelector('link[rel="manifest"]');
    var base = m ? m.getAttribute('href').replace('/manifest.json', '') : '';
    notifIconUrl = base + '/favicon.png';
  })();

  function requestNotificationPermission() {
    if (typeof Notification === 'undefined') return;
    if (Notification.permission === 'default') {
      Notification.requestPermission().then(function(perm) {
        notifPermission = perm;
      });
    } else {
      notifPermission = Notification.permission;
    }
  }

  function scheduleNotification(delaySec, phaseLabel) {
    // Cancel any previously scheduled notification to avoid orphaned timeouts
    cancelScheduledNotification();
    if (notifPermission !== 'granted') return;
    var title = phaseLabel === 'work' ? 'Work Session Complete' : 'Break Over';
    var body = activeTodoTitle || 'Pomodoro timer finished';
    if (phaseLabel === 'work') {
      body = activeTodoTitle ? activeTodoTitle + ' — time for a break!' : 'Time for a break!';
    } else {
      body = activeTodoTitle ? activeTodoTitle + ' — ready to focus?' : 'Ready to focus?';
    }

    // Try service worker first (works when app is backgrounded / screen locked)
    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({
        type: 'schedule-notification',
        delay: delaySec * 1000,
        title: title,
        body: body,
        tag: 'pomodoro-phase-end',
        icon: notifIconUrl
      });
      return;
    }

    // Fallback: in-page setTimeout + Notification API (only works if tab is open)
    if (typeof Notification !== 'undefined' && notifPermission === 'granted') {
      window._pomoNotifTimeout = setTimeout(function() {
        try { new Notification(title, { body: body, icon: notifIconUrl, tag: 'pomodoro-phase-end' }); }
        catch(e) { /* Notification constructor not supported on this device */ }
      }, delaySec * 1000);
    }
  }

  function cancelScheduledNotification() {
    // Cancel via service worker
    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({
        type: 'cancel-notification',
        tag: 'pomodoro-phase-end'
      });
    }
    // Cancel fallback timeout
    if (window._pomoNotifTimeout) {
      clearTimeout(window._pomoNotifTimeout);
      window._pomoNotifTimeout = null;
    }
  }

  // Show an informational toast when timer finishes naturally (no auto-complete)
  function showPomodoroToast(taskTitle, trackedMinutes) {
    var msg = trackedMinutes + ' min tracked';
    if (taskTitle) msg += ' for \u201c' + taskTitle + '\u201d';
    var toast = document.createElement('div');
    toast.className = 'pomo-info-toast';
    toast.innerHTML = '<span class="pomo-info-toast-icon">\u23F1</span>' + msg;
    document.body.appendChild(toast);
    setTimeout(function() { toast.style.opacity = '1'; }, 10);
    setTimeout(function() {
      toast.style.opacity = '0';
      setTimeout(function() { toast.remove(); }, 300);
    }, 4000);
  }

  function tick() {
    if (secondsLeft <= 0) {
      clearInterval(intervalId);
      intervalId = null;
      isRunning = false;
      showPlayIcon();
      cancelScheduledNotification();

      if (phase === 'work') {
        playWorkEndSound();
        accumulatedWorkSeconds += totalPhaseSeconds;
        incrementDailyCompleted();
        logSessionToHistory();
        updateDailyGoalRing();
        renderHistoryChart();

        // If all sessions are complete (multi-session tasks)
        if (totalSessions > 1 && sessionCount >= totalSessions) {
          // Play a final break before completing the task
          _isFinalBreak = true;
          phase = 'break';
          secondsLeft = BREAK_SECONDS;
          totalPhaseSeconds = BREAK_SECONDS;
          updateDisplay();
          persistProgressSnapshot();
          saveStateImmediate();
          if (isAutoAdvance() && isFocusMode) {
            startAutoAdvanceCountdown('break');
          } else {
            startTimer();
          }
          return;
        }

        // Single-session task just completed — play a final break before completing
        if (totalSessions <= 1) {
          // If timing a subtask and auto-advance is on, still play the break first
          _isFinalBreak = true;
          phase = 'break';
          secondsLeft = BREAK_SECONDS;
          totalPhaseSeconds = BREAK_SECONDS;
          updateDisplay();
          persistProgressSnapshot();
          saveStateImmediate();
          if (isAutoAdvance() && isFocusMode) {
            startAutoAdvanceCountdown('break');
          } else {
            startTimer();
          }
          return;
        }

        // Switch to break
        // Auto-advance: show countdown in focus mode, immediate transition otherwise
        if (isAutoAdvance() && isFocusMode) {
          updateDisplay();
          persistProgressSnapshot();
          saveStateImmediate();
          startAutoAdvanceCountdown('break');
        } else {
          phase = 'break';
          secondsLeft = BREAK_SECONDS;
          totalPhaseSeconds = BREAK_SECONDS;
          updateDisplay();
          persistProgressSnapshot();
          saveStateImmediate();
          var _autoBreak = true;
          try { var v = localStorage.getItem('dm-pomo-auto-break'); if (v === 'false') _autoBreak = false; } catch(e) {}
          if (_autoBreak) {
            startTimer();
          }
        }
      } else {
        playBreakEndSound();
        stopAmbientSound();

        // Final break (after last work session) — now complete the task
        if (_isFinalBreak) {
          _isFinalBreak = false;
          // If a next task is queued (pressed Next during work), start it now.
          if (_pendingNextTodo) {
            var nextTodo = _pendingNextTodo;
            _pendingNextTodo = null;
            phase = 'break'; // stay in break so closeTimer() inside start() doesn't re-accumulate work
            accumulatedWorkSeconds = 0;
            setTimeout(function() {
              window.dmPomodoro.start(nextTodo.id, nextTodo.title);
            }, 100);
            return;
          }
          if (activeParentId && activeParentId !== activeTodoId && isAutoAdvance()) {
            advanceToNextSubtask();
          } else {
            var finishedTitle = activeTodoTitle;
            var finishedMins = Math.round(accumulatedWorkSeconds / 60);
            closeTimer();
            showPomodoroToast(finishedTitle, finishedMins);
          }
          return;
        }

        // Regular break finished, start next work session
        // Auto-advance: show countdown in focus mode, immediate transition otherwise
        if (isAutoAdvance() && isFocusMode) {
          updateDisplay();
          persistProgressSnapshot();
          saveStateImmediate();
          startAutoAdvanceCountdown('work');
        } else {
          sessionCount++;
          phase = 'work';
          secondsLeft = WORK_SECONDS;
          totalPhaseSeconds = WORK_SECONDS;
          updateDisplay();
          persistProgressSnapshot();
          saveStateImmediate();
          var _autoWork = false;
          try { var v = localStorage.getItem('dm-pomo-auto-work'); if (v === 'true') _autoWork = true; } catch(e) {}
          if (_autoWork) {
            startTimer();
          }
        }
      }
      return;
    }
    secondsLeft--;
    // Play tick sound if enabled (only during work phase to avoid annoyance during breaks)
    if (phase === 'work') {
      playTickSound();
    }
    updateDisplay();
    // Persist every 5 seconds to avoid excessive writes
    if (secondsLeft % 5 === 0) saveState();
    // Refresh inline stats and up next queue every 60 seconds in focus mode
    if (isFocusMode && secondsLeft % 60 === 0) {
      updateInlineStats();
      updateUpNext();
      updateProgressStrip();
    }
  }

  function startTimer() {
    if (intervalId) return;
    isRunning = true;
    showPauseIcon();
    intervalId = setInterval(tick, 1000);
    // Resume ambient sound if unpausing during break phase
    if (phase === 'break') startAmbientSound();
    updateDisplay();
    saveStateImmediate();
    notifyStateChanged();
    // Schedule push notification for when this phase ends
    scheduleNotification(secondsLeft, phase);
  }

  function pauseTimer() {
    if (intervalId) {
      clearInterval(intervalId);
      intervalId = null;
    }
    isRunning = false;
    showPlayIcon();
    cancelScheduledNotification();
    stopAmbientSound();
    // Accumulate partial work time
    if (phase === 'work') {
      accumulatedWorkSeconds += (totalPhaseSeconds - secondsLeft);
      totalPhaseSeconds = secondsLeft; // remaining becomes new total for progress tracking
    }
    // Restore page title
    document.title = document.title.replace(/^\d{2}:\d{2} \u2014 (Work|Break) \| /, '');
    updateDisplay();
    saveStateImmediate();
    notifyStateChanged();
  }

  // Reset timer: full discard — clears all accumulated work, resets to session 1,
  // stays open and paused so the user can start fresh.
  function resetTimer() {
    if (intervalId) {
      clearInterval(intervalId);
      intervalId = null;
    }
    isRunning = false;
    cancelScheduledNotification();
    stopAmbientSound();
    // Discard all accumulated work
    _isFinalBreak = false;
    _pendingNextTodo = null;
    accumulatedWorkSeconds = 0;
    sessionCount = 1;
    phase = 'work';
    secondsLeft = WORK_SECONDS;
    totalPhaseSeconds = WORK_SECONDS;
    startedAt = Date.now();
    // Clear per-task progress from localStorage
    if (activeTodoId) clearTaskProgress(activeTodoId);
    showPlayIcon();
    updateDisplay();
    saveStateImmediate();
    notifyStateChanged();
  }

  // Persist current progress snapshot so tracked time and completed sessions
  // survive browser crashes, navigation, or interrupted timers. Called after
  // every phase transition (skip or natural completion).
  function persistProgressSnapshot() {
    if (!activeTodoId) return;
    var trackedMinutes = Math.round(accumulatedWorkSeconds / 60);
    if (trackedMinutes > 0) {
      saveTrackedMinutes(activeTodoId, trackedMinutes);
    }
    // Compute sessionsCompleted using same logic as closeTimer()
    var sessionsCompleted = sessionCount - 1;
    if (phase === 'break') {
      // Work for current session finished — count it
      sessionsCompleted = sessionCount;
    }
    if (accumulatedWorkSeconds > 0) {
      // After a phase transition, remaining time for the next work session is always WORK_SECONDS
      saveTaskProgress(activeTodoId, sessionsCompleted, accumulatedWorkSeconds, totalSessions, WORK_SECONDS, BREAK_SECONDS, WORK_SECONDS);
    }
  }

  function skipPhase() {
    if (intervalId) {
      clearInterval(intervalId);
      intervalId = null;
    }
    isRunning = false;
    cancelScheduledNotification();

    if (phase === 'work') {
      // Accumulate partial work time
      accumulatedWorkSeconds += (totalPhaseSeconds - secondsLeft);
      // If this was the last session, start a final break instead of closing
      if (totalSessions > 1 && sessionCount >= totalSessions) {
        _isFinalBreak = true;
        phase = 'break';
        secondsLeft = BREAK_SECONDS;
        totalPhaseSeconds = BREAK_SECONDS;
        showPlayIcon();
        updateDisplay();
        persistProgressSnapshot();
        saveStateImmediate();
        notifyStateChanged();
        return;
      }

      // Single-session subtask: start final break (will advance to next subtask when break ends)
      if (totalSessions <= 1) {
        _isFinalBreak = true;
        phase = 'break';
        secondsLeft = BREAK_SECONDS;
        totalPhaseSeconds = BREAK_SECONDS;
        showPlayIcon();
        updateDisplay();
        persistProgressSnapshot();
        saveStateImmediate();
        notifyStateChanged();
        return;
      }

      // Move to break
      phase = 'break';
      secondsLeft = BREAK_SECONDS;
      totalPhaseSeconds = BREAK_SECONDS;
    } else {
      // Skipping a break
      stopAmbientSound();

      // If this was the final break, complete the task now
      if (_isFinalBreak) {
        _isFinalBreak = false;
        // If a next task is queued (inter-task break skipped), start it now.
        if (_pendingNextTodo) {
          var nextTodo = _pendingNextTodo;
          _pendingNextTodo = null;
          phase = 'break';
          accumulatedWorkSeconds = 0;
          setTimeout(function() {
            window.dmPomodoro.start(nextTodo.id, nextTodo.title);
          }, 100);
          return;
        }
        if (activeParentId && activeParentId !== activeTodoId) {
          advanceToNextSubtask();
        } else {
          closeTimer();
        }
        return;
      }

      // Move to next work session
      sessionCount++;
      phase = 'work';
      secondsLeft = WORK_SECONDS;
      totalPhaseSeconds = WORK_SECONDS;
    }
    showPlayIcon();
    updateDisplay();
    renderSessionTimeline();
    persistProgressSnapshot();
    saveStateImmediate();
    notifyStateChanged();
  }

  // ── Auto-advance: find next undone sibling subtask ──
  function getNextUndoneSubtask(currentTodoId) {
    if (!activeParentId || !window.dmSync || !window.dmSync.getAllTodos) {
      return Promise.resolve(null);
    }
    return window.dmSync.getAllTodos().then(function(todos) {
      var subs = (todos || []).filter(function(t) {
        return t.parentId === activeParentId && t.status !== 'deleted' && t.status !== 'archived';
      });
      // Sort by order
      subs.sort(function(a, b) { return (a.order || 0) - (b.order || 0); });
      // Find the index of the current subtask
      var currentIdx = -1;
      for (var i = 0; i < subs.length; i++) {
        if (subs[i].id === currentTodoId) { currentIdx = i; break; }
      }
      // Look for the next undone subtask after the current one
      for (var j = currentIdx + 1; j < subs.length; j++) {
        if (!subs[j].done && subs[j].id !== currentTodoId) return subs[j];
      }
      // Wrap around: check undone subtasks before the current one
      for (var k = 0; k < currentIdx; k++) {
        if (!subs[k].done && subs[k].id !== currentTodoId) return subs[k];
      }
      return null;
    });
  }

  // ── Auto-advance: transition to the next subtask ──
  // Records tracked time for the completed subtask, marks it done,
  // then sets up the timer for the next subtask (paused, waiting for user).
  function advanceToNextSubtask() {
    var completedTodoId = activeTodoId;
    var trackedMinutes = Math.round(accumulatedWorkSeconds / 60);
    var completedSessions = totalSessions; // all sessions done when auto-advancing

    // Clear per-task progress for completed subtask (all sessions done)
    if (completedTodoId) clearTaskProgress(completedTodoId);

    // Save tracked time for the completed subtask
    if (completedTodoId && trackedMinutes > 0) {
      saveTrackedMinutes(completedTodoId, trackedMinutes);
      window.dispatchEvent(new CustomEvent('dm-pomodoro-stopped', {
        detail: {
          todoId: completedTodoId,
          trackedMinutes: trackedMinutes,
          sessionsCompleted: completedSessions,
          totalSessions: completedSessions
        }
      }));
    }

    // Auto-mark the completed subtask as done
    if (completedTodoId && window.dmSync && window.dmSync.getTodo) {
      window.dmSync.getTodo(completedTodoId).then(function(todo) {
        if (todo && !todo.done) {
          toggleSubtaskDone(todo, true);
        }
      });
    }

    // Find and advance to the next undone subtask
    getNextUndoneSubtask(completedTodoId).then(function(nextSub) {
      if (!nextSub) {
        // No more undone subtasks — close timer
        // Reset accumulatedWorkSeconds since we already recorded above,
        // and set phase to 'break' so closeTimer() doesn't re-accumulate
        // work time (its guard checks phase === 'work').
        accumulatedWorkSeconds = 0;
        phase = 'break';
        closeTimer();
        return;
      }

      // Transition to the next subtask — flush old notes and load new
      transitionFocusNotes(nextSub.id);
      activeTodoId = nextSub.id;
      activeTodoTitle = nextSub.title || 'Task';
      titleEl.textContent = activeTodoTitle;
      focusTitleEl.textContent = activeTodoTitle;

      // Load next subtask's pomodoro config (reset to defaults first)
      WORK_SECONDS = 25 * 60;
      BREAK_SECONDS = 5 * 60;
      totalSessions = 1;
      if (nextSub.pomodoroLength && nextSub.pomodoroLength > 0) {
        WORK_SECONDS = nextSub.pomodoroLength * 60;
      }
      if (nextSub.breakLength && nextSub.breakLength > 0) {
        BREAK_SECONDS = nextSub.breakLength * 60;
      } else {
        // Fall back to global short-break default
        try { var v = parseInt(localStorage.getItem('dm-pomo-short-break'), 10); if (v > 0) BREAK_SECONDS = v * 60; } catch(e) {}
      }
      if (nextSub.pomodoroCount && nextSub.pomodoroCount > 0) {
        totalSessions = nextSub.pomodoroCount;
      }

      // Check for prior progress on the next subtask.
      // Preserve accumulated work time and completed-session count even if
      // pomodoroCount/pomodoroLength were edited on the task.
      var priorProgress = loadTaskProgress(nextSub.id);
      var subRestoredRemaining = 0;
      if (priorProgress) {
        accumulatedWorkSeconds = priorProgress.accWorkSeconds || 0;
        var subPriorDone = priorProgress.sessionsCompleted || 0;
        if (subPriorDone >= totalSessions) {
          sessionCount = totalSessions;
        } else {
          sessionCount = subPriorDone + 1;
        }
        // Only restore exact timer position if the work duration matches.
        if (priorProgress.workSeconds > 0 && priorProgress.workSeconds === WORK_SECONDS &&
            priorProgress.remainingSeconds > 0 && priorProgress.remainingSeconds <= WORK_SECONDS) {
          subRestoredRemaining = priorProgress.remainingSeconds;
        }
      } else {
        sessionCount = 1;
        accumulatedWorkSeconds = 0;
      }

      // Set up timer for the new subtask (paused)
      phase = 'work';
      secondsLeft = subRestoredRemaining || WORK_SECONDS;
      totalPhaseSeconds = secondsLeft;
      isRunning = false;
      showPlayIcon();

      // Refresh subtask list to show updated done states
      loadSubtasks(activeParentId);
      updateDisplay();
      saveStateImmediate();
      notifyStateChanged();
    });
  }

  function closeTimer() {
    if (intervalId) {
      clearInterval(intervalId);
      intervalId = null;
    }
    isRunning = false;
    cancelScheduledNotification();
    stopAmbientSound();

    // Accumulate any remaining partial work
    _isFinalBreak = false;
    _pendingNextTodo = null;
    if (phase === 'work' && totalPhaseSeconds > secondsLeft) {
      accumulatedWorkSeconds += (totalPhaseSeconds - secondsLeft);
    }

    timerEl.style.display = 'none';
    categoryEl.style.display = 'none';
    categoryEl.textContent = '';
    showPlayIcon();
    clearInfoAndSubtasks();
    // Flush pending notes save before closing
    if (_focusNotesTimer) {
      clearTimeout(_focusNotesTimer);
      _focusNotesTimer = null;
    }
    saveFocusNotes();
    focusNotesTextarea.value = '';
    _focusNotesOriginal = '';
    // Hide focus overlay if open
    focusOverlay.style.display = 'none';
    isFocusMode = false;
    vizStop();

    // Restore page title
    var cleanTitle = document.title.replace(/^\d{2}:\d{2} \u2014 (Work|Break) \| /, '');
    document.title = cleanTitle;

    var trackedMinutes = Math.round(accumulatedWorkSeconds / 60);
    var closedTodoId = activeTodoId;
    var closedSessionCount = sessionCount;
    var closedTotalSessions = totalSessions;
    var closedAccWork = accumulatedWorkSeconds;
    var closedWorkSec = WORK_SECONDS;
    var closedBreakSec = BREAK_SECONDS;
    var closedPhase = phase;
    var closedSecondsLeft = secondsLeft;
    activeTodoId = null;
    activeTodoTitle = '';
    activeTodoCategory = '';
    activeParentId = null;

    // Clear persisted timer state (the active timer slot)
    clearState();

    // Determine how many sessions were fully completed
    // sessionCount is 1-indexed: session 1 means working on session 1 (0 completed)
    // A session is "completed" when its work phase finishes and break completes (incrementing sessionCount)
    // So sessionsCompleted = sessionCount - 1, unless we were in a break (meaning the work for that session is done)
    var sessionsCompleted = closedSessionCount - 1;
    if (closedPhase === 'break') {
      // Work for current session finished, we're in break — count that session too
      sessionsCompleted = closedSessionCount;
    }

    // Determine if ALL sessions were completed (timer ran to natural end)
    var allDone = (closedTotalSessions > 1 && sessionsCompleted >= closedTotalSessions) ||
                  (closedTotalSessions <= 1 && sessionsCompleted >= 1);

    // Save per-task progress if there's accumulated work and remaining sessions
    if (closedTodoId && !allDone && closedAccWork > 0) {
      // If closed during work phase, save the remaining seconds so the timer can
      // resume from the exact position. If closed during break, the next session
      // starts fresh so remaining = full work duration.
      var closedRemaining = closedPhase === 'work' ? closedSecondsLeft : closedWorkSec;
      saveTaskProgress(closedTodoId, sessionsCompleted, closedAccWork, closedTotalSessions, closedWorkSec, closedBreakSec, closedRemaining);
    } else if (closedTodoId && allDone) {
      // All sessions complete — clear any prior progress
      clearTaskProgress(closedTodoId);
    }

    // Notify the todo list about tracked time
    if (closedTodoId && trackedMinutes > 0) {
      // Persist tracked minutes to localStorage so they survive navigation
      saveTrackedMinutes(closedTodoId, trackedMinutes);
      window.dispatchEvent(new CustomEvent('dm-pomodoro-stopped', {
        detail: {
          todoId: closedTodoId,
          trackedMinutes: trackedMinutes,
          sessionsCompleted: sessionsCompleted,
          totalSessions: closedTotalSessions
        }
      }));
    } else {
      // Even if no time tracked, notify so inline indicators update
      notifyStateChanged();
    }
  }

  function cancelTimer() {
    if (intervalId) {
      clearInterval(intervalId);
      intervalId = null;
    }
    isRunning = false;
    cancelScheduledNotification();
    stopAmbientSound();
    timerEl.style.display = 'none';
    categoryEl.style.display = 'none';
    categoryEl.textContent = '';
    clearInfoAndSubtasks();
    showPlayIcon();
    // Flush pending notes save before closing
    if (_focusNotesTimer) {
      clearTimeout(_focusNotesTimer);
      _focusNotesTimer = null;
    }
    saveFocusNotes();
    focusNotesTextarea.value = '';
    _focusNotesOriginal = '';
    // Hide focus overlay if open
    focusOverlay.style.display = 'none';
    isFocusMode = false;
    vizStop();

    // Restore page title
    var cleanTitle = document.title.replace(/^\d{2}:\d{2} \u2014 (Work|Break) \| /, '');
    document.title = cleanTitle;

    // Clear per-task progress — user explicitly cancelled, discard everything
    if (activeTodoId) clearTaskProgress(activeTodoId);

    activeTodoId = null;
    activeTodoTitle = '';
    activeTodoCategory = '';
    activeParentId = null;
    // Clear persisted timer state
    clearState();
    // No event fired — time is discarded
    notifyStateChanged();
  }

  // Finish task: stop timer, record time, AND mark the task as complete
  function finishTask() {
    // Compute tracked time so far (same logic as closeTimer/stop handler)
    var trackedSoFar = accumulatedWorkSeconds;
    if (phase === 'work' && totalPhaseSeconds > secondsLeft) {
      trackedSoFar += (totalPhaseSeconds - secondsLeft);
    }
    var mins = Math.round(trackedSoFar / 60);
    var todoId = activeTodoId;
    var todoCategory = activeTodoCategory;
    var todoProjectId = activeProjectId;

    if (!todoId) return;

    // Confirm with user showing tracked time
    var msgParts = [];
    if (mins > 0) {
      msgParts.push(mins + ' minute' + (mins !== 1 ? 's' : '') + ' tracked.');
    }
    msgParts.push('Mark task complete?');

    window.dmConfirm({
      title: 'Complete task?',
      message: msgParts.join(' '),
      confirmLabel: 'Complete',
      cancelLabel: 'Keep going',
      danger: false
    }).then(function(confirmed) {
      if (!confirmed) return;

      // Close the timer (records time via dm-pomodoro-stopped)
      closeTimer();

      // Dispatch completion event so todo-list can mark it done
      window.dispatchEvent(new CustomEvent('dm-pomodoro-completed', {
        detail: {
          todoId: todoId,
          trackedMinutes: mins > 0 ? mins : null,
          category: todoCategory || null,
          projectId: todoProjectId || null
        }
      }));
    });
  }

  // Next task: complete the current task (instant, no confirmation) and auto-advance
  // to the next undone task in the same day group. If no next task, just complete & close.
  function nextTask() {
    // Compute tracked time so far
    var trackedSoFar = accumulatedWorkSeconds;
    if (phase === 'work' && totalPhaseSeconds > secondsLeft) {
      trackedSoFar += (totalPhaseSeconds - secondsLeft);
    }
    var mins = Math.round(trackedSoFar / 60);
    var todoId = activeTodoId;
    var todoCategory = activeTodoCategory;
    var todoProjectId = activeProjectId;

    if (!todoId) return;

    // Helper: complete current task and optionally advance to next
    function _completeAndAdvance(nextTodo) {
      // Dispatch completion event immediately (marks task done with undo toast)
      window.dispatchEvent(new CustomEvent('dm-pomodoro-completed', {
        detail: {
          todoId: todoId,
          trackedMinutes: mins > 0 ? mins : null,
          category: todoCategory || null,
          projectId: todoProjectId || null
        }
      }));

      if (nextTodo) {
        // Play an inter-task break before starting the next task.
        // Stop current work interval and cancel any scheduled notification.
        if (intervalId) { clearInterval(intervalId); intervalId = null; }
        cancelScheduledNotification();
        isRunning = false;
        showPlayIcon();

        // Accumulate any remaining partial work seconds for tracking.
        if (phase === 'work' && totalPhaseSeconds > secondsLeft) {
          accumulatedWorkSeconds += (totalPhaseSeconds - secondsLeft);
        }
        // Clear completed task's progress and reset accumulator so that
        // when start() calls closeTimer() internally later it won't
        // re-dispatch dm-pomodoro-stopped with stale time.
        clearTaskProgress(todoId);
        accumulatedWorkSeconds = 0;

        // Queue the next task and play the break.
        _pendingNextTodo = nextTodo;
        _isFinalBreak = true;
        phase = 'break';
        secondsLeft = BREAK_SECONDS;
        totalPhaseSeconds = BREAK_SECONDS;
        updateDisplay();
        persistProgressSnapshot();
        saveStateImmediate();
        if (isAutoAdvance() && isFocusMode) {
          startAutoAdvanceCountdown('break');
        } else {
          startTimer();
        }
      } else {
        // No next task — close the timer normally.
        closeTimer();
      }
    }

    // If working on a project task, use self-contained async lookup
    if (todoProjectId) {
      _findNextProjectTasks(todoId, todoProjectId, 1).then(function(tasks) {
        _completeAndAdvance(tasks.length ? tasks[0] : null);
      });
      return;
    }

    // No project — use dmTodoList day-group lookup (sync, inbox page only)
    var nextTodo = null;
    if (window.dmTodoList && window.dmTodoList.getNextTask) {
      nextTodo = window.dmTodoList.getNextTask(todoId);
    }
    _completeAndAdvance(nextTodo);
  }

  // ── Button handlers ──
  toggleBtn.addEventListener('click', function() {
    if (isRunning) {
      pauseTimer();
    } else {
      startTimer();
    }
  });

  resetBtn.addEventListener('click', resetTimer);
  nextBtn.addEventListener('click', nextTask);
  skipBtn.addEventListener('click', skipPhase);

  // Close (x) button: save progress and close timer
  closeBtn.addEventListener('click', function() {
    closeTimer();
  });

  // ── Focus overlay helpers ──

  // Render session timeline blocks
  function renderSessionTimeline() {
    focusTimelineEl.style.display = '';
    var html = '';
    for (var i = 1; i <= totalSessions; i++) {
      var cls = 'pomodoro-focus-timeline-block';
      if (i < sessionCount) {
        cls += ' completed';
      } else if (i === sessionCount) {
        cls += ' current';
      } else {
        cls += ' remaining';
      }
      html += '<div class="' + cls + '">' + i + '</div>';
      // Add break separator between sessions (not after last)
      if (i < totalSessions) {
        var breakCls = 'pomodoro-focus-timeline-block break-block';
        if (i < sessionCount) breakCls += ' completed';
        html += '<div class="' + breakCls + '"></div>';
      }
    }
    focusTimelineBlocksEl.innerHTML = html;
  }

  // Render inline stats row in left column
  var _inlineStatsTodo = null;
  function updateInlineStats(todo) {
    if (!focusInlineStatsEl) return;
    if (todo !== undefined) _inlineStatsTodo = todo;
    var sep = '<span class="stat-sep">\u00b7</span>';
    var parts = [];

    // Tracked time for current task
    var trackedMin = (_inlineStatsTodo && _inlineStatsTodo.actualMin) || 0;
    // Add current session's accumulated work
    var currentSec = accumulatedWorkSeconds;
    if (phase === 'work') currentSec += (totalPhaseSeconds - secondsLeft);
    if (currentSec > 0) trackedMin += Math.round(currentSec / 60);
    if (trackedMin > 0) {
      var tText = trackedMin >= 60
        ? Math.floor(trackedMin / 60) + 'h ' + (trackedMin % 60) + 'm'
        : trackedMin + 'm';
      parts.push(tText + ' tracked');
    }

    // Estimated time
    if (_inlineStatsTodo && _inlineStatsTodo.estimatedMin && _inlineStatsTodo.estimatedMin > 0) {
      var eText = _inlineStatsTodo.estimatedMin >= 60
        ? Math.floor(_inlineStatsTodo.estimatedMin / 60) + 'h ' + (_inlineStatsTodo.estimatedMin % 60) + 'm'
        : _inlineStatsTodo.estimatedMin + 'm';
      parts.push(eText + ' est.');
    }

    // Started at
    if (startedAt) {
      var sd = new Date(startedAt);
      parts.push('Started ' + padTime(sd.getHours()) + ':' + padTime(sd.getMinutes()));

      // Est. finish
      var remainingSec = secondsLeft;
      var sessionsLeft = totalSessions - sessionCount;
      remainingSec += sessionsLeft * (WORK_SECONDS + BREAK_SECONDS);
      remainingSec += subtaskRemainingMin * 60;
      var finishMs = Date.now() + remainingSec * 1000;
      var fd = new Date(finishMs);
      parts.push('~' + padTime(fd.getHours()) + ':' + padTime(fd.getMinutes()));
    }

    // Done today count (async)
    if (window.dmSync && window.dmSync.getAllTodos) {
      var staticParts = parts.slice();
      window.dmSync.getAllTodos().then(function(todos) {
        var todayStart = new Date();
        todayStart = new Date(todayStart.getFullYear(), todayStart.getMonth(), todayStart.getDate()).getTime();
        var doneCount = 0;
        todos.forEach(function(t) {
          if (t.parentId) return;
          if (t.done && t.completedAt && t.completedAt >= todayStart) doneCount++;
        });
        if (doneCount > 0) staticParts.push(doneCount + ' done today');
        focusInlineStatsEl.innerHTML = staticParts.join(sep);
      }).catch(function() {
        focusInlineStatsEl.innerHTML = parts.join(sep);
      });
    } else {
      focusInlineStatsEl.innerHTML = parts.join(sep);
    }
  }

  // ── Self-contained project task lookup (works on any page) ──
  // Queries dmSync.getAllTodos() directly so the timer doesn't depend on
  // window.dmTodoList (which only exists on the inbox page).
  function _findNextProjectTasks(currentTodoId, projectId, count) {
    if (!currentTodoId || !projectId || !window.dmSync || !window.dmSync.getAllTodos) {
      return Promise.resolve([]);
    }
    return window.dmSync.getAllTodos().then(function(allTodos) {
      // Collect top-level project tasks
      var parents = allTodos.filter(function(t) {
        if (t.projectId !== projectId) return false;
        var s = t.status || 'active';
        if (s !== 'active' && s !== 'done') return false;
        if (t.deletedAt) return false;
        if (t.parentId) return false;
        if (t.bujoType && t.bujoType !== 'task') return false;
        return true;
      });
      // Sort: undone first, then by order
      parents.sort(function(a, b) {
        if (a.done !== b.done) return a.done ? 1 : -1;
        return (a.order || 0) - (b.order || 0);
      });
      // Interleave undone subtasks after each parent
      var ordered = [];
      parents.forEach(function(p) {
        ordered.push(p);
        var children = allTodos.filter(function(t) {
          return t.parentId === p.id && !t.done && !t.deletedAt && (t.bujoType === 'task' || !t.bujoType);
        });
        children.sort(function(a, b) { return (a.order || 0) - (b.order || 0); });
        children.forEach(function(c) { ordered.push(c); });
      });
      // Find current position
      var idx = -1;
      for (var i = 0; i < ordered.length; i++) {
        if (ordered[i].id === currentTodoId) { idx = i; break; }
      }
      if (idx === -1) return [];
      // Collect next undone tasks
      var results = [];
      for (var i = idx + 1; i < ordered.length; i++) {
        if (!ordered[i].done) {
          results.push({ id: ordered[i].id, title: ordered[i].title });
          if (results.length >= count) break;
        }
      }
      return results;
    });
  }

  // Render the Up Next task queue
  function updateUpNext() {
    if (!focusUpNextListEl || !focusUpNextStripEl) return;
    if (!activeTodoId) {
      focusUpNextStripEl.style.display = 'none';
      focusUpNextListEl.innerHTML = '';
      return;
    }

    // If working on a project task, use self-contained lookup (works on any page)
    if (activeProjectId) {
      _findNextProjectTasks(activeTodoId, activeProjectId, 5).then(function(tasks) {
        if (!tasks || !tasks.length) {
          focusUpNextStripEl.style.display = 'none';
          focusUpNextListEl.innerHTML = '';
          return;
        }
        _renderUpNextTasks(tasks);
      });
      return;
    }

    // No project — use dmTodoList day-group lookup (inbox page only)

  // ── Today's Progress Strip ──
  function updateProgressStrip() {
    if (!focusProgressStrip || !isShowProgress()) {
      if (focusProgressStrip) focusProgressStrip.style.display = 'none';

    }
    if (!window.dmSync || !window.dmSync.getAllTodos) {
      focusProgressStrip.style.display = 'none';
      return;
    }
    window.dmSync.getAllTodos().then(function(todos) {
      var todayStr = new Date().toISOString().slice(0, 10);
      var todayTasks = (todos || []).filter(function(t) {
        return t.scheduledDate === todayStr && t.status !== 'deleted' && !t.parentId;
      });
      if (todayTasks.length === 0) {
        focusProgressStrip.style.display = 'none';
        return;
      }
      var doneCount = todayTasks.filter(function(t) { return t.done; }).length;
      var pct = Math.round((doneCount / todayTasks.length) * 100);
      focusProgressStripFill.style.width = pct + '%';

      var parts = [doneCount + ' of ' + todayTasks.length + ' done'];
      // Time remaining from undone tasks
      var remainMin = 0;
      todayTasks.forEach(function(t) {
        if (!t.done && t.estimatedMin) remainMin += t.estimatedMin;
      });
      // Subtract active task's tracked time
      if (activeTodoId) {
        var activeInToday = todayTasks.some(function(t) { return t.id === activeTodoId && !t.done; });

          var elapsedMin = Math.round(accumulatedWorkSeconds / 60);
          remainMin = Math.max(0, remainMin - elapsedMin);

      if (remainMin > 0) {
        var rText = remainMin >= 60
          ? Math.floor(remainMin / 60) + 'h ' + (remainMin % 60) + 'm'
          : remainMin + 'm';
        parts.push('~' + rText + ' left');

      focusProgressStripText.textContent = parts.join(' \u00b7 ');

    var _resizing = false;
    var _resizeStartX = 0;
    var _resizeStartW = 260;
    var RESIZE_EDGE_PX = 8; // drag zone width near the left border

    function onResizeMove(e) {
      if (!_resizing) return;
      var clientX = e.touches ? e.touches[0].clientX : e.clientX;
      var delta = _resizeStartX - clientX; // moving left = wider right col
      var newW = Math.max(180, Math.min(500, _resizeStartW + delta));
      applyRightColWidth(newW);
    }
    function onResizeEnd() {
      if (!_resizing) return;
      _resizing = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      focusRightCol.style.borderLeftColor = '';
      var finalW = parseInt(focusRightCol.style.width, 10) || 260;
      setSavedRightColWidth(finalW);
      document.removeEventListener('mousemove', onResizeMove);
      document.removeEventListener('mouseup', onResizeEnd);
      document.removeEventListener('touchmove', onResizeMove);
      document.removeEventListener('touchend', onResizeEnd);
    }
    function isNearLeftEdge(e) {
      var rect = focusRightCol.getBoundingClientRect();
      var clientX = e.touches ? e.touches[0].clientX : e.clientX;
      return clientX - rect.left < RESIZE_EDGE_PX;
    }
    function onResizeStart(e) {
      if (!isNearLeftEdge(e)) return;
      e.preventDefault();
      _resizing = true;
      _resizeStartX = e.touches ? e.touches[0].clientX : e.clientX;
      _resizeStartW = parseInt(focusRightCol.style.width, 10) || focusRightCol.offsetWidth || 260;
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      focusRightCol.style.borderLeftColor = 'var(--color-link)';
      document.addEventListener('mousemove', onResizeMove);
      document.addEventListener('mouseup', onResizeEnd);
      document.addEventListener('touchmove', onResizeMove, { passive: false });
      document.addEventListener('touchend', onResizeEnd);
    }
    focusRightCol.addEventListener('mousedown', onResizeStart);
    focusRightCol.addEventListener('touchstart', onResizeStart, { passive: false });

  // ── Auto-advance countdown ──

  function executeAutoAdvance(nextPhase) {

      persistProgressSnapshot();

  // ── Ambient Visualizer ──
  var vizMode = 'aurora'; // 'aurora' | 'wave'
  var vizAnimId = null;
  var vizTime = 0;

  // Aurora / particles state
  var vizOrbs = [];
  var vizOrbCount = 12;

  // Wave state
  var vizWavePoints = [];
  var vizWaveCount = 64;

  // Color palette: muted blues, purples, teals
  var vizPalette = [
    { r: 60, g: 100, b: 200 },   // soft blue
    { r: 120, g: 70, b: 180 },   // muted purple
    { r: 50, g: 160, b: 180 },   // teal
    { r: 140, g: 90, b: 200 },   // lavender
    { r: 70, g: 130, b: 210 },   // sky
    { r: 100, g: 60, b: 160 },   // deep purple
  ];

  function vizPickColor() {
    return vizPalette[Math.floor(Math.random() * vizPalette.length)];
  }

  function vizInitOrbs() {
    vizOrbs = [];
    for (var i = 0; i < vizOrbCount; i++) {
      var c = vizPickColor();
      vizOrbs.push({
        x: Math.random(),           // 0-1 normalized position
        y: Math.random(),
        r: 0.15 + Math.random() * 0.25, // radius as fraction of min(w,h)
        vx: (Math.random() - 0.5) * 0.0004,
        vy: (Math.random() - 0.5) * 0.0003,
        phase: Math.random() * Math.PI * 2,
        pulseSpeed: 0.3 + Math.random() * 0.6,
        cr: c.r, cg: c.g, cb: c.b,
        alpha: 0.06 + Math.random() * 0.08
      });
    }
  }

  function vizInitWave() {
    vizWavePoints = [];
    for (var i = 0; i < vizWaveCount; i++) {
      vizWavePoints.push({
        phase: Math.random() * Math.PI * 2,
        freq: 0.5 + Math.random() * 2.5,
        amp: 0.1 + Math.random() * 0.35
      });
    }
  }

  // Render aurora: soft overlapping radial gradients drifting slowly
  function vizDrawAurora(ctx, w, h) {
    // Fade previous frame instead of clearing — leaves soft trails
    ctx.fillStyle = 'rgba(10, 10, 20, 0.12)';
    ctx.fillRect(0, 0, w, h);

    var minDim = Math.min(w, h);

    for (var i = 0; i < vizOrbCount; i++) {
      var orb = vizOrbs[i];

      // Drift
      orb.x += orb.vx;
      orb.y += orb.vy;

      // Soft bounce off edges with margin
      if (orb.x < -0.2 || orb.x > 1.2) orb.vx *= -1;
      if (orb.y < -0.2 || orb.y > 1.2) orb.vy *= -1;

      // Gentle random drift changes
      orb.vx += (Math.random() - 0.5) * 0.00003;
      orb.vy += (Math.random() - 0.5) * 0.00003;
      // Clamp velocity
      var maxV = 0.0008;
      orb.vx = Math.max(-maxV, Math.min(maxV, orb.vx));
      orb.vy = Math.max(-maxV, Math.min(maxV, orb.vy));

      // Pulsing radius
      var pulse = 0.85 + 0.15 * Math.sin(vizTime * orb.pulseSpeed + orb.phase);
      var radius = orb.r * minDim * pulse;

      var cx = orb.x * w;
      var cy = orb.y * h;

      // Radial gradient: colored center fading to transparent
      var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
      grad.addColorStop(0, 'rgba(' + orb.cr + ',' + orb.cg + ',' + orb.cb + ',' + (orb.alpha * pulse) + ')');
      grad.addColorStop(0.4, 'rgba(' + orb.cr + ',' + orb.cg + ',' + orb.cb + ',' + (orb.alpha * 0.5 * pulse) + ')');
      grad.addColorStop(1, 'rgba(' + orb.cr + ',' + orb.cg + ',' + orb.cb + ',0)');

      ctx.fillStyle = grad;
      ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);
    }
  }

  // Render waveform / oscilloscope — soft neon lines
  function vizDrawWave(ctx, w, h) {
    // Soft fade for trailing effect
    ctx.fillStyle = 'rgba(10, 10, 20, 0.15)';
    ctx.fillRect(0, 0, w, h);

    var midY = h * 0.5;
    var t = vizTime;

    var layers = [
      { freqMul: 1, ampMul: 1, alpha: 0.55, lineW: 2, colorIdx: 0 },
      { freqMul: 1.5, ampMul: 0.5, alpha: 0.3, lineW: 1.5, colorIdx: 1 },
      { freqMul: 0.7, ampMul: 0.7, alpha: 0.2, lineW: 1, colorIdx: 2 }
    ];

    layers.forEach(function(layer) {
      var c = vizPalette[layer.colorIdx];
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + layer.alpha + ')';
      ctx.lineWidth = layer.lineW;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';

      for (var x = 0; x <= w; x += 2) {
        var y = midY;
        for (var j = 0; j < vizWaveCount; j++) {
          var wp = vizWavePoints[j];
          var xNorm = x / w;
          y += Math.sin(xNorm * wp.freq * 6 * layer.freqMul + t * wp.freq * 0.6 + wp.phase)
               * wp.amp * h * 0.35 * layer.ampMul;
        }
        y = midY + (y - midY) / Math.sqrt(vizWaveCount * 0.6);

        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Subtle glow
      ctx.save();
      ctx.shadowColor = 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',0.35)';
      ctx.shadowBlur = 8;
      ctx.stroke();
      ctx.restore();
    });

    // Slowly evolve wave parameters
    for (var j = 0; j < vizWaveCount; j++) {
      vizWavePoints[j].phase += (Math.random() - 0.5) * 0.012;
      vizWavePoints[j].amp += (Math.random() - 0.5) * 0.003;
      vizWavePoints[j].amp = Math.max(0.05, Math.min(0.4, vizWavePoints[j].amp));
    }
  }

  // Main animation frame
  function vizAnimate() {
    if (!isFocusMode) { vizAnimId = null; return; }

    var rect = focusVizContainer.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    var w = Math.round(rect.width * dpr);
    var h = Math.round(rect.height * dpr);

    if (focusVizCanvas.width !== w || focusVizCanvas.height !== h) {
      focusVizCanvas.width = w;
      focusVizCanvas.height = h;
      // Fill with dark background on resize to avoid flash
      var ctx2 = focusVizCanvas.getContext('2d');
      ctx2.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx2.fillStyle = '#0a0a14';
      ctx2.fillRect(0, 0, rect.width, rect.height);
    }

    var ctx = focusVizCanvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    var cw = rect.width;
    var ch = rect.height;

    vizTime += 0.016;

    if (vizMode === 'aurora') {
      vizDrawAurora(ctx, cw, ch);
    } else {
      vizDrawWave(ctx, cw, ch);
    }

    vizAnimId = requestAnimationFrame(vizAnimate);
  }

  function vizStart() {
    if (vizAnimId) return;
    vizInitOrbs();
    vizInitWave();
    // Clear canvas to dark
    if (focusVizCanvas && focusVizContainer) {
      var rect = focusVizContainer.getBoundingClientRect();
      var dpr = window.devicePixelRatio || 1;
      focusVizCanvas.width = Math.round(rect.width * dpr);
      focusVizCanvas.height = Math.round(rect.height * dpr);
      var ctx = focusVizCanvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.fillStyle = '#0a0a14';
      ctx.fillRect(0, 0, rect.width, rect.height);
    }
    vizAnimate();
  }

  function vizStop() {
    if (vizAnimId) {
      cancelAnimationFrame(vizAnimId);
      vizAnimId = null;
    }
  }

  // Toggle visualizer mode by clicking the header strip

  // ── Focus notes auto-save with debounce ──
  function saveFocusNotes() {
    var newVal = focusNotesTextarea.value.trim();
    if (newVal === _focusNotesOriginal) return;
    if (!activeTodoId) return;
    _focusNotesOriginal = newVal;

  // ── Restore persisted timer state on page load ──
  function restoreState() {
    var raw;
    try { raw = localStorage.getItem(STATE_KEY); } catch(e) { return; }
    if (!raw) return;
    var s;
    try { s = JSON.parse(raw); } catch(e) { clearState(); return; }
    if (!s || !s.activeTodoId || !s.savedAt) { clearState(); return; }

    // Calculate elapsed time since state was saved
    var elapsedMs = Date.now() - s.savedAt;
    if (elapsedMs < 0) { clearState(); return; } // clock skew, discard
    var elapsedSec = Math.floor(elapsedMs / 1000);

    // Restore config

    BREAK_SECONDS = s.BREAK_SECONDS || 5 * 60;
    activeTodoId = s.activeTodoId;
    activeTodoTitle = s.activeTodoTitle || 'Task';
    activeTodoCategory = s.activeTodoCategory || '';
    activeProjectId = s.activeProjectId || '';
    activeProjectName = s.activeProjectName || '';
    activeProjectColor = s.activeProjectColor || '';
    activeParentId = s.activeParentId || s.activeTodoId;
    totalSessions = s.totalSessions || 1;
    startedAt = s.startedAt;

    // Restore mutable state
    var rPhase = s.phase || 'work';
    var rSecondsLeft = s.secondsLeft || 0;
    var rTotalPhase = s.totalPhaseSeconds || WORK_SECONDS;
    var rSessionCount = s.sessionCount || 1;
    var rAccWork = s.accumulatedWorkSeconds || 0;
    var wasRunning = s.isRunning;

    // If timer was running, simulate elapsed time
    if (wasRunning && elapsedSec > 0) {
      var result = simulateElapsed(rPhase, rSecondsLeft, rTotalPhase, rSessionCount, rAccWork, elapsedSec);
      if (result.finished) {

        var completedParentId = activeParentId;
        var trackedMinutes = Math.round(result.accWork / 60);
        clearState();
        // All sessions completed — clear per-task progress
        if (completedId) clearTaskProgress(completedId);
        if (trackedMinutes > 0) {
          saveTrackedMinutes(completedId, trackedMinutes);
          window.dispatchEvent(new CustomEvent('dm-pomodoro-stopped', {
            detail: {
              todoId: completedId,
              trackedMinutes: trackedMinutes,
              sessionsCompleted: totalSessions,
              totalSessions: totalSessions

              activeTodoTitle = '';
              activeTodoCategory = '';
              activeParentId = null;

            activeTodoCategory = nextSub.category || '';

            focusTitleEl.textContent = activeTodoTitle;

              categoryEl.style.display = '';
              focusCategoryEl.textContent = activeTodoCategory;
              focusCategoryEl.style.display = '';
            }
            // Load config from next subtask
            WORK_SECONDS = (nextSub.pomodoroLength && nextSub.pomodoroLength > 0) ? nextSub.pomodoroLength * 60 : 25 * 60;
            if (nextSub.breakLength && nextSub.breakLength > 0) {

            totalSessions = (nextSub.pomodoroCount && nextSub.pomodoroCount > 0) ? nextSub.pomodoroCount : 1;
            phase = 'work';
            secondsLeft = WORK_SECONDS;

            updateDisplay();
            resetPosition();

            notifyStateChanged();
          });

        activeTodoId = null;
        activeTodoTitle = '';
        activeTodoCategory = '';
        activeParentId = null;
        return;
      }
      rPhase = result.phase;
      rSecondsLeft = result.secondsLeft;
      rTotalPhase = result.totalPhase;
      rSessionCount = result.sessionCount;
      rAccWork = result.accWork;

    secondsLeft = rSecondsLeft;
    totalPhaseSeconds = rTotalPhase;
    sessionCount = rSessionCount;
    accumulatedWorkSeconds = rAccWork;

    focusTitleEl.textContent = activeTodoTitle;

    resetPosition();

    // Resume or show paused state
    if (wasRunning) {

      saveState();
    }
  }

  /**
   * Simulate elapsed seconds across phase transitions.
   * Returns { phase, secondsLeft, totalPhase, sessionCount, accWork, finished }
   */
  function simulateElapsed(curPhase, curSecondsLeft, curTotalPhase, curSession, curAccWork, elapsed) {
    var remaining = elapsed;

    // Read auto-start preferences
    var _simAutoBreak = true;
    try { var v = localStorage.getItem('dm-pomo-auto-break'); if (v === 'false') _simAutoBreak = false; } catch(e) {}
    var _simAutoWork = false;
    try { var v = localStorage.getItem('dm-pomo-auto-work'); if (v === 'true') _simAutoWork = true; } catch(e) {}

    while (remaining > 0) {
      if (remaining >= curSecondsLeft) {
        // Phase completed during navigation
        remaining -= curSecondsLeft;

        if (curPhase === 'work') {
          curAccWork += curSecondsLeft; // work seconds remaining = work done to finish phase

          // Check if all sessions are done
          if (totalSessions > 1 && curSession >= totalSessions) {
            return { finished: true, accWork: curAccWork };
          }

          // Switch to break
          curPhase = 'break';
          curSecondsLeft = BREAK_SECONDS;
          curTotalPhase = BREAK_SECONDS;

          if (!_simAutoBreak) {
            // Auto-break disabled — pause at break start
            return {
              finished: false,
              paused: true,
              phase: curPhase,
              secondsLeft: curSecondsLeft,
              totalPhase: curTotalPhase,
              sessionCount: curSession,
              accWork: curAccWork
            };
          }
        } else {
          // Break finished — next work session
          curSession++;
          curPhase = 'work';
          curSecondsLeft = WORK_SECONDS;
          curTotalPhase = WORK_SECONDS;

          if (!_simAutoWork) {
            // Auto-work disabled — pause at work start
            return {
              finished: false,
              paused: true,
              phase: curPhase,
              secondsLeft: curSecondsLeft,
              totalPhase: curTotalPhase,
              sessionCount: curSession,
              accWork: curAccWork
            };
          }
          // Auto-work enabled — continue consuming elapsed time
        }
      } else {
        // Elapsed time consumed within current phase
        if (curPhase === 'work') {
          // Track partial work done during elapsed time
          curAccWork += remaining;
          // Adjust totalPhase so progress bar is accurate
          curTotalPhase = curSecondsLeft; // total = what was left before elapsed
        }
        curSecondsLeft -= remaining;
        remaining = 0;
      }
    }

    return {
      finished: false,
      phase: curPhase,
      secondsLeft: curSecondsLeft,
      totalPhase: curTotalPhase,
      sessionCount: curSession,
      accWork: curAccWork
    };
  }

  // Restore on page load (localStorage first — fast, same device)
  restoreState();

  // ── Cross-device restore: if no local timer running, check Firestore ──
  function applyRemoteState(s) {
    if (!s || !s.activeTodoId || !s.savedAt) return false;

    // Calculate elapsed time since the remote state was saved
    var elapsedMs = Date.now() - s.savedAt;
    if (elapsedMs < 0) return false; // clock skew
    // Discard states older than 4 hours (likely stale/abandoned)
    if (elapsedMs > 4 * 60 * 60 * 1000) return false;
    var elapsedSec = Math.floor(elapsedMs / 1000);

    // Restore config
    WORK_SECONDS = s.WORK_SECONDS || 25 * 60;
    BREAK_SECONDS = s.BREAK_SECONDS || 5 * 60;
    activeTodoId = s.activeTodoId;
    activeTodoTitle = s.activeTodoTitle || 'Task';
    activeTodoCategory = s.activeTodoCategory || '';
    activeProjectId = s.activeProjectId || '';
    activeProjectName = s.activeProjectName || '';
    activeProjectColor = s.activeProjectColor || '';
    activeParentId = s.activeParentId || s.activeTodoId;
    totalSessions = s.totalSessions || 1;
    startedAt = s.startedAt;

    var rPhase = s.phase || 'work';
    var rSecondsLeft = s.secondsLeft || 0;
    var rTotalPhase = s.totalPhaseSeconds || WORK_SECONDS;
    var rSessionCount = s.sessionCount || 1;
    var rAccWork = s.accumulatedWorkSeconds || 0;
    var wasRunning = s.isRunning;

    // Simulate elapsed time if timer was running
    if (wasRunning && elapsedSec > 0) {
      var result = simulateElapsed(rPhase, rSecondsLeft, rTotalPhase, rSessionCount, rAccWork, elapsedSec);
      if (result.finished) {
        // Timer finished while on the other device — don't restore
        var trackedMinutes = Math.round(result.accWork / 60);
        if (trackedMinutes > 0) {
          saveTrackedMinutes(activeTodoId, trackedMinutes);
          window.dispatchEvent(new CustomEvent('dm-pomodoro-stopped', {
            detail: { todoId: activeTodoId, trackedMinutes: trackedMinutes }
          }));
        }
        activeTodoId = null;
        activeTodoTitle = '';
        activeTodoCategory = '';
        activeParentId = null;
        clearStateFromFirestore();
        return false;
      }
      rPhase = result.phase;
      rSecondsLeft = result.secondsLeft;
      rTotalPhase = result.totalPhase;
      rSessionCount = result.sessionCount;
      rAccWork = result.accWork;
      // Break->work transition pauses the timer (don't auto-start work)
      if (result.paused) wasRunning = false;
    }

    // Apply state
    phase = rPhase;
    secondsLeft = rSecondsLeft;
    totalPhaseSeconds = rTotalPhase;
    sessionCount = rSessionCount;
    accumulatedWorkSeconds = rAccWork;

    // Update UI
    titleEl.textContent = activeTodoTitle;
    focusTitleEl.textContent = activeTodoTitle;
    if (activeTodoCategory) {
      categoryEl.textContent = activeTodoCategory;
      categoryEl.style.display = '';
      focusCategoryEl.textContent = activeTodoCategory;
      focusCategoryEl.style.display = '';
    }
    updateDisplay();
    resetPosition();
    timerEl.style.display = '';
    loadSubtasks(activeParentId);

    if (wasRunning) {
      startTimer();
    } else {
      showPlayIcon();
      saveState(); // persist locally too
    }
    return true;
  }

  // Try Firestore restore if no local state was found
  function tryRemoteRestore() {
    if (activeTodoId) return; // Already restored from localStorage
    var ref = _getTimerDocRef();
    if (!ref) return;
    ref.get().then(function(doc) {
      if (!doc.exists || activeTodoId) return; // Timer already active or no remote state
      _fsSyncing = true;
      applyRemoteState(doc.data());
      _fsSyncing = false;
    }).catch(function(err) {
      console.warn('[pomo-sync] Remote restore failed:', err.message);
    });
  }

  // Retry logic for pomo-sync snapshot listener
  var _pomoSyncRetryCount = 0;
  var POMO_SYNC_MAX_RETRIES = 5;
  var _pomoSyncRetryTimer = null;

  // Start real-time listener for cross-device timer updates
  function startFirestoreListener() {
    var ref = _getTimerDocRef();
    if (!ref) return;
    if (_fsUnsubscribe) { _fsUnsubscribe(); _fsUnsubscribe = null; }
    if (_pomoSyncRetryTimer) { clearTimeout(_pomoSyncRetryTimer); _pomoSyncRetryTimer = null; }

    _fsUnsubscribe = ref.onSnapshot(function(doc) {
      _pomoSyncRetryCount = 0; // reset on success
      if (!doc.exists) {
        // Skip our own deletes (e.g. when switching tasks via closeTimer → start)
        if (_localDelete) {
          _localDelete = false;
          return;
        }
        // Remote timer was closed/cancelled — close local timer too
        if (activeTodoId && !_fsSyncing) {
          _fsSyncing = true;
          // Close timer locally without writing back to Firestore
          if (intervalId) { clearInterval(intervalId); intervalId = null; }
          isRunning = false;
          cancelScheduledNotification();
          timerEl.style.display = 'none';
          categoryEl.style.display = 'none';
          focusOverlay.style.display = 'none';
          isFocusMode = false;
          vizStop();
          document.title = document.title.replace(/^\d{2}:\d{2} \u2014 (Work|Break) \| /, '');
          clearInfoAndSubtasks();
          activeTodoId = null;
          activeTodoTitle = '';
          activeTodoCategory = '';
          activeParentId = null;
          try { localStorage.removeItem(STATE_KEY); } catch(e) {}
          notifyStateChanged();
          _fsSyncing = false;
        }
        return;
      }

      var data = doc.data();
      if (!data) return;

      // Ignore our own writes
      if (data.deviceId === _deviceId) return;

      // Ignore if the remote state is older than our last write
      if (data.savedAt && data.savedAt <= _lastFsSavedAt) return;

      _fsSyncing = true;

      // If we have a running timer for a different todo, close ours
      if (activeTodoId && data.activeTodoId && activeTodoId !== data.activeTodoId) {
        if (intervalId) { clearInterval(intervalId); intervalId = null; }
        isRunning = false;
        cancelScheduledNotification();
        timerEl.style.display = 'none';
        clearInfoAndSubtasks();
      }

      // Apply the remote state
      applyRemoteState(data);
      _fsSyncing = false;
    }, function(err) {
      console.warn('[pomo-sync] Snapshot listener error:', err.message);
      // Retry with exponential backoff (matches dm-sync pattern)
      if (_pomoSyncRetryCount < POMO_SYNC_MAX_RETRIES) {
        var delay = Math.min(1000 * Math.pow(2, _pomoSyncRetryCount), 30000);
        _pomoSyncRetryCount++;
        console.log('[pomo-sync] Retrying listener in ' + delay + 'ms (attempt ' + _pomoSyncRetryCount + '/' + POMO_SYNC_MAX_RETRIES + ')');
        _pomoSyncRetryTimer = setTimeout(function() {
          startFirestoreListener();
        }, delay);
      } else {
        console.error('[pomo-sync] Listener failed after ' + POMO_SYNC_MAX_RETRIES + ' retries');
      }
    });
  }

  // Initialize cross-device sync after auth is ready
  if (window.dmAuthReady) {
    window.dmAuthReady.then(function(user) {
      if (!user) return;
      tryRemoteRestore();
      startFirestoreListener();
      restoreProgressFromFirestore();
    });
  }

  // Restore per-task session progress from Firestore (merges with local)
  function restoreProgressFromFirestore() {
    if (!window.dmDb || !window.dmAuth || !window.dmAuth.currentUser) return;
    var ref = window.dmDb.collection('pomodoroProgress').doc(window.dmAuth.currentUser.uid);
    ref.get().then(function(doc) {
      if (!doc.exists) return;
      var data = doc.data();
      if (!data || !data.progress) return;
      var remote = data.progress;
      try {
        var local = {};
        var raw = localStorage.getItem(PROGRESS_KEY);
        if (raw) local = JSON.parse(raw);
        // Merge: remote wins for tasks not in local, or where remote is newer
        var merged = Object.assign({}, local);
        Object.keys(remote).forEach(function(tid) {
          if (!merged[tid] || (remote[tid].savedAt && (!merged[tid].savedAt || remote[tid].savedAt > merged[tid].savedAt))) {
            merged[tid] = remote[tid];
          }
        });
        if (Object.keys(merged).length > 0) {
          localStorage.setItem(PROGRESS_KEY, JSON.stringify(merged));
        }
        // Notify todo list to re-render (so inline progress indicators update)
        notifyStateChanged();
      } catch(e) {}
    }).catch(function(err) {
      console.warn('[pomo-progress] Firestore restore failed:', err.message);
    });
  }

  // ── Notify todo list to re-render inline timer indicators ──
  function notifyStateChanged() {
    window.dispatchEvent(new CustomEvent('dm-pomodoro-state-changed', {
      detail: { todoId: activeTodoId, isRunning: isRunning }
    }));
  }

  // ── Listen for external todo updates (e.g., subtask toggled in todo list) ──
  window.addEventListener('dm-todos-updated', function() {
    if (activeParentId) {
      loadSubtasks(activeParentId);
    }
    if (isFocusMode) {
      updateProgressStrip();
    }
  });

  // ── Re-schedule notification when app is backgrounded / foregrounded ──
  document.addEventListener('visibilitychange', function() {
    if (!activeTodoId || !isRunning) return;
    if (document.hidden) {
      // Going to background — ensure service worker has the notification scheduled
      scheduleNotification(secondsLeft, phase);
    }
    // When returning to foreground, the in-page setInterval keeps running,
    // so no action needed — the next tick() will reconcile state.
  });

  // ── Public API ──
  window.dmPomodoro = {
    start: function(todoId, todoTitle) {
      // If a different todo is already being timed, close it first
      if (activeTodoId && activeTodoId !== todoId) {
        closeTimer();
      }
      activeTodoId = todoId;
      activeTodoTitle = todoTitle || 'Task';
      activeTodoCategory = '';
      activeProjectId = '';
      activeProjectName = '';
      activeProjectColor = '';
      titleEl.textContent = activeTodoTitle;
      focusTitleEl.textContent = activeTodoTitle;

      // Look up category and pomodoro config from IndexedDB
      categoryEl.style.display = 'none';
      categoryEl.textContent = '';
      focusCategoryEl.style.display = 'none';
      focusCategoryEl.textContent = '';

      // Set defaults
      WORK_SECONDS = 25 * 60;
      BREAK_SECONDS = 5 * 60;
      totalSessions = 1;

      function initAndStart() {
        // Check for prior session progress on this task
        var prior = loadTaskProgress(todoId);
        var restoredRemaining = 0;
        if (prior) {
          // Always preserve accumulated work time and completed-session count,
          // even if the user edited pomodoroCount/pomodoroLength on the task.
          accumulatedWorkSeconds = prior.accWorkSeconds || 0;
          var priorDone = prior.sessionsCompleted || 0;
          // Cap at new totalSessions: if user reduced the count below what was
          // already completed, clamp so sessionCount stays within [1..totalSessions].
          if (priorDone >= totalSessions) {
            sessionCount = totalSessions;
          } else {
            sessionCount = priorDone + 1;
          }
          // Only restore exact timer position if the work duration hasn't changed.
          // If user edited pomodoroLength, start a fresh work phase at the new length.
          if (prior.workSeconds > 0 && prior.workSeconds === WORK_SECONDS &&
              prior.remainingSeconds > 0 && prior.remainingSeconds <= WORK_SECONDS) {
            restoredRemaining = prior.remainingSeconds;
          }
          // Honor stored break duration if the task's break length wasn't changed.
          if (prior.breakSeconds > 0 && prior.breakSeconds === BREAK_SECONDS) {
            BREAK_SECONDS = prior.breakSeconds;
          }
          console.log('[pomo] Resuming task with ' + priorDone + '/' + totalSessions + ' sessions completed (was ' + prior.totalSessions + '), ' + (restoredRemaining || WORK_SECONDS) + 's remaining');
        } else {
          sessionCount = 1;
          accumulatedWorkSeconds = 0;
        }
        phase = 'work';
        secondsLeft = restoredRemaining || WORK_SECONDS;
        totalPhaseSeconds = secondsLeft;
        startedAt = Date.now();
        isRunning = false;
        showPlayIcon();
        updateDisplay();
        resetPosition();
        // Request notification permission on first timer start (needs user gesture)
        requestNotificationPermission();
        startTimer();
        // Open in focus (maximized) mode by default
        enterFocusMode();
      }

      // Clear subtasks from previous run
      subtasksEl.innerHTML = '';
      subtasksEl.style.display = 'none';
      focusSubtasksEl.innerHTML = '';
      focusSubtasksEl.style.display = 'none';
      // Clear focus panels from previous run
      focusTimelineEl.style.display = 'none';
      focusTimelineBlocksEl.innerHTML = '';
      focusInlineStatsEl.innerHTML = '';
      _inlineStatsTodo = null;
      focusUpNextListEl.innerHTML = '';
      focusUpNextStripEl.style.display = 'none';
      focusNotesTextarea.value = '';
      _focusNotesOriginal = '';

      if (window.dmSync && window.dmSync.getTodo) {
        window.dmSync.getTodo(todoId).then(function(todo) {
          // Resolve project fields BEFORE starting timer so activeProjectId
          // is set when enterFocusMode() → updateUpNext() runs.
          var projectReady = Promise.resolve();
          if (todo && activeTodoId === todoId) {
            if (todo.category) {
              categoryEl.textContent = todo.category;
              categoryEl.style.display = '';
              focusCategoryEl.textContent = todo.category;
              focusCategoryEl.style.display = '';
              activeTodoCategory = todo.category;
            }
            if (todo.projectId && window.dmSync && window.dmSync.getProject) {
              projectReady = window.dmSync.getProject(todo.projectId).then(function(proj) {
                if (proj && activeTodoId === todoId) {
                  activeProjectId = proj.id;
                  activeProjectName = proj.name;
                  activeProjectColor = proj.color || '';
                }
              }).catch(function() {});
            }
            if (todo.pomodoroLength && todo.pomodoroLength > 0) {
              WORK_SECONDS = todo.pomodoroLength * 60;
            }
            if (todo.breakLength && todo.breakLength > 0) {
              BREAK_SECONDS = todo.breakLength * 60;
            } else {
              // Fall back to global short-break default
              try { var v = parseInt(localStorage.getItem('dm-pomo-short-break'), 10); if (v > 0) BREAK_SECONDS = v * 60; } catch(e) {}
            }
            if (todo.pomodoroCount && todo.pomodoroCount > 0) {
              totalSessions = todo.pomodoroCount;
            }
            // Determine parent context: if this is a subtask, show siblings from the parent
            if (todo.parentId) {
              activeParentId = todo.parentId;
              console.log('[pomo] Timing subtask "' + todoTitle + '" (parentId=' + todo.parentId + ')');
            } else {
              activeParentId = todoId;
              console.log('[pomo] Timing parent "' + todoTitle + '" (id=' + todoId + ')');
            }
          } else {
            activeParentId = todoId;
          }
          // Wait for project lookup to complete, then start timer
          projectReady.then(function() {
            initAndStart();
            // Load subtasks AFTER timer is visible so user sees them appear
            loadSubtasks(activeParentId);
          });
        }).catch(function(err) {
          console.error('[pomo] getTodo error:', err);
          activeParentId = todoId;
          initAndStart();
        });
      } else {
        activeParentId = todoId;
        initAndStart();
      }
    },
    stop: closeTimer,
    finish: finishTask,
    next: nextTask,
    reset: resetTimer,
    pause: pauseTimer,
    resume: startTimer,
    togglePause: function() {
      if (isRunning) {
        pauseTimer();
      } else if (activeTodoId) {
        startTimer();
      }
    },
    isActive: function(todoId) {
      return activeTodoId === todoId;
    },
    isTimerRunning: function() {
      return isRunning;
    },
    getActiveTodoId: function() {
      return activeTodoId;
    },
    getSessionInfo: function() {
      return { current: sessionCount, total: totalSessions };
    },
    getTaskProgress: function(todoId) {
      return loadTaskProgress(todoId);
    },
    clearTaskProgress: function(todoId) {
      clearTaskProgress(todoId);
    },
    getStartedAt: function() {
      return startedAt;
    }
  };
})();
</script>
