<!-- Pomodoro Timer: Floating countdown widget for TODO tasks -->
<div id="pomodoro-timer" class="pomodoro-timer" style="display: none;">
  <div class="pomodoro-timer-header">
    <span class="pomodoro-timer-phase" id="pomodoro-phase">Work</span>
    <div class="pomodoro-timer-header-actions">
      <button type="button" class="pomodoro-timer-expand" id="pomodoro-expand" title="Focus mode" aria-label="Focus mode">
        <svg class="dm-icon dm-icon--maximize" width="13" height="13" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-maximize"/></svg>
      </button>
      <button type="button" class="pomodoro-timer-close" id="pomodoro-close" title="Save &amp; close" aria-label="Save and close timer">&times;</button>
    </div>
  </div>
  <div class="pomodoro-timer-category" id="pomodoro-category" style="display:none;"></div>
  <div class="pomodoro-timer-title" id="pomodoro-title"></div>
  <div class="pomodoro-timer-display" id="pomodoro-display">25:00</div>
  <div class="pomodoro-timer-progress">
    <div class="pomodoro-timer-progress-bar" id="pomodoro-progress"></div>
  </div>
  <div class="pomodoro-timer-controls">
    <button type="button" class="pomodoro-btn pomodoro-btn-reset" id="pomodoro-reset" title="Discard progress &amp; restart">
      <svg class="dm-icon dm-icon--rotate-ccw" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-rotate-ccw"/></svg>
    </button>
    <button type="button" class="pomodoro-btn pomodoro-btn-primary" id="pomodoro-toggle" title="Play / Pause (Space)">
      <svg class="dm-icon dm-icon--play" width="16" height="16" viewBox="0 0 24 24" id="pomodoro-play-icon" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-play"/></svg>
      <svg class="dm-icon dm-icon--pause" width="16" height="16" viewBox="0 0 24 24" id="pomodoro-pause-icon" style="display:none;" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-pause"/></svg>
    </button>
    <button type="button" class="pomodoro-btn pomodoro-btn-skip" id="pomodoro-skip" title="Skip to Break">
      <svg class="dm-icon dm-icon--skip-forward" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-skip-forward"/></svg>
    </button>
    <button type="button" class="pomodoro-btn pomodoro-btn-next" id="pomodoro-next" title="Complete task &amp; start next">
      <svg class="dm-icon dm-icon--skip-forward" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-skip-forward"/></svg>
    </button>
  </div>
  <div class="pomodoro-timer-session" id="pomodoro-session">Session 1</div>
  <div class="pomodoro-timer-subtasks" id="pomodoro-subtasks" style="display:none;"></div>
  <div class="pomodoro-timer-info" id="pomodoro-info" style="display:none;">
    <span id="pomodoro-started-at"></span>
    <span id="pomodoro-remaining"></span>
    <span id="pomodoro-est-finish"></span>
  </div>
</div>

<!-- Focused / Zen mode overlay -->
<div id="pomodoro-focus-overlay" class="pomodoro-focus-overlay" style="display:none;">
  <div class="pomodoro-focus-backdrop"></div>
  <div class="pomodoro-focus-card">
    <!-- Top header strip with ambient visualizer canvas behind -->
    <div class="pomodoro-focus-header-strip" role="button" aria-label="Toggle visualizer mode" tabindex="0">
      <canvas id="focus-viz-canvas" class="pomodoro-focus-viz-canvas"></canvas>
      <div class="pomodoro-focus-header">
        <div class="pomodoro-focus-header-left">
          <span class="pomodoro-focus-phase" id="focus-phase">Work</span>
          <div class="pomodoro-focus-category" id="focus-category" style="display:none;"></div>
        </div>
        <div class="pomodoro-focus-header-actions">
          <button type="button" class="pomodoro-focus-settings-btn" id="focus-settings-btn" title="Focus settings" aria-label="Focus settings" aria-haspopup="true" aria-expanded="false">
            <svg class="dm-icon dm-icon--settings" width="15" height="15" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-settings"/></svg>
          </button>
          <button type="button" class="pomodoro-focus-collapse" id="focus-collapse" title="Exit focus mode" aria-label="Exit focus mode">
            <svg class="dm-icon dm-icon--minimize" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-minimize"/></svg>
          </button>
          <button type="button" class="pomodoro-focus-close-btn" id="focus-close" title="Save &amp; close" aria-label="Save and close timer">&times;</button>
        </div>
      </div>
    </div>

    <!-- Focus settings popover -->
    <div class="pomodoro-focus-settings-popover" id="focus-settings-popover">
      <div class="pomodoro-focus-settings-title">Focus Settings</div>
      <div class="pomodoro-focus-settings-group">
        <span class="pomodoro-focus-settings-label">Color Theme</span>
        <div class="pomodoro-focus-theme-grid" id="focus-theme-grid"></div>
        <div class="pomodoro-focus-custom-colors" id="focus-custom-colors" style="display:none;">
          <label>Work <input type="color" id="focus-custom-work" value="#b41e1e"></label>
          <label>Break <input type="color" id="focus-custom-break" value="#1e7832"></label>
        </div>
      </div>
      <div class="pomodoro-focus-settings-group">
        <div class="pomodoro-focus-toggle-row">
          <span class="pomodoro-focus-settings-label" style="margin-bottom:0;">Auto-advance</span>
          <label class="pomodoro-focus-toggle-switch">
            <input type="checkbox" id="focus-auto-advance" checked>
            <span class="pomodoro-focus-toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="pomodoro-focus-settings-group">
        <div class="pomodoro-focus-toggle-row">
          <span class="pomodoro-focus-settings-label" style="margin-bottom:0;">Today's progress</span>
          <label class="pomodoro-focus-toggle-switch">
            <input type="checkbox" id="focus-show-progress" checked>
            <span class="pomodoro-focus-toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="pomodoro-focus-settings-group">
        <div class="pomodoro-focus-toggle-row">
          <span class="pomodoro-focus-settings-label" style="margin-bottom:0;">Daily goal</span>
          <select class="pomodoro-focus-goal-select" id="focus-daily-goal-select">
            <option value="0">Off</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="6">6</option>
            <option value="8">8</option>
            <option value="10">10</option>
            <option value="12">12</option>
          </select>
        </div>
      </div>
      <div class="pomodoro-focus-settings-group">
        <span class="pomodoro-focus-settings-label" style="margin-bottom:4px;">Wallpaper</span>
        <div class="pomodoro-focus-wallpaper-gallery" id="focus-wallpaper-gallery"></div>
        <div class="pomodoro-focus-wallpaper-row" style="margin-top:6px;">
          <input type="url" class="pomodoro-focus-wallpaper-input" id="focus-wallpaper-input" placeholder="Or paste a custom URL..." autocomplete="off" spellcheck="false">
          <button type="button" class="pomodoro-focus-wallpaper-clear" id="focus-wallpaper-clear" title="Clear wallpaper">&times;</button>
        </div>
      </div>
    </div>

    <!-- Auto-advance countdown overlay -->
    <div class="pomodoro-focus-countdown-overlay" id="focus-countdown-overlay" role="alertdialog" aria-label="Auto-advance countdown">
      <div class="pomodoro-focus-countdown-text" id="focus-countdown-text">Break starts in</div>
      <div class="pomodoro-focus-countdown-number" id="focus-countdown-number" aria-live="assertive">10</div>
      <button type="button" class="pomodoro-focus-countdown-cancel" id="focus-countdown-cancel">Pause</button>
    </div>

    <!-- Two-column body -->
    <div class="pomodoro-focus-body">
      <!-- Left column: timer core -->
      <div class="pomodoro-focus-left">
        <div class="pomodoro-focus-title" id="focus-title"></div>
        <div class="pomodoro-focus-display" id="focus-display">25:00</div>
        <div class="pomodoro-focus-progress">
          <div class="pomodoro-focus-progress-bar" id="focus-progress"></div>
        </div>
        <div class="pomodoro-focus-controls">
          <button type="button" class="pomodoro-btn pomodoro-focus-btn-reset" id="focus-reset" title="Discard progress &amp; restart">
            <svg class="dm-icon dm-icon--rotate-ccw" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-rotate-ccw"/></svg>
          </button>
          <button type="button" class="pomodoro-btn pomodoro-focus-btn-primary" id="focus-toggle" title="Play / Pause (Space)">
            <svg class="dm-icon dm-icon--play" width="28" height="28" viewBox="0 0 24 24" id="focus-play-icon" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-play"/></svg>
            <svg class="dm-icon dm-icon--pause" width="28" height="28" viewBox="0 0 24 24" id="focus-pause-icon" style="display:none;" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-pause"/></svg>
          </button>
          <button type="button" class="pomodoro-btn pomodoro-focus-btn-skip" id="focus-skip" title="Skip to Break">
            <svg class="dm-icon dm-icon--skip-forward" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-skip-forward"/></svg>
          </button>
          <button type="button" class="pomodoro-btn pomodoro-focus-btn-next" id="focus-next" title="Complete task &amp; start next">
            <svg class="dm-icon dm-icon--skip-forward" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-skip-forward"/></svg>
          </button>
        </div>
        <div class="pomodoro-focus-btn-labels">
          <span>Reset</span>
          <span><!-- play/pause --></span>
          <span id="focus-skip-label">Skip to Break</span>
          <span>Complete &amp; next</span>
        </div>
        <div class="pomodoro-focus-session" id="focus-session">Session 1</div>

        <!-- Session timeline: visual blocks for each pomodoro -->
        <div class="pomodoro-focus-timeline" id="focus-timeline" style="display:none;">
          <div class="pomodoro-focus-panel-label">Sessions</div>
          <div class="pomodoro-focus-timeline-blocks" id="focus-timeline-blocks"></div>
        </div>

        <div class="pomodoro-focus-subtasks" id="focus-subtasks" style="display:none;"></div>
        <div class="pomodoro-focus-inline-stats" id="focus-inline-stats"></div>
      </div>

      <!-- Notes collapse/expand toggle icon (vertically centered next to notes) -->
      <button type="button" class="pomodoro-focus-notes-toggle-icon" id="focus-notes-toggle-icon" aria-label="Toggle notes panel" title="Toggle notes panel">
        <svg class="dm-icon dm-icon--chevron-right" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-chevron-right"/></svg>
      </button>

      <!-- Right column: notes -->
      <div class="pomodoro-focus-right">
        <!-- Notes panel -->
        <div class="pomodoro-focus-notes-panel" id="focus-panel-notes">
          <div class="pomodoro-focus-panel-label pomodoro-focus-notes-label" id="focus-notes-label">
            <svg class="dm-icon dm-icon--file-text" width="11" height="11" viewBox="0 0 24 24" aria-hidden="true"><use href="/digital-memory/icons/sprite.svg#icon-file-text"/></svg>
            Notes <span class="pomodoro-focus-notes-chevron">&#x25BE;</span>
          </div>
          <textarea id="focus-notes-textarea" class="pomodoro-focus-notes-textarea" aria-label="Notes" placeholder="Jot down thoughts while you work..."></textarea>
          <div class="pomodoro-focus-notes-status" id="focus-notes-status"></div>
        </div>
      </div>
    </div>

    <!-- Today's progress strip -->
    <div class="pomodoro-focus-progress-strip" id="focus-progress-strip" style="display:none;">
      <div class="pomodoro-focus-daily-goal-ring" id="focus-daily-goal-ring" style="display:none;">
        <svg viewBox="0 0 36 36" width="32" height="32">
          <circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--gray-200)" stroke-width="2.5"></circle>
          <circle class="pomodoro-goal-ring-fg" id="focus-goal-ring-fg" cx="18" cy="18" r="15.9" fill="none" stroke="var(--color-accent, #4285f4)" stroke-width="2.5" stroke-dasharray="100" stroke-dashoffset="100" stroke-linecap="round" transform="rotate(-90 18 18)"></circle>
          <text x="18" y="20.5" text-anchor="middle" class="pomodoro-goal-ring-text" id="focus-goal-ring-text">0/4</text>
        </svg>
      </div>
      <div class="pomodoro-focus-progress-strip-bar">
        <div class="pomodoro-focus-progress-strip-fill" id="focus-progress-strip-fill"></div>
      </div>
      <span class="pomodoro-focus-progress-strip-text" id="focus-progress-strip-text"></span>
      <div class="pomodoro-focus-history-chart" id="focus-history-chart" title="Pomodoros — last 7 days">
        <svg id="focus-history-svg" viewBox="0 0 84 24" width="84" height="24" preserveAspectRatio="none"></svg>
      </div>
    </div>

    <!-- Up Next footer strip -->
    <div class="pomodoro-focus-upnext-strip" id="focus-panel-upnext" style="display:none;">
      <span class="pomodoro-focus-upnext-label">Up Next</span>
      <div class="pomodoro-focus-upnext-list" id="focus-upnext-list"></div>
    </div>

  </div>
</div>

<style>
.pomodoro-timer {
  position: fixed;
  bottom: 100px;
  right: 24px;
  width: 220px;
  background: var(--body-background);
  border: 1px solid var(--gray-200);
  border-radius: 14px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
  z-index: 1050;
  padding: 14px 16px;
  user-select: none;
  transition: box-shadow 0.3s;
}
.pomodoro-timer:hover {
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
}
.pomodoro-timer-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
  cursor: grab;
}
.pomodoro-timer-header:active {
  cursor: grabbing;
}
.pomodoro-timer-phase {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--color-accent);
}
.pomodoro-timer-phase.break {
  color: var(--color-success, #34a853);
}
.pomodoro-timer-close {
  background: none;
  border: none;
  font-size: 1.1rem;
  color: var(--gray-400);
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
}
.pomodoro-timer-close:hover { color: var(--body-font-color); }
.pomodoro-timer-header-actions {
  display: flex;
  align-items: center;
  gap: 2px;
}
.pomodoro-timer-expand {
  background: none;
  border: none;
  color: var(--gray-400);
  cursor: pointer;
  padding: 2px;
  line-height: 1;
  border-radius: 3px;
  transition: color 0.15s, background 0.15s;
}
.pomodoro-timer-expand:hover {
  color: var(--color-accent);
  background: rgba(0, 105, 255, 0.08);
}
.pomodoro-timer-category {
  font-size: 0.68rem;
  font-weight: 500;
  color: var(--color-link);
  background: rgba(0, 105, 255, 0.08);
  padding: 1px 7px;
  border-radius: 4px;
  display: inline-block;
  max-width: 100%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}
.pomodoro-timer-title {
  font-size: 0.8rem;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 8px;
}
.pomodoro-timer-display {
  font-size: 2.2rem;
  font-weight: 700;
  text-align: center;
  font-variant-numeric: tabular-nums;
  color: var(--body-font-color);
  line-height: 1.2;
}
.pomodoro-timer-progress {
  height: 4px;
  background: var(--gray-200);
  border-radius: 2px;
  margin: 8px 0;
  overflow: hidden;
}
.pomodoro-timer-progress-bar {
  height: 100%;
  width: 0%;
  background: var(--color-accent);
  border-radius: 2px;
  transition: width 1s linear;
}
.pomodoro-timer-progress-bar.break {
  background: var(--color-success, #34a853);
}
.pomodoro-timer-controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-top: 6px;
}
.pomodoro-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.pomodoro-btn:active { transform: scale(0.92); }
.pomodoro-btn-primary {
  width: 40px;
  height: 40px;
  background: var(--color-accent);
  color: #fff;
}
.pomodoro-btn-primary:hover { opacity: 0.9; }
.pomodoro-btn-reset {
  width: 30px;
  height: 30px;
  background: var(--gray-100);
  color: var(--gray-500);
}
.pomodoro-btn-reset:hover {
  background: var(--gray-200);
  color: var(--body-font-color);
}
.pomodoro-btn-next {
  width: 30px;
  height: 30px;
  background: var(--gray-100);
  color: var(--color-accent);
}
.pomodoro-btn-next:hover {
  background: rgba(66, 133, 244, 0.12);
  color: var(--color-accent);
}
.pomodoro-btn-skip {
  width: 30px;
  height: 30px;
  background: var(--gray-100);
  color: var(--gray-500);
}
.pomodoro-btn-skip:hover {
  background: rgba(251, 140, 0, 0.12);
  color: #fb8c00;
}
.pomodoro-timer-session {
  text-align: center;
  font-size: 0.7rem;
  color: var(--text-faint);
  margin-top: 6px;
}
/* Active timer indicator on todo item */
.todo-item-timer-active {
  font-size: 0.7rem;
  color: var(--color-accent);
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  animation: pomo-pulse 2s ease-in-out infinite;
}
.todo-item-timer-active.paused {
  animation: none;
  opacity: 0.65;
}
/* Prior session progress indicator (task not currently active) */
.todo-item-timer-progress {
  font-size: 0.65rem;
  color: var(--accent-green, #388e3c);
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  opacity: 0.85;
}
@keyframes pomo-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
@media (max-width: 600px) {
  .pomodoro-timer {
    right: 12px;
    bottom: 80px;
    width: 190px;
  }
}
/* Info section: started-at, remaining, est. finish */
.pomodoro-timer-info {
  display: flex;
  flex-direction: column;
  gap: 1px;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--gray-200);
  font-size: 0.65rem;
  color: var(--text-faint);
  line-height: 1.4;
}
.pomodoro-timer-info span::before {
  display: inline-block;
  width: 56px;
  font-weight: 600;
  color: var(--gray-400);
}
#pomodoro-started-at::before { content: 'Started'; }
#pomodoro-remaining::before { content: 'Left'; }
#pomodoro-est-finish::before { content: 'Finish'; }
/* Subtask checklist inside pomodoro popup */
.pomodoro-timer-subtasks {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--gray-200);
  max-height: 140px;
  overflow-y: auto;
  font-size: 0.7rem;
}
/* Progress header */
.pomo-subtask-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
  font-size: 0.62rem;
  font-weight: 600;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.pomo-subtask-progress-bar {
  flex: 1;
  height: 3px;
  background: var(--gray-200);
  border-radius: 2px;
  margin-left: 8px;
  overflow: hidden;
}
.pomo-subtask-progress-fill {
  height: 100%;
  background: var(--color-success, #34a853);
  border-radius: 2px;
  transition: width 0.3s ease;
}
/* Subtask item rows */
.pomodoro-subtask-item {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 2px 3px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s;
}
.pomodoro-subtask-item:hover {
  background: var(--gray-100);
}
/* Checkbox-style indicator */
.pomo-subtask-checkbox {
  width: 12px;
  height: 12px;
  border-radius: 3px;
  border: 1.5px solid var(--gray-400);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.15s, background 0.15s;
}
.pomo-subtask-checkbox svg {
  display: none;
}
.pomodoro-subtask-item:hover .pomo-subtask-checkbox {
  border-color: var(--color-link);
}
.pomodoro-subtask-item.done .pomo-subtask-checkbox {
  border-color: var(--color-success, #34a853);
  background: var(--color-success, #34a853);
}
.pomodoro-subtask-item.done .pomo-subtask-checkbox svg {
  display: block;
}
/* Label */
.pomodoro-subtask-item label {
  cursor: pointer;
  color: var(--body-font-color);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 0.64rem;
  flex: 1;
  line-height: 1.3;
}
.pomodoro-subtask-item.done label {
  text-decoration: line-through;
  color: var(--text-faint);
}
/* Estimate pill */
.pomo-subtask-est {
  font-size: 0.56rem;
  color: var(--text-faint);
  background: var(--gray-100);
  padding: 0 4px;
  border-radius: 3px;
  flex-shrink: 0;
  line-height: 1.5;
  font-variant-numeric: tabular-nums;
}
.pomodoro-subtask-item.done .pomo-subtask-est {
  opacity: 0.5;
}
/* Active subtask highlight (the one being timed) */
.pomodoro-subtask-item.active {
  background: rgba(0, 105, 255, 0.07);
  border-left: 2px solid var(--color-accent);
  padding-left: 5px;
}
.pomodoro-subtask-item.active label {
  font-weight: 600;
  color: var(--color-accent);
}

/* ── Focus / Zen Mode Overlay ── */
.pomodoro-focus-overlay {
  position: fixed;
  inset: 0;
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  transition: background-image 0.3s ease;
}
/* ── Wallpaper gallery ── */
.pomodoro-focus-wallpaper-gallery {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}
.pomodoro-focus-wallpaper-thumb {
  position: relative;
  aspect-ratio: 16 / 10;
  border-radius: 6px;
  background-size: cover;
  background-position: center;
  border: 2px solid transparent;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
  overflow: hidden;
}
.pomodoro-focus-wallpaper-thumb:hover {
  transform: scale(1.08);
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.pomodoro-focus-wallpaper-thumb.active {
  border-color: #fff;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.5), 0 2px 8px rgba(0,0,0,0.4);
}
.pomodoro-focus-wallpaper-thumb .wp-label {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 2px 4px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  color: #fff;
  font-size: 0.55rem;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
}
.pomodoro-focus-wallpaper-thumb:hover .wp-label {
  opacity: 1;
}
.pomodoro-focus-wallpaper-none {
  aspect-ratio: 16 / 10;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.5);
  font-size: 0.6rem;
  transition: border-color 0.15s, background 0.15s;
}
.pomodoro-focus-wallpaper-none:hover {
  background: rgba(255,255,255,0.15);
}
.pomodoro-focus-wallpaper-none.active {
  border-color: #fff;
  color: #fff;
}
/* ── Wallpaper input ── */
.pomodoro-focus-wallpaper-row {
  display: flex;
  gap: 4px;
  align-items: center;
}
.pomodoro-focus-wallpaper-input {
  flex: 1;
  background: rgba(255, 255, 255, 0.12);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 0.68rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
  min-width: 0;
}
.pomodoro-focus-wallpaper-input:focus {
  border-color: rgba(255, 255, 255, 0.45);
}
.pomodoro-focus-wallpaper-input::placeholder {
  color: rgba(255, 255, 255, 0.35);
  font-size: 0.65rem;
}
.pomodoro-focus-wallpaper-clear {
  background: rgba(255, 255, 255, 0.12);
  color: rgba(255, 255, 255, 0.7);
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 6px;
  width: 26px;
  height: 26px;
  font-size: 1rem;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
}
.pomodoro-focus-wallpaper-clear:hover {
  background: rgba(255, 60, 60, 0.3);
  color: #fff;
}
.pomodoro-focus-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.65);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  transition: background 0.6s ease;
}
/* Theme: Alert (red work / green break — classic Pomodoro alertness) */
.pomodoro-focus-backdrop.theme-alert.work {
  background: rgba(180, 30, 30, 0.55);
}
.pomodoro-focus-backdrop.theme-alert.break {
  background: rgba(30, 120, 50, 0.50);
}
/* Theme: Deep Focus (blue work / amber break — research-backed default) */
.pomodoro-focus-backdrop.theme-deep-focus.work {
  background: rgba(25, 45, 155, 0.55);
}
.pomodoro-focus-backdrop.theme-deep-focus.break {
  background: rgba(175, 130, 30, 0.48);
}
/* Theme: Ocean (deep teal work / soft cyan break) */
.pomodoro-focus-backdrop.theme-ocean.work {
  background: rgba(15, 80, 100, 0.55);
}
.pomodoro-focus-backdrop.theme-ocean.break {
  background: rgba(40, 160, 180, 0.42);
}
/* Theme: Monochrome (dark charcoal work / medium gray break) */
.pomodoro-focus-backdrop.theme-monochrome.work {
  background: rgba(35, 35, 40, 0.60);
}
.pomodoro-focus-backdrop.theme-monochrome.break {
  background: rgba(90, 90, 95, 0.50);
}
/* Theme: Forest (deep green work / warm earth break) */
.pomodoro-focus-backdrop.theme-forest.work {
  background: rgba(20, 75, 35, 0.55);
}
.pomodoro-focus-backdrop.theme-forest.break {
  background: rgba(160, 120, 60, 0.45);
}
/* Theme: Custom (colors set via CSS variables) */
.pomodoro-focus-backdrop.theme-custom.work {
  background: var(--focus-custom-work, rgba(180, 30, 30, 0.55));
}
.pomodoro-focus-backdrop.theme-custom.break {
  background: var(--focus-custom-break, rgba(30, 120, 50, 0.50));
}
.pomodoro-focus-card {
  position: relative;
  width: 90vw;
  max-width: 1200px;
  height: 88vh;
  max-height: 900px;
  display: flex;
  flex-direction: column;
  background: var(--body-background);
  border: 1px solid var(--gray-200);
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  padding: 0 0 28px;
  user-select: none;
  overflow: hidden;
}
/* Header strip: visualizer canvas behind the header controls */
.pomodoro-focus-header-strip {
  position: relative;
  height: 64px;
  flex-shrink: 0;
  overflow: hidden;
  border-radius: 19px 19px 0 0;
  background: #0a0a14;
  cursor: pointer;
}
.pomodoro-focus-viz-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}
.pomodoro-focus-header {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 100%;
  padding: 0 20px;
  flex-shrink: 0;
}
.pomodoro-focus-header-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.pomodoro-focus-phase {
  font-size: 1rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: rgba(255, 255, 255, 0.9);
  flex-shrink: 0;
  text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
}
.pomodoro-focus-phase.break {
  color: var(--color-success, #34a853);
}
.pomodoro-focus-header-actions {
  display: flex;
  align-items: center;
  gap: 4px;
}
.pomodoro-focus-collapse {
  background: none;
  border: none;
  color: rgba(255, 255, 255, 0.6);
  cursor: pointer;
  padding: 3px;
  line-height: 1;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
}
.pomodoro-focus-collapse:hover {
  color: rgba(255, 255, 255, 0.95);
  background: rgba(255, 255, 255, 0.1);
}
.pomodoro-focus-close-btn {
  background: none;
  border: none;
  font-size: 1.3rem;
  color: rgba(255, 255, 255, 0.6);
  cursor: pointer;
  padding: 0 3px;
  line-height: 1;
}
.pomodoro-focus-close-btn:hover { color: rgba(255, 255, 255, 0.95); }
.pomodoro-focus-category {
  font-size: 0.72rem;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.85);
  background: rgba(255, 255, 255, 0.12);
  padding: 2px 9px;
  border-radius: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 180px;
}
/* Two-column body */
.pomodoro-focus-body {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  padding: 16px 28px 0;
}
.pomodoro-focus-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: 0;
  overflow-y: auto;
  margin-right: 28px;
}
.pomodoro-focus-right {
  width: 260px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow-y: auto;
  padding-left: 24px;
  border-left: 1px solid var(--gray-200);
  position: relative;
}
/* Invisible drag zone on the left border for resizing */
.pomodoro-focus-right::before {
  content: '';
  position: absolute;
  top: 0;
  left: -4px;
  width: 8px;
  bottom: 0;
  cursor: col-resize;
  z-index: 4;
}
.pomodoro-focus-title {
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--body-font-color);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 16px;
  max-width: 100%;
  text-align: center;
  user-select: text;
}
.pomodoro-focus-display {
  font-size: 7rem;
  font-weight: 700;
  text-align: center;
  font-variant-numeric: tabular-nums;
  color: var(--body-font-color);
  line-height: 1.1;
}
.pomodoro-focus-progress {
  height: 8px;
  background: var(--gray-200);
  border-radius: 4px;
  margin: 20px 0;
  overflow: hidden;
  width: 100%;
  max-width: 450px;
}
.pomodoro-focus-progress-bar {
  height: 100%;
  width: 0%;
  background: var(--color-accent);
  border-radius: 4px;
  transition: width 1s linear;
}
.pomodoro-focus-progress-bar.break {
  background: var(--color-success, #34a853);
}
.pomodoro-focus-controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin-top: 10px;
}
.pomodoro-focus-btn-primary {
  width: 76px;
  height: 76px;
  background: var(--color-accent);
  color: #fff;
}
.pomodoro-focus-btn-primary:hover { opacity: 0.9; }
.pomodoro-focus-btn-reset {
  width: 54px;
  height: 54px;
  background: var(--gray-100);
  color: var(--gray-500);
}
.pomodoro-focus-btn-reset:hover {
  background: var(--gray-200);
  color: var(--body-font-color);
}
.pomodoro-focus-btn-next {
  width: 54px;
  height: 54px;
  background: var(--gray-100);
  color: var(--color-accent);
}
.pomodoro-focus-btn-next:hover {
  background: rgba(66, 133, 244, 0.12);
  color: var(--color-accent);
}
.pomodoro-focus-btn-skip {
  width: 54px;
  height: 54px;
  background: var(--gray-100);
  color: var(--gray-500);
}
.pomodoro-focus-btn-skip:hover {
  background: rgba(251, 140, 0, 0.12);
  color: #fb8c00;
}
.pomodoro-focus-btn-labels {
  display: grid;
  grid-template-columns: 54px 72px 54px 54px;
  gap: 8px;
  margin-top: 6px;
  text-align: center;
}
.pomodoro-focus-btn-labels span {
  font-size: 0.67rem;
  color: var(--text-faint);
  line-height: 1.2;
  white-space: nowrap;
}
.pomodoro-focus-session {
  text-align: center;
  font-size: 0.92rem;
  color: var(--text-faint);
  margin-top: 12px;
}
/* Session timeline */
.pomodoro-focus-timeline {
  margin-top: 14px;
  width: 100%;
  max-width: 450px;
}
.pomodoro-focus-timeline-blocks {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.pomodoro-focus-timeline-block {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.62rem;
  font-weight: 600;
  transition: transform 0.15s;
}
.pomodoro-focus-timeline-block.completed {
  background: var(--color-accent);
  color: #fff;
}
.pomodoro-focus-timeline-block.current {
  background: var(--color-accent);
  color: #fff;
  box-shadow: 0 0 0 2px var(--body-background), 0 0 0 4px var(--color-accent);
  animation: focus-pulse-block 2s ease-in-out infinite;
}
.pomodoro-focus-timeline-block.remaining {
  background: var(--gray-100);
  color: var(--gray-400);
  border: 1px solid var(--gray-200);
}
.pomodoro-focus-timeline-block.break-block {
  width: 8px;
  height: 28px;
  border-radius: 3px;
  background: var(--gray-100);
  font-size: 0;
}
.pomodoro-focus-timeline-block.break-block.completed {
  background: var(--color-success, #34a853);
  opacity: 0.5;
}
@keyframes focus-pulse-block {
  0%, 100% { box-shadow: 0 0 0 2px var(--body-background), 0 0 0 4px var(--color-accent); }
  50% { box-shadow: 0 0 0 2px var(--body-background), 0 0 0 6px rgba(0, 105, 255, 0.3); }
}
/* Focus subtask list */
.pomodoro-focus-subtasks {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--gray-200);
  max-height: 180px;
  overflow-y: auto;
  font-size: 0.8rem;
  width: 100%;
  max-width: 360px;
}
.pomodoro-focus-subtasks .pomo-subtask-header {
  font-size: 0.7rem;
  margin-bottom: 5px;
}
.pomodoro-focus-subtasks .pomodoro-subtask-item {
  padding: 3px 4px;
  gap: 6px;
}
.pomodoro-focus-subtasks .pomo-subtask-checkbox {
  width: 14px;
  height: 14px;
}
.pomodoro-focus-subtasks .pomodoro-subtask-item label {
  font-size: 0.74rem;
}
.pomodoro-focus-subtasks .pomo-subtask-est {
  font-size: 0.64rem;
}
/* Inline stats (left column) */
.pomodoro-focus-inline-stats {
  text-align: center;
  font-size: 0.76rem;
  color: var(--text-faint);
  margin-top: 10px;
  line-height: 1.6;
  width: 100%;
  max-width: 450px;
  user-select: text;
}
.pomodoro-focus-inline-stats .stat-sep {
  margin: 0 5px;
  color: var(--gray-300);
}
/* Right-column panels */
.pomodoro-focus-panel-label {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--gray-400);
  margin-bottom: 8px;
}
/* Notes panel label — clickable to collapse */
.pomodoro-focus-notes-label {
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
}
.pomodoro-focus-notes-label:hover {
  color: var(--gray-600);
}
.pomodoro-focus-notes-chevron {
  font-size: 0.7rem;
  transition: transform 0.2s;
}
/* Notes collapse/expand toggle icon — sits between resize handle and right column */
.pomodoro-focus-notes-toggle-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 28px;
  flex-shrink: 0;
  border: 1px solid var(--gray-200);
  border-radius: 5px;
  background: var(--body-background);
  cursor: pointer;
  color: var(--gray-400);
  padding: 0;
  margin: 0;
  align-self: center;
  z-index: 3;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.pomodoro-focus-notes-toggle-icon:hover {
  background: var(--gray-100);
  color: var(--gray-600);
  border-color: var(--gray-300);
}
.pomodoro-focus-notes-toggle-icon svg {
  transition: transform 0.2s;
}
/* When collapsed, flip the chevron to point right (expand) */
.pomodoro-focus-body.notes-collapsed .pomodoro-focus-notes-toggle-icon svg {
  transform: rotate(180deg);
}
/* When collapsed, push toggle icon flush to right edge */
.pomodoro-focus-body.notes-collapsed {
  padding-right: 8px;
}
.pomodoro-focus-body.notes-collapsed .pomodoro-focus-notes-toggle-icon {
  margin-left: auto;
}
/* Collapsed state — hide right column */
.pomodoro-focus-body.notes-collapsed .pomodoro-focus-right {
  display: none;
}
/* Up Next footer strip */
.pomodoro-focus-upnext-strip {
  display: flex;
  align-items: center;
  gap: 10px;
  border-top: 1px solid var(--gray-200);
  padding: 8px 24px;
  flex-shrink: 0;
  overflow: hidden;
}
.pomodoro-focus-upnext-label {
  font-size: 0.62rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--gray-400);
  white-space: nowrap;
  flex-shrink: 0;
}
.pomodoro-focus-upnext-list {
  display: flex;
  align-items: center;
  gap: 0;
  overflow: hidden;
  min-width: 0;
}
.pomodoro-focus-upnext-item {
  font-size: 0.78rem;
  color: var(--text-faint);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 220px;
  line-height: 1.3;
  flex-shrink: 0;
}
.pomodoro-focus-upnext-item::before {
  content: '\00b7';
  margin: 0 8px;
  color: var(--gray-300);
  font-weight: 700;
  font-size: 1rem;
}
.pomodoro-focus-upnext-item:first-child {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--body-font-color);
  max-width: 300px;
}
.pomodoro-focus-upnext-item:first-child::before {
  display: none;
}
/* Today's progress strip */
.pomodoro-focus-progress-strip {
  display: flex;
  align-items: center;
  gap: 12px;
  border-top: 1px solid var(--gray-200);
  padding: 8px 24px;
  flex-shrink: 0;
}
.pomodoro-focus-progress-strip-bar {
  flex: 1;
  height: 4px;
  background: var(--gray-200);
  border-radius: 2px;
  overflow: hidden;
  min-width: 80px;
}
.pomodoro-focus-progress-strip-fill {
  height: 100%;
  width: 0%;
  background: var(--color-accent, #4285f4);
  border-radius: 2px;
  transition: width 0.6s ease;
}
.pomodoro-focus-progress-strip-text {
  font-size: 0.72rem;
  color: var(--text-faint);
  white-space: nowrap;
  flex-shrink: 0;
}
/* Focus settings gear button (in header actions) */
.pomodoro-focus-settings-btn {
  background: none;
  border: none;
  color: rgba(255, 255, 255, 0.6);
  cursor: pointer;
  padding: 3px;
  line-height: 1;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
}
.pomodoro-focus-settings-btn:hover {
  color: rgba(255, 255, 255, 0.95);
  background: rgba(255, 255, 255, 0.1);
}
/* Focus settings popover */
.pomodoro-focus-settings-popover {
  position: absolute;
  top: 60px;
  right: 16px;
  width: 260px;
  background: var(--body-background);
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
  padding: 16px;
  z-index: 20;
  display: none;
}
.pomodoro-focus-settings-popover.visible {
  display: block;
}
.pomodoro-focus-settings-title {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--gray-400);
  margin-bottom: 12px;
}
.pomodoro-focus-settings-group {
  margin-bottom: 14px;
}
.pomodoro-focus-settings-group:last-child {
  margin-bottom: 0;
}
.pomodoro-focus-settings-label {
  font-size: 0.76rem;
  font-weight: 600;
  color: var(--body-font-color);
  margin-bottom: 6px;
  display: block;
}
/* Theme swatches grid */
.pomodoro-focus-theme-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.pomodoro-focus-theme-swatch {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 4px;
  border: 2px solid transparent;
  border-radius: 8px;
  cursor: pointer;
  background: none;
  transition: border-color 0.15s, background 0.15s;
}
.pomodoro-focus-theme-swatch:hover {
  background: var(--gray-100, rgba(0,0,0,0.04));
}
.pomodoro-focus-theme-swatch.active {
  border-color: var(--color-accent, #4285f4);
  background: var(--gray-100, rgba(0,0,0,0.04));
}
.pomodoro-focus-theme-swatch-colors {
  display: flex;
  gap: 2px;
  height: 18px;
  width: 100%;
  border-radius: 4px;
  overflow: hidden;
}
.pomodoro-focus-theme-swatch-colors span {
  flex: 1;
}
.pomodoro-focus-theme-swatch-name {
  font-size: 0.6rem;
  color: var(--text-faint);
  white-space: nowrap;
}
/* Custom color pickers row */
.pomodoro-focus-custom-colors {
  display: flex;
  gap: 10px;
  margin-top: 6px;
}
.pomodoro-focus-custom-colors label {
  font-size: 0.68rem;
  color: var(--text-faint);
  display: flex;
  align-items: center;
  gap: 4px;
}
.pomodoro-focus-custom-colors input[type="color"] {
  width: 28px;
  height: 22px;
  border: 1px solid var(--gray-200);
  border-radius: 4px;
  padding: 1px;
  cursor: pointer;
  background: none;
}
/* Auto-advance toggle */
.pomodoro-focus-toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.pomodoro-focus-toggle-switch {
  position: relative;
  width: 36px;
  height: 20px;
  flex-shrink: 0;
}
.pomodoro-focus-toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
  position: absolute;
}
.pomodoro-focus-toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--gray-300, #ccc);

  function getDailyGoal() {

  function setDailyGoal(val) {

  function getDailyCompleted() {
    try {
      var raw = localStorage.getItem(DAILY_COMPLETED_KEY);
      if (raw) {

        if (obj && obj.date === todayStr) return obj.count || 0;

    } catch(e) {}
    return 0;
  }
  function incrementDailyCompleted() {
    var todayStr = new Date().toISOString().slice(0, 10);

  function updateDailyGoalRing() {
    var goal = getDailyGoal();
    if (!focusDailyGoalRing) return;
    if (goal <= 0) {
      focusDailyGoalRing.style.display = 'none';
      return;
    }
    var completed = getDailyCompleted();
    var pct = Math.min(completed / goal, 1);
    var circumference = 2 * Math.PI * 15.9; // ~99.9
    var dashoffset = circumference * (1 - pct);
    if (focusGoalRingFg) {
      focusGoalRingFg.setAttribute('stroke-dasharray', String(circumference));
      focusGoalRingFg.setAttribute('stroke-dashoffset', String(dashoffset));
    }
    if (focusGoalRingText) {
      focusGoalRingText.textContent = completed + '/' + goal;
    }
    if (completed >= goal) {
      focusDailyGoalRing.classList.add('goal-complete');

      focusDailyGoalRing.classList.remove('goal-complete');

    try { localStorage.setItem(SESSION_HISTORY_KEY, JSON.stringify(history)); } catch(e) {}

  function renderHistoryChart() {
    if (!focusHistorySvg || !focusHistoryChart) return;
    var history = getSessionHistory();
    var todayStr = new Date().toISOString().slice(0, 10);
    // Build array for last 7 days
    var days = [];
    for (var i = 6; i >= 0; i--) {
      var d = new Date();
      d.setDate(d.getDate() - i);
      var ds = d.toISOString().slice(0, 10);
      var count = 0;
      for (var j = 0; j < history.length; j++) {
        if (history[j].date === ds) { count = history[j].count; break; }
      }
      days.push({ date: ds, count: count });
    }
    var maxCount = Math.max.apply(null, days.map(function(d) { return d.count; }));
    if (maxCount <= 0) {
      focusHistoryChart.style.display = 'none';
      return;
    }
    var barWidth = 8;
    var gap = 4;
    var svgHeight = 24;
    var minBarHeight = 2;
    var html = '';
    for (var k = 0; k < days.length; k++) {
      var barHeight = days[k].count > 0
        ? Math.max(minBarHeight, Math.round((days[k].count / maxCount) * (svgHeight - 2)))
        : 0;
      var x = k * (barWidth + gap);
      var y = svgHeight - barHeight;
      var cls = 'pomodoro-focus-history-bar' + (days[k].date === todayStr ? ' today' : '');
      if (barHeight > 0) {
        html += '<rect class="' + cls + '" x="' + x + '" y="' + y + '" width="' + barWidth + '" height="' + barHeight + '" rx="1.5">'
          + '<title>' + days[k].date + ': ' + days[k].count + ' pomodoro' + (days[k].count !== 1 ? 's' : '') + '</title></rect>';
      }
    }
    focusHistorySvg.innerHTML = html;
    focusHistoryChart.style.display = 'flex';
  }

  // Write timer state to Firestore (debounced when running, immediate on key actions)
  function saveStateToFirestore(immediate) {
    if (_fsSyncing) return; // don't write back while applying remote state
    var ref = _getTimerDocRef();
    if (!ref) return;

    if (_fsDebounceTimer) {
      clearTimeout(_fsDebounceTimer);
      _fsDebounceTimer = null;
    }

    function doWrite() {
      var data = _buildTimerState();
      _lastFsSavedAt = data.savedAt;
      ref.set(data).catch(function(err) {
        console.warn('[pomo-sync] Firestore write failed:', err.message);
      });
    }

    if (immediate) {
      doWrite();
    } else {
      // Debounce to every 10 seconds when running (tick calls saveState every 5s)
      _fsDebounceTimer = setTimeout(doWrite, 10000);
    }
  }

  // Clear timer state from Firestore when timer is closed/cancelled
  function clearStateFromFirestore() {
    if (_fsDebounceTimer) {
      clearTimeout(_fsDebounceTimer);
      _fsDebounceTimer = null;
    }
    var ref = _getTimerDocRef();
    if (!ref) return;
    _lastFsSavedAt = Date.now();
    _localDelete = true;
    ref.delete().catch(function(err) {
      console.warn('[pomo-sync] Firestore delete failed:', err.message);
    });
  }

      if (Object.keys(all).length === 0) {

      } else {

  function formatTime(s) {

  function updateDisplay() {
    var timeStr = formatTime(secondsLeft);
    displayEl.textContent = timeStr;
    focusDisplayEl.textContent = timeStr;

    var pct = ((totalPhaseSeconds - secondsLeft) / totalPhaseSeconds) * 100;
    progressEl.style.width = pct + '%';
    focusProgressEl.style.width = pct + '%';

    var phaseText = phase === 'work' ? 'Work' : 'Break';
    phaseEl.textContent = phaseText;
    focusPhaseEl.textContent = phaseText;
    phaseEl.className = 'pomodoro-timer-phase' + (phase === 'break' ? ' break' : '');
    focusPhaseEl.className = 'pomodoro-focus-phase' + (phase === 'break' ? ' break' : '');
    progressEl.className = 'pomodoro-timer-progress-bar' + (phase === 'break' ? ' break' : '');
    focusProgressEl.className = 'pomodoro-focus-progress-bar' + (phase === 'break' ? ' break' : '');
    if (focusBackdropEl) {
      var themeId = getFocusTheme();
      focusBackdropEl.className = 'pomodoro-focus-backdrop theme-' + themeId + ' ' + (phase === 'break' ? 'break' : 'work');
    }

    // Update skip button label dynamically so it always reflects what's coming next
    var skipLabel = phase === 'work' ? 'Skip to Break' : 'Skip to Work';
    if (skipBtn) skipBtn.title = skipLabel;
    if (focusSkipBtn) focusSkipBtn.title = skipLabel;
    var focusSkipLabelEl = document.getElementById('focus-skip-label');
    if (focusSkipLabelEl) focusSkipLabelEl.textContent = skipLabel;

    var sessionText = 'Session ' + sessionCount;
    if (totalSessions > 1) {
      sessionText += '/' + totalSessions;
    }
    sessionText += ' \u00b7 ' + Math.round(accumulatedWorkSeconds / 60) + 'min tracked';
    sessionEl.textContent = sessionText;
    focusSessionEl.textContent = sessionText;

    // Update info section
    if (startedAt) {
      infoEl.style.display = '';
      var startDate = new Date(startedAt);
      var startedText = padTime(startDate.getHours()) + ':' + padTime(startDate.getMinutes());
      startedAtEl.textContent = startedText;

      // Calculate total remaining seconds across all sessions
      var remainingSec = secondsLeft;
      if (phase === 'work') {
        // remaining work in current session + remaining sessions (work + break each)
        var sessionsLeft = totalSessions - sessionCount;
        remainingSec += sessionsLeft * (WORK_SECONDS + BREAK_SECONDS);
      } else {
        // break phase: remaining break + remaining work sessions
        var sessionsLeft = totalSessions - sessionCount; // sessions after current
        remainingSec += sessionsLeft * (WORK_SECONDS + BREAK_SECONDS);
      }

      // Add uncompleted subtask estimated time to finish-at
      remainingSec += subtaskRemainingMin * 60;

      var remMin = Math.ceil(remainingSec / 60);
      var remText;
      if (remMin >= 60) {
        remText = Math.floor(remMin / 60) + 'h ' + (remMin % 60) + 'm';
      } else {
        remText = remMin + 'm';
      }
      remainingEl.textContent = remText;

      var finishMs = Date.now() + remainingSec * 1000;
      var finishDate = new Date(finishMs);
      var finishHrs = (remainingSec / 3600).toFixed(1);
      var finishText = '~' + padTime(finishDate.getHours()) + ':' + padTime(finishDate.getMinutes()) + ' (' + finishHrs + 'h)';
      estFinishEl.textContent = finishText;
    }

    // Update document title while running
    if (isRunning) {
      document.title = formatTime(secondsLeft) + ' \u2014 ' + (phase === 'work' ? 'Work' : 'Break') + ' | Digital Memory';
    }

    // Update focus-mode panels
    if (isFocusMode) {
      renderSessionTimeline();
    }

    // Always sync play/pause icon to actual timer state
    if (isRunning) {
      showPauseIcon();
    } else {
      showPlayIcon();
    }
  }

  // Helper: play an array of { freq, start, dur } notes

  // Shared AudioContext for tick sounds (avoid creating one per second)
  var tickAudioCtx = null;
  function getTickCtx() {
    if (!tickAudioCtx || tickAudioCtx.state === 'closed') {
      try { tickAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
    }
    if (tickAudioCtx.state === 'suspended') {
      tickAudioCtx.resume();
    }
    return tickAudioCtx;
  }

  // Read sound preferences from localStorage
  function getSoundPref(key, fallback) {
    try { var v = localStorage.getItem(key); if (v !== null) return v; } catch(e) {}
    return fallback;
  }
  function getSoundVolume() {
    try { var v = parseFloat(localStorage.getItem('dm-pomo-sound-volume')); if (v >= 0 && v <= 1) return v; } catch(e) {}
    return 0.8;
  }

  function playSound(soundId, volumeOverride) {
    if (!soundId || soundId === 'none') return;
    var preset = SOUND_PRESETS[soundId];
    if (!preset) return;
    try {
      var vol = (volumeOverride !== undefined) ? volumeOverride : getSoundVolume();
      if (vol <= 0) return;
      if (preset.type === 'tick') {
        var ctx = getTickCtx();
        if (ctx) preset.play(ctx, vol);
      } else {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var duration = preset.play(ctx, vol);
        setTimeout(function() { try { ctx.close(); } catch(e) {} }, (duration || 1000) + 100);
      }
    } catch(e) {}
  }

  // Convenience methods
  function playWorkEndSound() {
    playSound(getSoundPref('dm-pomo-sound-work', 'plang'));
  }
  function playBreakEndSound() {
    playSound(getSoundPref('dm-pomo-sound-break', 'ascending'));
  }
  function playTickSound() {
    var tickId = getSoundPref('dm-pomo-sound-tick', 'none');
    if (tickId && tickId !== 'none') {
      playSound(tickId);
    }
  }

  // ── Ambient sound playback manager ──
  // Ambient sounds loop continuously during break phases. They use a dedicated
  // AudioContext and return a stop handle, unlike one-shot notification/tick sounds.
  var ambientAudioCtx = null;
  var ambientStopHandle = null;

  function getAmbientVolume() {
    try { var v = parseFloat(localStorage.getItem('dm-pomo-sound-ambient-volume')); if (v >= 0 && v <= 1) return v; } catch(e) {}
    return 0.5;
  }

  function startAmbientSound() {
    stopAmbientSound(); // stop any existing ambient first
    var ambientId = getSoundPref('dm-pomo-sound-ambient', 'none');
    if (!ambientId || ambientId === 'none') return;
    var preset = SOUND_PRESETS[ambientId];
    if (!preset || preset.type !== 'ambient') return;
    var vol = getAmbientVolume();
    if (vol <= 0) return;
    try {
      ambientAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      ambientStopHandle = preset.play(ambientAudioCtx, vol);
    } catch(e) {
      ambientAudioCtx = null;
      ambientStopHandle = null;
    }
  }

  function stopAmbientSound() {
    if (ambientStopHandle && ambientStopHandle.stop) {
      try { ambientStopHandle.stop(); } catch(e) {}
      ambientStopHandle = null;
    }
    if (ambientAudioCtx) {
      try { ambientAudioCtx.close(); } catch(e) {}
      ambientAudioCtx = null;
    }
  }
