  // ─── Active state management ─────────────────────────────────────────────

  function fireRefreshEvents() {
    // Mirror the events fired by handleSyncAuth so all UIs re-render
    var events = [
      'dm-sync-complete', 'dm-todos-updated', 'dm-projects-updated',
      'dm-kanban-columns-updated', 'dm-attachments-updated', 'dm-review-updated',
      'dm-task-shares-updated', 'dm-note-shares-updated', 'dm-project-shares-updated',
      'dm-budget-updated', 'dm-accounts-updated', 'dm-categories-updated',
      'dm-budgets-updated', 'dm-transactions-updated', 'dm-recurring-updated',
      'dm-category-rules-updated',
      'dm-sync-complete'
    ];
    events.forEach(function(name) {
      try { window.dispatchEvent(new CustomEvent(name)); } catch(e) {}
    });
  }

  function activate() {
    if (_active) return;
    if (_disabled) return;
    try {
      _stores = buildFixtures();
    } catch (err) {
      console.error('[dm-demo] buildFixtures failed:', err);
      _stores = { notes: [], todos: [], projects: [], kanbanColumns: [],
        reviewCards: [], attachments: [], noteVersions: [],
        taskShares: [], noteShares: [], projectShares: [],
        accounts: [], categories: [], budgets: [], transactions: [], recurring: [],
        categoryRules: [],
        meta: [], writeQueue: [] };
    }
    _active = true;
    document.documentElement.setAttribute('data-demo', '1');
    showBanner();
    // Async so listeners attached during the same tick fire properly
    setTimeout(fireRefreshEvents, 0);
  }

  function deactivate() {
    if (!_active) return;
    _active = false;
    _stores = null;
    document.documentElement.removeAttribute('data-demo');
    hideBanner();
    setTimeout(fireRefreshEvents, 0);
  }

  // ─── IDB shadow methods ──────────────────────────────────────────────────

  function getStore(name) {
    if (!_stores) return [];
    if (!_stores[name]) _stores[name] = [];
    return _stores[name];
  }

  function shadowGetAll(name) {
    return Promise.resolve(getStore(name).map(function(o) { return clone(o); }));
  }
  function shadowGet(name, key) {
    var keyField = (name === 'meta') ? 'key' : 'id';
    var rec = getStore(name).filter(function(o) { return o[keyField] === key; })[0];
    return Promise.resolve(rec ? clone(rec) : undefined);
  }
  function shadowPut(name, data) {
    var keyField = (name === 'meta') ? 'key' : 'id';
    var arr = getStore(name);
    var idx = -1;
    for (var i = 0; i < arr.length; i++) {
      if (arr[i][keyField] === data[keyField]) { idx = i; break; }
    }
    if (idx >= 0) arr[idx] = clone(data);
    else arr.push(clone(data));
    return Promise.resolve();
  }
  function shadowDelete(name, key) {
    var keyField = (name === 'meta') ? 'key' : 'id';
    var arr = getStore(name);
    for (var i = arr.length - 1; i >= 0; i--) {
      if (arr[i][keyField] === key) arr.splice(i, 1);
    }
    return Promise.resolve();
  }
  function shadowClear(name) {
    // No-op in demo mode. The only callers of idbClear are sign-out cleanup
    // paths in dm-sync (clearCache, sign-out auth handler). When demo is
    // active, the user is signed-out — wiping fixtures here would defeat the
    // whole point of demo mode. Demo data is reset by reload (buildFixtures
    // runs fresh on each activate()), not by sign-out cleanup.
    return Promise.resolve();
  }
  function shadowPutBatch(name, items) {
    items.forEach(function(item) { shadowPut(name, item); });
    return Promise.resolve();
  }
  function clone(obj) {
    if (!obj || typeof obj !== 'object') return obj;
    try { return JSON.parse(JSON.stringify(obj)); } catch(e) { return obj; }
  }

  // ─── Banner UI ───────────────────────────────────────────────────────────

  var _bannerEl = null;

  function buildBanner() {
    if (_bannerEl) return _bannerEl;
    var el = document.createElement('div');
    el.id = 'dm-demo-banner';
    el.innerHTML =
      '<div class="dm-demo-banner-inner">' +
        '<span class="dm-demo-banner-chip">Demo</span>' +
        '<span class="dm-demo-banner-text">' +
          'You\'re exploring with sample data. ' +
          '<strong>Sign in to start your own digital memory.</strong>' +
        '</span>' +
        '<button type="button" class="dm-demo-banner-signin" id="dm-demo-signin">Sign in with Google</button>' +
        '<button type="button" class="dm-demo-banner-dismiss" id="dm-demo-dismiss" aria-label="Dismiss">&times;</button>' +
      '</div>';
    document.body.appendChild(el);
    el.querySelector('#dm-demo-signin').addEventListener('click', function() {
      if (typeof window.dmSignIn === 'function') window.dmSignIn();
    });
    el.querySelector('#dm-demo-dismiss').addEventListener('click', function() {
      _dismissed = true;
      try { localStorage.setItem('dm-demo-banner-dismissed', '1'); } catch(e) {}
      el.classList.add('dm-demo-banner--hidden');
      document.documentElement.removeAttribute('data-demo-banner');
    });
    _bannerEl = el;
    return el;
  }

  function showBanner() {
    if (_dismissed) return;
    if (!document.body) {
      document.addEventListener('DOMContentLoaded', showBanner, { once: true });
      return;
    }
    var el = buildBanner();
    el.classList.remove('dm-demo-banner--hidden');
    document.documentElement.setAttribute('data-demo-banner', '1');
  }
  function hideBanner() {
    if (_bannerEl) _bannerEl.classList.add('dm-demo-banner--hidden');
    document.documentElement.removeAttribute('data-demo-banner');
  }

  // ─── Public API ──────────────────────────────────────────────────────────

  window.dmDemo = {
    isActive: function() { return _active; },
    isDisabled: function() { return _disabled; },
    activate: activate,
    deactivate: deactivate,
    userId: DEMO_USER_ID,
    fakeUser: function() {
      if (!_active) return null;
      return {
        uid: DEMO_USER_ID, email: DEMO_USER_EMAIL,
        displayName: DEMO_USER_NAME, photoURL: null,
        isAnonymous: true, _demo: true
      };
    },
    idbGet: shadowGet,
    idbGetAll: shadowGetAll,
    idbPut: shadowPut,
    idbDelete: shadowDelete,
    idbClear: shadowClear,
    idbPutBatch: shadowPutBatch,
    queueWrite: function() { return Promise.resolve(); }, // no-op in demo
    drainQueue: function() { return Promise.resolve(); },
    getAllQueued: function() { return Promise.resolve([]); }
  };

  // ─── Auto-activate on load when nobody is signed in ──────────────────────

  // We want demo to be ready BEFORE any shortcode reads. This runs synchronously
  // at parse time (the script is inline). If a cached user exists in
  // localStorage we hold off — Firebase will rehydrate the session and show
  // the user's real data.
  function shouldActivateNow() {
    if (_disabled) return false;
    try {
      var cached = localStorage.getItem('dm-cached-user');
      if (cached) return false;
    } catch(e) {}
    // If Firebase already has a current user (rare at parse time), skip.
    if (window.dmAuth && window.dmAuth.currentUser) return false;
    return true;
  }

  if (shouldActivateNow()) {
    activate();
  }

  // Listen to auth state to flip demo on/off after Firebase resolves.
  function bindAuth() {
    if (!window.dmAuth) return;
    var lastUser = window.dmAuth.currentUser || null;
    window.dmAuth.onAuthStateChanged(function(user) {
      if (user) {
        if (_active) deactivate();
        lastUser = user;
      } else {
        // Transition from signed-in to signed-out: dm-sync clears real IDB
        // asynchronously and fires dm-sync-complete when done. Wait for that
        // before activating demo so our shadowed idbClear isn't called against
        // the in-memory fixtures we just built.
        if (lastUser) {
          var onCleared = function() {
            window.removeEventListener('dm-sync-complete', onCleared);
            if (!window.dmAuth.currentUser && !_active) activate();
          };
          window.addEventListener('dm-sync-complete', onCleared);
          // Safety: activate after 1.5s even if event never fires
          setTimeout(function() {
            window.removeEventListener('dm-sync-complete', onCleared);
            if (!window.dmAuth.currentUser && !_active) activate();
          }, 1500);
        } else if (!_active) {
          activate();
        }
        lastUser = null;
      }
    });
  }
  if (window.dmAuthReady) {
    window.dmAuthReady.then(bindAuth);
  } else {
    bindAuth();
  }
})();
