<!-- Prevent flash of wrong theme: apply saved preference before paint -->
<script>
  (function() {
    var t = localStorage.getItem('dm-theme');
    if (t === 'light' || t === 'dark') {
      document.documentElement.setAttribute('data-theme', t);
    }
    // Prevent flash of wrong sidebar state
    if (localStorage.getItem('dm-sidebar-collapsed') === '1') {
      document.documentElement.classList.add('sidebar-collapsed');
    }

    // Appearance: apply persisted skin, accent, chrome dims, texture BEFORE paint.
    // Kept minimal and self-contained — the full window.dmAppearance API lives in
    // appearance.html and gets hydrated later.
    try {
      var root = document.documentElement;
      var skin = localStorage.getItem('dm-theme-skin');
      if (skin && skin !== 'default') root.setAttribute('data-skin', skin);

      var accent = localStorage.getItem('dm-theme-accent');
      if (accent && /^#[0-9a-fA-F]{3,8}$/.test(accent)) {
        root.style.setProperty('--color-accent', accent);
        // Derive hover via color-mix (supported in all evergreen browsers).
        root.style.setProperty('--color-accent-hover',
          'color-mix(in srgb, ' + accent + ' 82%, black)');
        // Soft background tint (10% alpha).
        root.style.setProperty('--color-accent-soft',
          'color-mix(in srgb, ' + accent + ' 14%, transparent)');
      }

      var sw = parseFloat(localStorage.getItem('dm-theme-sidebar-width'));
      if (sw >= 12 && sw <= 24) root.style.setProperty('--sidebar-width', sw + 'rem');

      var hh = parseFloat(localStorage.getItem('dm-theme-header-height'));
      if (hh >= 2.5 && hh <= 5) root.style.setProperty('--header-height', hh + 'rem');

      var rb = parseFloat(localStorage.getItem('dm-theme-radius'));
      if (rb >= 0 && rb <= 1.5) root.style.setProperty('--radius-base', rb + 'rem');

      var bg = localStorage.getItem('dm-theme-background');
      if (bg && bg !== 'none') root.setAttribute('data-bg-texture', bg);

      // Demo mode: pre-paint flag so the banner reserves space without flash.
      // Active when there's no cached signed-in user and demo isn't disabled.
      var demoDisabled = localStorage.getItem('dm-demo-disabled') === '1';
      var cachedUser = localStorage.getItem('dm-cached-user');
      if (!demoDisabled && !cachedUser) {
        root.setAttribute('data-demo', '1');
        if (localStorage.getItem('dm-demo-banner-dismissed') !== '1') {
          root.setAttribute('data-demo-banner', '1');
        }
      }
    } catch (e) {}
  })();
</script>

<!-- Firebase initialization -->
<script>
  (function() {
    if (typeof firebase === 'undefined') return;
    var isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    firebase.initializeApp({
      apiKey: "AIzaSyC_wfs6Ev6vMEr4imhEJ22H0MxSn8AOr_k",
      authDomain: "digital-memory-0.firebaseapp.com",
      projectId: "digital-memory-0",
      storageBucket: "digital-memory-0.firebasestorage.app",
      messagingSenderId: "722285589293",
      appId: "1:722285589293:web:94a32fd0c444b422fed9a4"
    });
    window.dmAuth = firebase.auth();
    window.dmDb = firebase.firestore();
    window.dmStorage = firebase.storage();
    window.dmGoogleProvider = new firebase.auth.GoogleAuthProvider();
    window.dmIsLocalhost = isLocalhost;
    window.dmIsMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    // Firebase emulator wiring (devtime only).
    //
    // Enable by setting localStorage['dm-use-emulators'] = '1' OR by adding
    // ?emulators=1 to the page URL. Only active on localhost. Connects to
    // the standard Firebase Local Emulator Suite ports:
    //
    //   Auth      → http://localhost:9099
    //   Firestore → http://localhost:8080
    //   Storage   → http://localhost:9199
    //
    // Start the emulators in a separate terminal: `npm run emulators`
    // (requires `firebase-tools` installed globally or as a devDependency).
    // The query-param form persists the flag so reloads stay on emulators.
    try {
      var qsHasEmulators = /[?&]emulators=1\b/.test(window.location.search);
      if (qsHasEmulators) localStorage.setItem('dm-use-emulators', '1');
      var useEmulators = isLocalhost && localStorage.getItem('dm-use-emulators') === '1';
      if (useEmulators) {
        // Auth emulator — disable warnings since we're explicitly opting in.
        window.dmAuth.useEmulator('http://localhost:9099', { disableWarnings: true });
        window.dmDb.useEmulator('localhost', 8080);
        window.dmStorage.useEmulator('localhost', 9199);
        window.dmUsingEmulators = true;
        console.info('[dm-auth] Connected to Firebase emulators (Auth :9099, Firestore :8080, Storage :9199)');
      }
    } catch (err) {
      console.warn('[dm-auth] Emulator wiring failed (will fall back to live Firebase):', err);
    }

    // Global sign-in helper — uses Google Identity Services (GIS).
    //
    // Chrome 145+ (March 2026) broke signInWithPopup/signInWithRedirect
    // by partitioning third-party storage, preventing the auth handler at
    // firebaseapp.com from relaying credentials back to the app at
    // paulocdf.github.io.
    //
    // GIS bypasses this entirely: the Google sign-in happens in a
    // first-party context, returns an ID token, and we feed it to
    // Firebase Auth via signInWithCredential.  All existing
    // onAuthStateChanged listeners fire automatically.
    var GIS_CLIENT_ID = '722285589293-sn6f6i3c51sn5519tq1alf239biorvg7.apps.googleusercontent.com';

    function handleGisCredential(response) {
      if (!response || !response.credential) {
        console.error('[dm-auth] GIS callback: no credential received');
        return;
      }
      // Clear the explicit-signout flag — the user is actively signing in
      try { localStorage.removeItem('dm-gis-signed-out'); } catch(e) {}
      var credential = firebase.auth.GoogleAuthProvider.credential(response.credential);
      window.dmAuth.signInWithCredential(credential).catch(function(err) {
        console.error('[dm-auth] signInWithCredential error:', err);
      });
    }

    var gisInitialized = false;
    function ensureGisInit() {
      if (gisInitialized) return true;
      if (typeof google === 'undefined' || !google.accounts || !google.accounts.id) return false;
      // On mobile (iOS Safari/Chrome, which lack FedCM), prompt() triggers
      // a full-page redirect to Google.  When the browser returns, the page
      // loads fresh — all JS state is gone.  auto_select lets GIS
      // automatically deliver the credential on that return page-load
      // (the user already granted consent during the redirect) so
      // handleGisCredential fires and signInWithCredential creates the
      // Firebase session.  On desktop this enables One Tap auto-sign-in
      // for returning users.
      //
      // Suppress auto_select when the user explicitly signed out (the
      // sign-out handler sets dm-gis-signed-out in localStorage and calls
      // google.accounts.id.disableAutoSelect) to avoid immediately
      // signing them back in.
      var userSignedOut = false;
      try { userSignedOut = localStorage.getItem('dm-gis-signed-out') === '1'; } catch(e) {}
      google.accounts.id.initialize({
        client_id: GIS_CLIENT_ID,
        callback: handleGisCredential,
        auto_select: window.dmIsMobile ? !userSignedOut : false,
        cancel_on_tap_outside: true
      });
      gisInitialized = true;
      return true;
    }

    // Global sign-out helper — clears Firebase session AND tells GIS not
    // to auto-select on the next page load.
    window.dmSignOut = function() {
      // Tell GIS to suppress auto-select for this browser session
      try {
        if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
          google.accounts.id.disableAutoSelect();
        }
      } catch(e) {}
      // Persist flag across page reloads (GIS disableAutoSelect is
      // session-scoped and may not survive a full navigation).
      try { localStorage.setItem('dm-gis-signed-out', '1'); } catch(e) {}
      if (window.dmAuth) window.dmAuth.signOut();
    };

    // Firefox detection — Firefox's Enhanced Tracking Protection blocks
    // GIS cross-origin iframes, making prompt() silently fail.  Firefox
    // doesn't have Chrome 145+'s storage partitioning issue, so
    // signInWithPopup works fine there.
    var isFirefox = /Firefox\//i.test(navigator.userAgent);

    // Fallback for browsers where GIS prompt() can't work.  Uses
    // Firebase signInWithPopup which still works on Firefox.
    function fallbackPopupSignIn() {
      if (!window.dmAuth || !window.dmGoogleProvider) return;
      console.info('[dm-auth] Using signInWithPopup');
      window.dmAuth.signInWithPopup(window.dmGoogleProvider).then(function(result) {
        // Clear the explicit-signout flag on successful sign-in
        try { localStorage.removeItem('dm-gis-signed-out'); } catch(e) {}
      }).catch(function(err) {
        if (err.code !== 'auth/popup-closed-by-user') {
          console.error('[dm-auth] signInWithPopup error:', err);
        }
      });
    }

    // Wraps google.accounts.id.prompt() with a moment listener that
    // detects when GIS cannot display the One Tap UI and triggers a
    // popup-based fallback instead.
    function promptWithFallback() {
      google.accounts.id.prompt(function(notification) {
        if (notification.isNotDisplayed()) {
          console.warn('[dm-auth] GIS prompt not displayed:', notification.getNotDisplayedReason());
          fallbackPopupSignIn();
        } else if (notification.isSkippedMoment()) {
          console.warn('[dm-auth] GIS prompt skipped:', notification.getSkippedReason());
          fallbackPopupSignIn();
        }
      });
    }

    window.dmSignIn = function() {
      if (!window.dmAuth) return;
      // Clear the signed-out flag — user is explicitly requesting sign-in
      try { localStorage.removeItem('dm-gis-signed-out'); } catch(e) {}

      // Firefox: skip GIS entirely, go straight to signInWithPopup
      if (isFirefox) {
        fallbackPopupSignIn();
        return;
      }

      // Other browsers: try GIS prompt with fallback
      gisInitialized = false;
      if (ensureGisInit()) {
        promptWithFallback();
      } else {
        // GIS library hasn't loaded yet — wait for it then retry
        console.warn('[dm-auth] GIS not ready, waiting…');
        var attempts = 0;
        var retry = setInterval(function() {
          attempts++;
          if (ensureGisInit()) {
            clearInterval(retry);
            promptWithFallback();
          } else if (attempts > 50) { // ~5 seconds
            clearInterval(retry);
            console.error('[dm-auth] GIS library failed to load');
            fallbackPopupSignIn();
          }
        }, 100);
      }
    };

    // Eagerly initialize GIS on mobile page loads so the callback is
    // registered before GIS tries to deliver credentials.
    //
    // On mobile (iOS Safari/Chrome, which lack FedCM), prompt() triggers
    // a full-page redirect to Google.  When the browser redirects back,
    // the page loads fresh and all JS state from the previous load is
    // gone — including the callback registered via initialize().
    // By calling ensureGisInit() eagerly here, the callback is in place
    // when GIS auto-delivers the credential (via auto_select) on the
    // return page load.
    //
    // On desktop we skip this — GIS is initialized lazily on user click
    // inside dmSignIn().  Eager init on desktop causes Firefox ETP to
    // block GIS cross-origin requests (no user gesture) which puts GIS
    // into a failed state and breaks subsequent sign-in attempts.
    if (window.dmIsMobile) {
      (function autoInitGis() {
        if (ensureGisInit()) return;
        var attempts = 0;
        var poll = setInterval(function() {
          attempts++;
          if (ensureGisInit() || attempts > 100) clearInterval(poll);
        }, 100);
      })();
    }

    // Register/update user profile in Firestore on sign-in (for task sharing lookups).
    // Creates a lightweight doc at users/{uid} with email, displayName, photoURL.
    window.dmRegisterUser = function(user) {
      if (!user || !window.dmDb) return;
      var userRef = window.dmDb.collection('users').doc(user.uid);
      userRef.set({
        email: user.email || '',
        displayName: user.displayName || '',
        photoURL: user.photoURL || null,
        lastSeenAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true }).catch(function(err) {
        console.warn('[dm-auth] Failed to register user profile:', err);
      });
    };

    // dmOnAuth: thin wrapper around onAuthStateChanged that defers
    // registration until window.dmAuth is initialized. Returns an unsubscribe
    // function. Use this instead of `window.dmAuth.onAuthStateChanged(...)`
    // to avoid the `if (window.dmAuth)` guard at every callsite and to handle
    // ordering when a shortcode runs before head.html's Firebase init has
    // finished executing.
    window.dmOnAuth = function(callback) {
      if (typeof callback !== 'function') return function() {};
      if (window.dmAuth && typeof window.dmAuth.onAuthStateChanged === 'function') {
        return window.dmAuth.onAuthStateChanged(callback);
      }
      var cancelled = false;
      var unsub = null;
      if (window.dmAuthReady && typeof window.dmAuthReady.then === 'function') {
        window.dmAuthReady.then(function() {
          if (cancelled) return;
          if (window.dmAuth && typeof window.dmAuth.onAuthStateChanged === 'function') {
            unsub = window.dmAuth.onAuthStateChanged(callback);
          }
        });
      } else {
        console.warn('[dmOnAuth] called before dmAuth/dmAuthReady initialized');
      }
      return function() {
        cancelled = true;
        if (typeof unsub === 'function') unsub();
      };
    };

    // dmAuthReady: resolves once Firebase auth state has settled.
    // Prevents the null→user flash on page load (Firebase loads persisted
    // session from IndexedDB asynchronously, causing a brief signed-out state).
    function waitForAuthState() {
      return new Promise(function(resolve) {
        var unsub = window.dmAuth.onAuthStateChanged(function(user) {
          unsub();
          // Cache auth state in localStorage so subsequent page loads can
          // pre-render the signed-in UI before Firebase resolves from IDB
          try {
            if (user) {
              localStorage.setItem('dm-cached-user', JSON.stringify({
                displayName: user.displayName || '',
                email: user.email || '',
                photoURL: user.photoURL || ''
              }));
            } else {
              localStorage.removeItem('dm-cached-user');
            }
          } catch(e) {}
          resolve(user);
        });
      });
    }

    // Clean up stale redirect flag from previous signInWithRedirect flow
    // (no longer used — GIS replaced popup/redirect sign-in)
    try { localStorage.removeItem('dm-pending-redirect'); } catch(e) {}

    window.dmAuthReady = waitForAuthState();
  })();
</script>
