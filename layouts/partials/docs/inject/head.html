<!-- Prevent flash of wrong theme: apply saved preference before paint -->
<script>
  (function() {
    var t = localStorage.getItem('dm-theme');
    if (t === 'light' || t === 'dark') {
      document.documentElement.setAttribute('data-theme', t);
    }
    // Prevent flash of wrong sidebar state
    if (localStorage.getItem('dm-sidebar-collapsed') === '1') {
      document.documentElement.classList.add('sidebar-collapsed');
    }
  })();
</script>

<!-- Firebase initialization -->
<script>
  (function() {
    if (typeof firebase === 'undefined') return;
    var isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    firebase.initializeApp({
      apiKey: "AIzaSyC_wfs6Ev6vMEr4imhEJ22H0MxSn8AOr_k",
      authDomain: "digital-memory-0.firebaseapp.com",
      projectId: "digital-memory-0",
      storageBucket: "digital-memory-0.firebasestorage.app",
      messagingSenderId: "722285589293",
      appId: "1:722285589293:web:94a32fd0c444b422fed9a4"
    });
    window.dmAuth = firebase.auth();
    window.dmDb = firebase.firestore();
    window.dmStorage = firebase.storage();
    window.dmGoogleProvider = new firebase.auth.GoogleAuthProvider();
    window.dmIsLocalhost = isLocalhost;
    window.dmIsMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    // Global sign-in helper.
    //
    // Always use signInWithPopup first.  Chrome's third-party cookie
    // deprecation now breaks signInWithRedirect on localhost (and
    // increasingly on production too): getRedirectResult() resolves null
    // because the firebaseapp.com auth handler can no longer write
    // cross-origin cookies/storage.  signInWithPopup communicates
    // credentials back via postMessage, bypassing the cookie issue.
    //
    // If the popup is blocked (e.g. iOS Safari, strict browser settings),
    // fall back to signInWithRedirect as a last resort.
    window.dmSignIn = function() {
      if (!window.dmAuth || !window.dmGoogleProvider) return;
      window.dmAuth.signInWithPopup(window.dmGoogleProvider).catch(function(err) {
        if (err.code === 'auth/popup-blocked' ||
            err.code === 'auth/popup-closed-by-user' ||
            err.code === 'auth/cancelled-popup-request') {
          console.warn('Popup blocked/closed, falling back to redirect:', err.code);
          // Flag so the NEXT page load knows to call getRedirectResult()
          try { sessionStorage.setItem('dm-pending-redirect', '1'); } catch(e) {}
          window.dmAuth.signInWithRedirect(window.dmGoogleProvider);
        } else {
          console.error('Sign-in error:', err);
        }
      });
    };

    // dmAuthReady: resolves once Firebase auth state has settled.
    // Prevents the null→user flash on page load (Firebase loads persisted
    // session from IndexedDB asynchronously, causing a brief signed-out state).
    //
    // Only call getRedirectResult() when there's actually a pending redirect
    // sign-in (flagged via sessionStorage before signInWithRedirect).
    // On normal page loads this skips the slow network call entirely,
    // eliminating the main source of page-load flicker.
    var hasPendingRedirect = false;
    try { hasPendingRedirect = sessionStorage.getItem('dm-pending-redirect') === '1'; } catch(e) {}

    function waitForAuthState() {
      return new Promise(function(resolve) {
        var unsub = window.dmAuth.onAuthStateChanged(function(user) {
          unsub();
          resolve(user);
        });
      });
    }

    if (hasPendingRedirect) {
      // Clear the flag immediately so subsequent navigations are fast
      try { sessionStorage.removeItem('dm-pending-redirect'); } catch(e) {}
      window.dmAuthReady = window.dmAuth.getRedirectResult().catch(function(err) {
        console.error('Redirect sign-in error:', err);
      }).then(waitForAuthState);
    } else {
      // Normal page load: skip getRedirectResult(), resolve immediately
      // from onAuthStateChanged (uses Firebase's persisted session in IDB)
      window.dmAuthReady = waitForAuthState();
    }
  })();
</script>
